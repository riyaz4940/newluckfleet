            async editItem(id) { const item = this.data.find(v => v.id === id); if (item) this
                    .showForm(item); }

            async deleteItem(id) {
                this.confirm.open({
                    title: 'Delete User',
                    body: 'Are you sure? This removes their login.',
                    onConfirm: async () => {
                        this.loader.show();
                        try {
                            await DataService.deleteUser(id);
                            this.toast.show('User deleted', 'warning');
                            await this.loadData();
                            this.table.render(this.data);
                        } catch (e) { this.toast.show('Failed to delete: ' + (e
                                .message || e), 'error'); } finally { this.loader
                                .hide(); }
                    }
                });
            }
        };

        // ---------- ASSIGNMENTS ----------
        Pages.Assignments = class {
            constructor(app) {
                this.app = app;
                this.toast = new Components.Toast();
                this.loader = new Components.Loader();
                this.modal = new Components.Modal();
                this.confirm = new Components.ConfirmationDialog();
                this.data = [];
                this.workers = [];
                this.expandedState = {};
            }

            async render(container) {
                container.innerHTML = `
                    <div class="page-header">
                        <h2>👷 Assignments Overview</h2>
                        <p style="color:var(--dark-gray);font-size:0.85rem;">Tap a worker to see their pending tasks. Only <strong>pending</strong> tasks are shown.</p>
                    </div>
                    <div id="assignmentsGrid" class="assignments-grid"></div>
                `;
                await this.loadData();
                this.renderGrid();
            }

            async loadData() {
                this.loader.show();
                try {
                    const [production, fcTasks, workers] = await Promise.all([
                        DataService.getProduction(),
                        DataService.getFCTasks(),
                        DataService.getWorkers()
                    ]);
                    this.data = [...production, ...fcTasks.map(t => ({ ...t, type: 'fc' }))];
                    this.workers = workers;
                } catch (e) { this.toast.show('Failed to load: ' + (e.message || e), 'error'); } finally { this
                        .loader.hide(); }
            }

            renderGrid() {
                const container = document.getElementById('assignmentsGrid');

                const workerTaskMap = {};
                this.workers.forEach(w => {
                    workerTaskMap[w.id] = {
                        worker: w,
                        tasks: []
                    };
                });

                this.data.forEach(t => {
                    if (!t.assignedWorkerId) return;
                    if (t.status === 'completed' || t.status === 'rejected') return;
                    const workerIds = t.assignedWorkerId.split(',').filter(Boolean);
                    workerIds.forEach(id => {
                        const trimmedId = id.trim();
                        if (workerTaskMap[trimmedId]) {
                            workerTaskMap[trimmedId].tasks.push(t);
                        } else {
                            if (!workerTaskMap[trimmedId]) {
                                workerTaskMap[trimmedId] = {
                                    worker: { id: trimmedId, name: 'Unknown Worker', department: '' },
                                    tasks: []
                                };
                            }
                            workerTaskMap[trimmedId].tasks.push(t);
                        }
                    });
                });

                const activeWorkers = Object.values(workerTaskMap).filter(w => w.tasks.length > 0);

                if (activeWorkers.length === 0) {
                    container.innerHTML =
                        `<div class="text-center" style="padding:2rem;color:var(--dark-gray);">
                            <span class="material-icons" style="font-size:2.5rem;">group_off</span>
                            <p>No pending tasks assigned to any worker.</p>
                        </div>`;
                    return;
                }

                let html = '';
                activeWorkers.forEach(({ worker, tasks }) => {
                    const workerId = worker.id;
                    const isExpanded = this.expandedState[workerId] || false;
                    const taskCount = tasks.length;

                    let taskItemsHtml = '';
                    if (isExpanded) {
                        taskItemsHtml = tasks.map(t => {
                            const vehicleDisplay = t.vehicleNumber || 'Non-Vehicle';
                            return `
                                <div class="task-item">
                                    <span class="task-vehicle">🚗 ${vehicleDisplay}</span>
                                    <span class="task-name">${t.taskName}</span>
                                    <span class="task-status-badge badge badge-${t.status}">${t.status}</span>
                                </div>
                            `;
                        }).join('');
                    }

                    const expandIcon = isExpanded ? 'expand_less' : 'expand_more';

                    html += `
                        <div class="worker-assignment-card" data-workerid="${workerId}">
                            <div class="worker-header">
                                <div class="worker-name">
                                    <span class="material-icons">person</span>
                                    ${worker.name || 'Unknown Worker'}
                                    <span class="worker-dept">${worker.department || 'No Dept'}</span>
                                </div>
                                <div style="display:flex;align-items:center;gap:0.5rem;">
                                    <span class="task-count-badge">${taskCount} pending</span>
                                    <span class="expand-icon ${isExpanded ? 'open' : ''}">
                                        <span class="material-icons">${expandIcon}</span>
                                    </span>
                                </div>
                            </div>
                            <div class="task-list ${isExpanded ? 'open' : ''}">
                                ${isExpanded ? taskItemsHtml : ''}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

                container.querySelectorAll('.worker-assignment-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('button')) return;
                        const workerId = card.dataset.workerid;
                        this.expandedState[workerId] = !this.expandedState[workerId];
                        this.renderGrid();
                    });
                });
            }
        };

        // ---------- FC PREP ----------
        Pages.FCPrep = class {
            constructor(app) {
                this.app = app;
                this.toast = new Components.Toast();
                this.loader = new Components.Loader();
                this.modal = new Components.Modal();
                this.confirm = new Components.ConfirmationDialog();
                this.inventory = [];
                this.fcTasks = [];
                this.workers = [];
                this.vehiclePhotos = {};
                this.productionTasks = [];
            }

            async render(container) {
                container.innerHTML = `
                    <div class="page-header"><h2>🔧 FC Preparation</h2>
                        <p style="color:var(--dark-gray);font-size:0.85rem;">Vehicles being restored for Fitness Certificate (FC). 
                        <strong>Only vehicles not in production, or with Tinkering, Mechanical & Painting completed</strong> are shown.</p>
                    </div>
                    <div id="fcInventoryCards" class="inventory-cards"></div>
                `;
                await this.loadData();
                this.renderCards();
            }

            async loadData() {
                this.loader.show();
                try {
                    const [inventory, fcTasks, workers, production] = await Promise.all([
                        DataService.getInventory(),
                        DataService.getFCTasks(),
                        DataService.getWorkers(),
                        DataService.getProduction()
                    ]);
                    this.productionTasks = production;
                    this.workers = workers;
                    this.fcTasks = fcTasks;

                    let filtered = inventory.filter(v => v.inventoryStatus !== 'Delivered' && v.fcStatus !== 'ready');

                    const finalList = [];
                    for (const v of filtered) {
                        const prodTasks = production.filter(p => p.vehicleNumber === v.vehicleNumber);
                        const hasProd = prodTasks.length > 0;
                        if (!hasProd) {
                            finalList.push(v);
                        } else {
                            const requiredTasks = ['Tinkering', 'Mechanical', 'Painting'];
                            const allCompleted = requiredTasks.every(taskName => {
                                const task = prodTasks.find(p => p.taskName === taskName);
                                return task && task.status === 'completed';
                            });
                            if (allCompleted) {
                                finalList.push(v);
                            }
                        }
                    }
                    this.inventory = finalList;
                    this.vehiclePhotos = {};
                    this.inventory.forEach(v => { this.vehiclePhotos[v.vehicleNumber] = v.frontPhotoUrl ||
                            ''; });
                } catch (e) { this.toast.show('Failed to load data: ' + (e.message || e), 'error'); } finally { this
                        .loader.hide(); }
            }

            renderCards() {
                const container = document.getElementById('fcInventoryCards');
                if (this.inventory.length === 0) {
                    container.innerHTML =
                        `<p style="color:var(--dark-gray);">No vehicles available for FC preparation.</p>`;
                    return;
                }

                const html = this.inventory.map(v => {
                    const tasks = this.fcTasks.filter(t => t.vehicleNumber === v.vehicleNumber);
                    const totalTasks = tasks.length;
                    const completed = tasks.filter(t => t.status === 'completed').length;
                    const progress = totalTasks > 0 ? Math.round((completed / totalTasks) * 100) : 0;
                    const fcStatus = v.fcStatus || 'not_started';
                    const statusLabel = fcStatus === 'ready' ? '✅ Ready' :
                        fcStatus === 'in_progress' ? '🔧 In Progress' : '⏳ Not Started';
                    const statusClass = fcStatus === 'ready' ? 'badge-fc-ready' :
                        fcStatus === 'in_progress' ? 'badge-fc-progress' : 'badge-draft';

                    const photoUrl = this.vehiclePhotos[v.vehicleNumber] || '';
                    const photoHtml = photoUrl ?
                        `<img class="inv-photo-thumb" src="${photoUrl}" />` :
                        '';

                    let taskListHtml = '';
                    if (tasks.length > 0) {
                        taskListHtml = tasks.map(t => {
                                const workerName = t.assignedWorkerId ? this.workers.find(w => String(w.id) === t.assignedWorkerId)?.name || 'Unknown' : 'Unassigned';
                                return `
                                    <div class="fc-task-item">
                                        <span class="task-name">${t.taskName}</span>
                                        <span class="task-status badge badge-${t.status}">${t.status}</span>
                                        <span class="task-worker">👷 ${workerName}</span>
                                    </div>
                                `;
                            }).join('');
                    } else {
                        taskListHtml = `<div style="color:var(--dark-gray);font-size:0.8rem;">No tasks assigned yet.</div>`;
                    }

                    return `
                        <div class="inv-card" data-id="${v.id}" data-vehicle="${v.vehicleNumber}">
                            ${photoHtml}
                            <div class="inv-header">
                                <span class="inv-number">${v.vehicleNumber}</span>
                                <span class="badge ${statusClass}">${statusLabel}</span>
                            </div>
                            <div class="inv-name">${v.vehicleName || '—'}</div>
                            <div class="inv-model">${v.model || '—'}</div>
                            <div style="margin-top:0.3rem;">
                                <div class="flex justify-between items-center">
                                    <span style="font-size:0.8rem;color:var(--dark-gray);">Progress</span>
                                    <span style="font-size:0.8rem;font-weight:600;">${progress}%</span>
                                </div>
                                <div class="fc-progress-bar"><div class="fc-progress-fill" style="width:${progress}%;"></div></div>
                            </div>
                            <div style="margin-top:0.3rem;">
                                <strong style="font-size:0.8rem;">Tasks:</strong>
                                <div style="margin-top:0.2rem;">${taskListHtml}</div>
                            </div>
                            ${v.fcRemarks ? `<div class="fc-remark-box">📝 ${v.fcRemarks}</div>` : ''}
                            <div class="inv-actions" style="display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.3rem;">
                                <button class="btn btn-sm btn-primary manage-fc" data-vehicle="${v.vehicleNumber}">Manage Tasks</button>
                                ${fcStatus !== 'ready' ? `<button class="btn btn-sm btn-success mark-ready" data-vehicle="${v.vehicleNumber}" ${tasks.length === 0 || completed < totalTasks ? 'disabled' : ''}>Mark Ready for FC</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = html;

                container.querySelectorAll('.manage-fc').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.manageFCTasks(btn.dataset.vehicle);
                    });
                });

                container.querySelectorAll('.mark-ready').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.markReady(btn.dataset.vehicle);
                    });
                });

                container.querySelectorAll('.inv-card').forEach(card => {
                    card.addEventListener('click', () => {
                        this.toast.show('Click Manage Tasks to assign work', 'info');
                    });
                });
            }

            async manageFCTasks(vehicleNumber) {
                const allTasks = await DataService.getFCTasksByVehicle(vehicleNumber);
                const vehicle = this.inventory.find(v => v.vehicleNumber === vehicleNumber);
                if (!vehicle) { this.toast.show('Vehicle not found', 'error'); return; }

                const taskOptions = FC_TASK_TYPES.map(t => ({ value: t, label: t }));
                let existingTasksHtml = allTasks.map(t => {
                        const workerName = t.assignedWorkerId ? this.workers.find(w => String(w.id) === t.assignedWorkerId)?.name || 'Unknown' : 'Unassigned';
                        return `
                            <div class="fc-task-item">
                                <span class="task-name">${t.taskName}</span>
                                <span class="task-status badge badge-${t.status}">${t.status}</span>
                                <span class="task-worker">👷 ${workerName}</span>
                                <div style="display:flex;gap:0.3rem;">
                                    <button class="btn btn-sm btn-secondary update-fc-task" data-taskid="${t.id}" data-vehicle="${vehicleNumber}">Update</button>
                                    <button class="btn btn-sm btn-danger delete-fc-task" data-taskid="${t.id}" data-vehicle="${vehicleNumber}">Delete</button>
                                </div>
                            </div>
                        `;
                    }).join('') || '<div style="color:var(--dark-gray);">No tasks yet.</div>';

                const form = `
                    <form id="fcTaskForm">
                        <div class="form-group"><label>Vehicle</label><input type="text" value="${vehicleNumber}" disabled /></div>
                        <div class="form-group"><label>Add New Task</label>
                            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                                <select id="newTaskSelect" style="flex:1;min-width:120px;">
                                    ${taskOptions.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
                                </select>
                                <button type="button" id="addFcTaskBtn" class="btn btn-primary btn-sm">Add</button>
                            </div>
                        </div>
                        <div style="margin-top:0.8rem;">
                            <strong>Existing Tasks</strong>
                            <div id="fcTaskList">${existingTasksHtml}</div>
                        </div>
                    </form>
                `;

                this.modal.open({
                    title: `FC Tasks - ${vehicleNumber}`,
                    body: form,
                    confirmText: 'Close',
                    showCancel: false,
                    onConfirm: () => this.modal.close()
                });

                document.getElementById('addFcTaskBtn').addEventListener('click', async () => {
                    const taskName = document.getElementById('newTaskSelect').value;
                    if (!taskName) { this.toast.show('Select a task', 'warning'); return; }
                    if (allTasks.some(t => t.taskName === taskName)) {
                        this.toast.show('Task already exists for this vehicle', 'warning');
                        return;
                    }
                    this.loader.show();
                    try {
                        await DataService.addFCTask({
                            vehicleNumber: vehicleNumber,
                            taskName: taskName,
                            status: 'pending',
                            assignedWorkerId: '',
                            remarks: ''
                        });
                        this.toast.show('Task added', 'success');
                        this.modal.close();
                        await this.loadData();
                        this.renderCards();
                        this.manageFCTasks(vehicleNumber);
                    } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this
                            .loader.hide(); }
                });

                document.querySelectorAll('.update-fc-task').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const taskId = btn.dataset.taskid;
                        const task = allTasks.find(t => t.id === taskId);
                        if (!task) return;
                        const workerOptions = this.workers.map(w =>
                            `<option value="${w.id}" ${task.assignedWorkerId === w.id ? 'selected' : ''}>${w.name} (${w.department})</option>`
                            ).join('');
                        const updateForm = `
                            <form id="updateFcTaskForm">
                                <div class="form-group"><label>Task</label><input type="text" value="${task.taskName}" disabled /></div>
                                <div class="form-group"><label>Assign Worker</label>
                                    <select name="assignedWorkerId">
                                        <option value="">-- Unassigned --</option>
                                        ${workerOptions}
                                    </select>
                                </div>
                                <div class="form-group"><label>Status</label>
                                    <select name="status">
                                        <option value="pending" ${task.status==='pending'?'selected':''}>Pending</option>
                                        <option value="in_progress" ${task.status==='in_progress'?'selected':''}>In Progress</option>
                                        <option value="completed" ${task.status==='completed'?'selected':''}>Completed</option>
                                    </select>
                                </div>
                                <div class="form-group"><label>Remarks</label><textarea name="remarks" rows="2">${task.remarks || ''}</textarea></div>
                            </form>
                        `;
                        this.modal.open({
                            title: 'Update Task',
                            body: updateForm,
                            confirmText: 'Update',
                            onConfirm: async () => {
                                const fd = new FormData(document.getElementById(
                                    'updateFcTaskForm'));
                                const data = Object.fromEntries(fd.entries());
                                this.loader.show();
                                try {
                                    await DataService.updateFCTask(taskId, data);
                                    this.toast.show('Task updated', 'success');
                                    this.modal.close();
                                    await this.loadData();
                                    this.renderCards();
                                    this.manageFCTasks(vehicleNumber);
                                } catch (e) { this.toast.show('Failed: ' + e
                                        .message, 'error'); } finally { this
                                        .loader.hide(); }
                            }
                        });
                    });
                });

                document.querySelectorAll('.delete-fc-task').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const taskId = btn.dataset.taskid;
                        this.confirm.open({
                            title: 'Delete Task',
                            body: 'Remove this task?',
                            onConfirm: async () => {
                                this.loader.show();
                                try {
                                    await DataService.deleteFCTask(taskId);
                                    this.toast.show('Task deleted', 'warning');
                                    await this.loadData();
                                    this.renderCards();
                                    this.manageFCTasks(vehicleNumber);
                                } catch (e) { this.toast.show('Failed: ' +
                                        e.message, 'error'); } finally { this
                                        .loader.hide(); }
                            }
                        });
                    });
                });
            }

            async markReady(vehicleNumber) {
                const tasks = await DataService.getFCTasksByVehicle(vehicleNumber);
                const total = tasks.length;
                const completed = tasks.filter(t => t.status === 'completed').length;
                if (total === 0 || completed < total) {
                    this.toast.show('Complete all tasks before marking ready', 'warning');
                    return;
                }
                const form = `
                    <div class="form-group"><label>FC Remark (optional)</label>
                        <textarea id="fcRemarkInput" rows="3" placeholder="e.g. All work done, pending RTO inspection"></textarea>
                    </div>
                `;
                this.modal.open({
                    title: 'Mark Vehicle Ready for FC',
                    body: form,
                    confirmText: 'Mark Ready',
                    onConfirm: async () => {
                        const remark = document.getElementById('fcRemarkInput').value.trim();
                        this.loader.show();
                        try {
                            await DataService.updateInventory(
                                this.inventory.find(v => v.vehicleNumber === vehicleNumber).id, {
                                    fcStatus: 'ready',
                                    fcRemarks: remark || 'Ready for FC'
                                }
                            );
                            this.toast.show('✅ Vehicle marked ready for FC', 'success');
                            this.modal.close();
                            await this.loadData();
                            this.renderCards();
                        } catch (e) { this.toast.show('Failed: ' + e.message,
                                'error'); } finally { this.loader.hide(); }
                    }
                });
            }
        };

        // ==============================================================
        // 8. ROUTER
        // ==============================================================
        class Router {
            constructor(app) {
                this.app = app;
                this.auth = app.auth;
                this.content = document.getElementById('pageContent');
                this.title = document.getElementById('pageTitle');
                this.breadcrumb = document.getElementById('breadcrumbPage');
                this.currentPage = null;
                this.pages = {
                    dashboard: Pages.Dashboard,
                    inventory: Pages.Inventory,
                    sales: Pages.Sales,
                    supervisor: Pages.Supervisor,
                    worker: Pages.Worker,
                    users: Pages.Users,
                    purchase_inventory: Pages.PurchaseInventory,
                    leads: Pages.Leads,
                    assignments: Pages.Assignments,
                    fcprep: Pages.FCPrep,
                };
            }
            init() {
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.navigate(item.dataset.page);
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarBackdrop').classList.remove('visible');
                    });
                });
                document.querySelectorAll('#bottomNav .nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = btn.dataset.page;
                        if (page) this.navigate(page);
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarBackdrop').classList.remove('visible');
                    });
                });
                const hash = window.location.hash.slice(1) || this.getDefaultPage();
                this.navigate(hash);
                window.addEventListener('hashchange', () => {
                    this.navigate(window.location.hash.slice(1) || this.getDefaultPage());
                });
            }
            getDefaultPage() {
                const order = ['dashboard', 'supervisor', 'sales', 'inventory', 'worker', 'purchase_inventory',
                    'leads', 'fcprep', 'assignments'
                ];
                return order.find(p => this.auth.hasPermission(p)) || 'dashboard';
            }
            async navigate(page) {
                if (!this.auth.hasPermission(page)) {
                    this.content.innerHTML =
                        `<div style="text-align:center;padding:3rem;"><span class="material-icons" style="font-size:3rem;color:var(--danger);">block</span><h2>Access Denied</h2><p>You don't have permission for this page.</p></div>`;
                    this.title.textContent = 'Access Denied';
                    this.breadcrumb.textContent = 'Access Denied';
                    this.updateBottomNav(page);
                    return;
                }
                const PageClass = this.pages[page];
                if (!PageClass) { this.content.innerHTML = '<h2>Page not found</h2>'; return; }
                document.getElementById('loadingOverlay').style.display = 'flex';
                try {
                    if (this.currentPage && typeof this.currentPage.destroy === 'function') { this
                            .currentPage.destroy(); }
                    const instance = new PageClass(this.app);
                    await instance.render(this.content);
                    this.currentPage = instance;
                    const titles = {
                        dashboard: 'Dashboard',
                        inventory: 'Vehicle Inventory',
                        sales: 'Sales Orders',
                        supervisor: 'Supervisor',
                        worker: 'Worker',
                        users: 'Manage Users',
                        purchase_inventory: 'Purchase Inventory',
                        leads: 'Lead Tracker',
                        assignments: 'Assignments Overview',
                        fcprep: 'FC Preparation'
                    };
                    this.title.textContent = titles[page] || page;
                    this.breadcrumb.textContent = titles[page] || page;
                    document.querySelectorAll('.nav-item').forEach(el => { el.classList.toggle('active', el
                            .dataset.page === page); });
                    this.updateBottomNav(page);
                    if (window.location.hash !== `#${page}`) { history.pushState(null, '', `#${page}`); }
                } catch (e) { console.error(e);
                    this.content.innerHTML =
                        `<div class="text-center" style="padding:2rem;"><span class="material-icons">error</span><p>Failed to load page</p></div>`; } finally {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            }
            updateBottomNav(page) {
                document.querySelectorAll('#bottomNav .nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.page === page);
                });
            }
        }

        // ==============================================================
        // 9. MAIN APP
        // ==============================================================
        class App {
            constructor() {
                this.auth = new Auth();
                this.user = null;
                this.router = null;
                this.toast = new Components.Toast();
            }
            async init() {
                const isAuth = await this.auth.checkSession();
                if (!isAuth) { this.showLogin(); return; }

                await this.auth.refreshUser();

                this.user = this.auth.getCurrentUser();
                this.renderApp();
                this.renderBottomNav();
                this.router = new Router(this);
                this.router.init();
                document.getElementById('logoutBtn').addEventListener('click', () => { this.auth.logout(); });
                document.getElementById('menuToggle').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('open');
                    document.getElementById('sidebarBackdrop').classList.toggle('visible');
                });
                document.getElementById('sidebarBackdrop').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('sidebarBackdrop').classList.remove('visible');
                });
                const name = this.user.fullName || this.user.username || 'User';
                document.getElementById('userAvatar').textContent = name.split(' ').map(n => n[0]).join('')
                    .toUpperCase();
                document.getElementById('userName').textContent = name;
                document.getElementById('userRole').textContent = (this.user.role || 'worker').replace('_', ' ')
                    .toUpperCase();
                document.getElementById('userType').textContent = this.user.employeeType || 'Company';
                document.getElementById('userType').className =
                    `user-type ${(this.user.employeeType || 'Company').toLowerCase()}`;
                this.toast.show(`Welcome, ${name}! (${this.user.employeeType || 'Company'})`, 'success');
            }

            showLogin() {
                document.getElementById('app').innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <div class="login-logo"><div class="logo-icon"><span class="material-icons" style="font-size:2.5rem;">precision_manufacturing</span></div><h2>NewLuck Fleet ERP</h2></div>
                            <form id="loginForm">
                                <div class="form-group"><label>Username</label><input type="text" id="loginUsername" placeholder="Enter username" /></div>
                                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter password" /></div>
                                <div class="form-options"><label><input type="checkbox" checked /> Remember Me</label><a href="#">Forgot?</a></div>
                                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                                <div id="loginError" class="login-error" style="display:none;"></div>
                            </form>
                            <div class="login-footer">
                                <strong>Logins:</strong><br>
                                Owner / Operations Manager / Supervisor / Sales / Inventory / Worker<br>
                                Workers log in with their first name + "123" (e.g. ravi / ravi123).
                            </div>
                            <div style="border-top:1px solid #eef2f6;margin-top:1rem;padding-top:0.8rem;text-align:center;font-size:0.7rem;color:var(--dark-gray);">
                                <span>© 2026 NewLuck Fleet ERP. All rights reserved.</span>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const username = document.getElementById('loginUsername').value.trim();
                    const password = document.getElementById('loginPassword').value.trim();
                    const errorEl = document.getElementById('loginError');
                    errorEl.style.display = 'none';
                    try {
                        await this.auth.login(username, password);
                        window.location.reload();
                    } catch (err) {
                        errorEl.textContent = err.message || 'Invalid credentials';
                        errorEl.style.display = 'block';
                    }
                });
            }

            renderApp() {
                const sidebar = document.getElementById('sidebarNav');
                const allPages = ['dashboard', 'inventory', 'sales', 'supervisor', 'worker',
                    'purchase_inventory', 'leads', 'fcprep', 'assignments'
                ];
                // Only show Users page for owner and ops manager
                const user = this.auth.getCurrentUser();
                if (user && ['owner', 'operations_manager'].includes(user.role)) {
                    allPages.push('users');
                }
                const labels = {
                    dashboard: 'Dashboard',
                    inventory: 'Vehicle Inventory',
                    sales: 'Sales Orders',
                    supervisor: 'Supervisor',
                    worker: 'Worker',
                    purchase_inventory: 'Purchase Inventory',
                    leads: 'Lead Tracker',
                    users: 'Manage Users',
                    assignments: 'Assignments',
                    fcprep: 'FC Prep'
                };
                const icons = {
                    dashboard: 'dashboard',
                    inventory: 'inventory',
                    sales: 'receipt_long',
                    supervisor: 'supervisor_account',
                    worker: 'construction',
                    purchase_inventory: 'inventory_2',
                    leads: 'trending_up',
                    users: 'group',
                    assignments: 'group_work',
                    fcprep: 'build'
                };
                sidebar.innerHTML = allPages.filter(p => this.auth.hasPermission(p)).map(p =>
                    `<a href="#${p}" class="nav-item" data-page="${p}"><span class="material-icons">${icons[p]}</span><span class="nav-label">${labels[p]}</span></a>`
                ).join('');
            }

            renderBottomNav() {
                const nav = document.getElementById('bottomNav');
                const pages = ['dashboard', 'inventory', 'sales', 'supervisor', 'worker',
                    'purchase_inventory', 'leads', 'fcprep', 'assignments'
                ];
                const labels = {
                    dashboard: 'Home',
                    inventory: 'Vehicles',
                    sales: 'Sales',
                    supervisor: 'Supervisor',
                    worker: 'Tasks',
                    purchase_inventory: 'Stock',
                    leads: 'Leads',
                    fcprep: 'FC Prep',
                    assignments: 'Assignments'
                };
                const icons = {
                    dashboard: 'home',
                    inventory: 'directions_car',
                    sales: 'receipt',
                    supervisor: 'supervisor_account',
                    worker: 'construction',
                    purchase_inventory: 'inventory_2',
                    leads: 'trending_up',
                    fcprep: 'build',
                    assignments: 'group_work'
                };
                const filtered = pages.filter(p => this.auth.hasPermission(p));
                nav.innerHTML = filtered.map(p => `
                    <button class="nav-btn" data-page="${p}">
                        <span class="material-icons">${icons[p]}</span>
                        <span class="nav-label">${labels[p]}</span>
                    </button>
                `).join('');
                nav.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = btn.dataset.page;
                        if (page && this.router) this.router.navigate(page);
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarBackdrop').classList.remove('visible');
                    });
                });
                const currentHash = window.location.hash.slice(1) || 'dashboard';
                nav.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.page === currentHash);
                });
            }
        }

        // ==============================================================
        // 10. BOOTSTRAP
        // ==============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const app = new App();
            app.init();
            window.__app = app;
        });
    </script>
</body>
</html>
