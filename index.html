                            { key: 'actions', label: 'Actions', render: (r) =>
                                    `<button class="btn-icon edit-user" data-id="${r.id}"><span class="material-icons">edit</span></button>
                                            <button class="btn-icon delete-user" data-id="${r.id}"><span class="material-icons">delete</span></button>`
                                }
                        ],
                        onAction: (e) => {
                            const t = e.target.closest('button');
                            if (!t) return;
                            if (t.classList.contains('edit-user')) this.editItem(t.dataset
                                .id);
                            if (t.classList.contains('delete-user')) this.deleteItem(t
                                .dataset.id);
                        }
                    });
                    this.table.render(this.data);
                    document.getElementById('addUserBtn').addEventListener('click', () => this.showForm());
                }

                async loadData() {
                    this.loader.show();
                    try { this.data = await DataService.getUsers(); } catch (e) { this.toast.show(
                            'Failed to load users: ' + (e.message || e), 'error'); } finally { this
                            .loader.hide(); }
                }

                showForm(item = null) {
                    const isEdit = !!item;
                    const departments = ['Tinkering', 'Mechanical', 'Dummy Closing', 'Body Coach',
                        'Kitchen Layout',
                        'Painting', 'ACP', 'Electrical', 'Plumbing', 'Canopy', 'Tyres', 'Glass',
                        'Branding',
                        'Solar', 'UPS', 'Camera', 'QC', 'Delivery'
                    ];
                    const form = `
                        <form id="userForm">
                            <div class="form-group"><label>Full Name *</label><input type="text" name="fullName" value="${item?.fullName||''}" required /></div>
                            <div class="form-row">
                                <div class="form-group"><label>Username ${isEdit?'':'(blank = first name, lowercase)'}</label><input type="text" name="username" value="${item?.username||''}" /></div>
                                <div class="form-group"><label>Password ${isEdit?'(blank = keep current)':'(blank = name123)'}</label><input type="text" name="password" value="" /></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>Role</label>
                                    <select name="role">
                                        <option value="worker" ${item?.role==='worker'?'selected':''}>Worker</option>
                                        <option value="supervisor" ${item?.role==='supervisor'?'selected':''}>Supervisor</option>
                                        <option value="sales" ${item?.role==='sales'?'selected':''}>Sales</option>
                                        <option value="inventory" ${item?.role==='inventory'?'selected':''}>Inventory Clerk</option>
                                        <option value="operations_manager" ${item?.role==='operations_manager'?'selected':''}>Operations Manager</option>
                                        <option value="owner" ${item?.role==='owner'?'selected':''}>Owner</option>
                                        <option value="accounts" ${item?.role==='accounts'?'selected':''}>Accounts</option>
                                    </select>
                                </div>
                                <div class="form-group"><label>Employee Type</label>
                                    <select name="employeeType">
                                        <option value="Company" ${item?.employeeType==='Company'?'selected':''}>Company</option>
                                        <option value="Contractual" ${item?.employeeType==='Contractual'?'selected':''}>Contractual</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group"><label>Department (for workers)</label>
                                <select name="department">
                                    <option value="">-- none --</option>
                                    ${departments.map(d => `<option value="${d}" ${item?.department===d?'selected':''}>${d}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group"><label>Skills (comma separated, optional)</label><input type="text" name="skills" value="${item?.skills||''}" /></div>
                        </form>
                    `;

                    this.modal.open({
                        title: isEdit ? 'Edit User' : 'Add Worker/User',
                        body: form,
                        confirmText: isEdit ? 'Update' : 'Create Login',
                        onConfirm: async () => {
                            const fd = new FormData(document.getElementById('userForm'));
                            const data = Object.fromEntries(fd.entries());
                            const id = isEdit ? item.id : Utils.genId();
                            const now = Utils.dateUtils.now();
                            const userData = {
                                id: id,
                                uid: id,
                                fullName: data.fullName,
                                username: data.username || data.fullName.split(' ')[0]
                                    .toLowerCase(),
                                password: data.password || (data.fullName.split(' ')[0]
                                    .toLowerCase() + '123'),
                                role: data.role || 'worker',
                                employeeType: data.employeeType || 'Company',
                                department: data.department || '',
                                skills: data.skills || '',
                                active: true,
                                createdAt: now,
                                updatedAt: now
                            };
                            this.loader.show();
                            try {
                                if (isEdit) {
                                    await DataService.updateUser(item.id, userData);
                                    this.toast.show('User updated', 'success');
                                } else {
                                    await DataService.addUser(userData);
                                    this.toast.show(
                                        `Login created — username: ${userData.username}, password: ${userData.password}`,
                                        'success', 7000);
                                }
                                this.modal.close();
                                await this.loadData();
                                this.table.render(this.data);
                            } catch (e) { this.toast.show('Failed to save: ' + (e
                                    .message || e), 'error'); } finally { this.loader
                                    .hide(); }
                        }
                    });
                }

                async editItem(id) { const item = this.data.find(v => v.id === id); if (item) this
                        .showForm(item); }

                async deleteItem(id) {
                    this.confirm.open({
                        title: 'Delete User',
                        body: 'Are you sure? This removes their login.',
                        onConfirm: async () => {
                            this.loader.show();
                            try {
                                await DataService.deleteUser(id);
                                this.toast.show('User deleted', 'warning');
                                await this.loadData();
                                this.table.render(this.data);
                            } catch (e) { this.toast.show('Failed to delete: ' + (e
                                    .message || e), 'error'); } finally { this.loader
                                    .hide(); }
                        }
                    });
                }
            },

            // ========== ACCOUNTS PAGE ==========
            Accounts: class {
                constructor(app) {
                    this.app = app;
                    this.toast = new Components.Toast();
                    this.loader = new Components.Loader();
                    this.modal = new Components.Modal();
                    this.confirm = new Components.ConfirmationDialog();
                    this.inventory = [];
                    this.purchases = [];
                    this.stockUsage = [];
                    this.activeTab = 'purchase';
                }

                async render(container) {
                    container.innerHTML = `
                        <div class="page-header"><h2>Accounts & Finance</h2></div>
                        <div class="tabs-container">
                            <button class="tab-btn active" data-tab="purchase">📥 Purchase Entry</button>
                            <button class="tab-btn" data-tab="owner">💰 Owner Cost Summary</button>
                            <button class="tab-btn" data-tab="stock">📦 Stock Usage</button>
                        </div>
                        <div id="purchaseTab" class="tab-content active"></div>
                        <div id="ownerTab" class="tab-content"></div>
                        <div id="stockTab" class="tab-content"></div>
                    `;
                    await this.loadData();
                    this.renderPurchaseTab();
                    this.renderOwnerTab();
                    this.renderStockTab();
                    this.bindTabs();
                }

                async loadData() {
                    this.loader.show();
                    try {
                        this.inventory = await DataService.getInventory();
                        this.purchases = await DataService.getPurchases();
                        this.stockUsage = await DataService.getStockUsage();
                    } catch (e) { this.toast.show('Failed to load data: ' + (e.message || e), 'error'); } finally { this
                            .loader.hide(); }
                }

                bindTabs() {
                    document.querySelectorAll('.tab-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove(
                            'active'));
                            btn.classList.add('active');
                            const tab = btn.dataset.tab;
                            document.querySelectorAll('.tab-content').forEach(el => el.classList
                                .remove('active'));
                            document.getElementById(tab + 'Tab').classList.add('active');
                        });
                    });
                }

                renderPurchaseTab() {
                    const container = document.getElementById('purchaseTab');
                    const vehicles = this.inventory.filter(v => v.inventoryStatus !== 'Delivered');
                    if (vehicles.length === 0) {
                        container.innerHTML = `<p style="color:var(--dark-gray);">No active vehicles. Add vehicles in Inventory first.</p>`;
                        return;
                    }
                    let html = `<div class="inventory-cards">`;
                    vehicles.forEach(v => {
                        html += `
                            <div class="inv-card" data-id="${v.id}">
                                <div class="inv-header">
                                    <span class="inv-number">${v.vehicleNumber}</span>
                                    <span class="badge badge-${v.inventoryStatus}">${v.inventoryStatus}</span>
                                </div>
                                <div class="inv-name">${v.vehicleName || '—'}</div>
                                <div class="inv-model">${v.model || '—'}</div>
                                <button class="btn btn-sm btn-primary add-purchase" data-vehicle="${v.vehicleNumber}" style="margin-top:0.3rem;">+ Add Purchase</button>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    container.innerHTML = html;

                    container.querySelectorAll('.add-purchase').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const vehicleNumber = btn.dataset.vehicle;
                            this.showPurchaseForm(vehicleNumber);
                        });
                    });
                    container.querySelectorAll('.inv-card').forEach(card => {
                        card.addEventListener('click', () => {
                            const vehicle = card.dataset.id;
                            const v = this.inventory.find(i => i.id === vehicle);
                            if (v) this.showPurchaseForm(v.vehicleNumber);
                        });
                    });
                }

                showPurchaseForm(vehicleNumber) {
                    const rowTemplate = (desc = '', qty = 1, amount = '') => `
                        <div class="purchase-row">
                            <input type="text" class="purchase-desc" placeholder="Description (e.g. Steel)" value="${desc}" />
                            <input type="number" class="purchase-qty" placeholder="Qty" value="${qty}" step="0.01" min="0" style="max-width:70px;" />
                            <input type="number" class="purchase-amount" placeholder="Amount ₹" value="${amount}" step="0.01" min="0" required style="max-width:100px;" />
                            <button class="remove-row" type="button" title="Remove row"><span class="material-icons" style="font-size:18px;">close</span></button>
                        </div>
                    `;

                    const form = `
                        <form id="purchaseForm">
                            <div class="form-group"><label>Vehicle</label><input type="text" value="${vehicleNumber}" disabled /></div>
                            <input type="hidden" name="vehicleNumber" value="${vehicleNumber}" />
                            <div id="purchaseRows">
                                ${rowTemplate('', 1, '')}
                            </div>
                            <button type="button" id="addRowBtn" class="add-row-btn"><span class="material-icons">add</span> Add another item</button>
                            <div style="margin-top:0.8rem;">
                                <label>Remarks (optional)</label>
                                <input type="text" name="remarks" placeholder="Any notes about this purchase" />
                            </div>
                        </form>
                    `;

                    this.modal.open({
                        title: `Add Purchases - ${vehicleNumber}`,
                        body: form,
                        confirmText: 'Save All',
                        onConfirm: async () => {
                            const rows = document.querySelectorAll('.purchase-row');
                            const purchases = [];
                            let hasError = false;
                            rows.forEach(row => {
                                const desc = row.querySelector('.purchase-desc').value.trim();
                                const qty = parseFloat(row.querySelector('.purchase-qty')
                                    .value) || 1;
                                const amount = parseFloat(row.querySelector(
                                    '.purchase-amount').value);
                                if (!desc || isNaN(amount) || amount <= 0) {
                                    hasError = true;
                                    return;
                                }
                                purchases.push({ description: desc, quantity: qty,
                                    amount: amount });
                            });
                            if (hasError || purchases.length === 0) {
                                this.toast.show(
                                    'Please fill in description and amount for each row.',
                                    'warning');
                                return;
                            }
                            this.loader.show();
                            try {
                                for (const p of purchases) {
                                    await DataService.addPurchase({
                                        vehicleNumber: vehicleNumber,
                                        materialType: p.description,
                                        quantity: p.quantity,
                                        amount: p.amount,
                                        remarks: document.querySelector(
                                            'input[name="remarks"]')?.value || ''
                                    });
                                }
                                this.toast.show(`✅ ${purchases.length} purchase(s) saved!`,
                                    'success');
                                this.modal.close();
                                await this.loadData();
                                this.renderPurchaseTab();
                                this.renderOwnerTab();
                                this.renderStockTab();
                            } catch (e) { this.toast.show('Failed: ' + (e.message || e),
                                    'error'); } finally { this.loader.hide(); }
                        }
                    });

                    const addRowBtn = document.getElementById('addRowBtn');
                    const rowsContainer = document.getElementById('purchaseRows');
                    addRowBtn.addEventListener('click', () => {
                        const newRow = document.createElement('div');
                        newRow.className = 'purchase-row';
                        newRow.innerHTML = `
                            <input type="text" class="purchase-desc" placeholder="Description" />
                            <input type="number" class="purchase-qty" placeholder="Qty" value="1" step="0.01" min="0" style="max-width:70px;" />
                            <input type="number" class="purchase-amount" placeholder="Amount ₹" step="0.01" min="0" style="max-width:100px;" />
                            <button class="remove-row" type="button"><span class="material-icons" style="font-size:18px;">close</span></button>
                        `;
                        rowsContainer.appendChild(newRow);
                        newRow.querySelector('.remove-row').addEventListener('click', () => {
                            if (rowsContainer.children.length > 1) {
                                newRow.remove();
                            } else {
                                this.toast.show('Keep at least one row', 'warning');
                            }
                        });
                    });

                    document.querySelectorAll('.purchase-row .remove-row').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const row = this.closest('.purchase-row');
                            const container = row.parentNode;
                            if (container.children.length > 1) {
                                row.remove();
                            } else {
                                this.toast.show('Keep at least one row', 'warning');
                            }
                        });
                    });
                }

                renderOwnerTab() {
                    const container = document.getElementById('ownerTab');
                    const costMap = {};
                    this.purchases.forEach(p => {
                        const key = p.vehicleNumber || 'Unassigned';
                        if (!costMap[key]) costMap[key] = { total: 0, items: [] };
                        costMap[key].total += p.amount || 0;
                        costMap[key].items.push(p);
                    });
                    const entries = Object.entries(costMap);
                    if (entries.length === 0) {
                        container.innerHTML =
                            `<p style="color:var(--dark-gray);">No purchase records yet. Add purchases in the Purchase Entry tab.</p>`;
                        return;
                    }
                    let html = `<div class="owner-summary"><h3>Total Cost Across All Vehicles</h3><div class="total-cost">₹${entries.reduce((sum, [_, val]) => sum + val.total, 0).toLocaleString()}</div></div>`;
                    entries.forEach(([vehicle, data]) => {
                        const breakdown = data.items.map(p =>
                            `<span class="item">${p.materialType || 'Item'}: ₹${p.amount} (${p.quantity || 1} units)</span>`
                            ).join('');
                        html += `
                            <div class="cost-card">
                                <div class="cost-header">
                                    <span class="cost-vehicle">🚗 ${vehicle}</span>
                                    <span class="cost-total">₹${data.total.toLocaleString()}</span>
                                </div>
                                <div class="cost-breakdown">${breakdown}</div>
                                <div class="cost-details">${data.items.length} purchase entries</div>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                }

                renderStockTab() {
                    const container = document.getElementById('stockTab');
                    const usageMap = {};
                    this.stockUsage.forEach(u => {
                        const key = u.vehicleNumber || 'Unassigned';
                        if (!usageMap[key]) usageMap[key] = [];
                        usageMap[key].push(u);
                    });
                    const purchaseMap = {};
                    this.purchases.forEach(p => {
                        const key = `${p.vehicleNumber || 'Unassigned'}-${p.materialType}`;
                        if (!purchaseMap[key]) purchaseMap[key] = 0;
                        purchaseMap[key] += p.quantity || 0;
                    });

                    let html = `<h3>Stock Usage per Vehicle</h3>
                        <p style="color:var(--dark-gray);margin-bottom:0.8rem;">Track materials used for each vehicle. Remaining stock = purchased - used.</p>
                        <div class="flex justify-between" style="margin-bottom:0.8rem;">
                            <button id="addStockUsageBtn" class="btn btn-primary"><span class="material-icons">add</span> Log Usage</button>
                        </div>
                    `;

                    if (Object.keys(usageMap).length === 0 && this.purchases.length === 0) {
                        html += `<p style="color:var(--dark-gray);">No stock usage or purchases yet.</p>`;
                        container.innerHTML = html;
                        document.getElementById('addStockUsageBtn').addEventListener('click', () => this.showStockUsageForm());
                        return;
                    }

                    const vehicleSet = new Set([...Object.keys(usageMap), ...this.purchases.map(p => p.vehicleNumber || 'Unassigned')]);
                    vehicleSet.forEach(vehicle => {
                        const usages = usageMap[vehicle] || [];
                        const totalUsed = usages.reduce((sum, u) => sum + (u.quantity || 0), 0);
                        const materialMap = {};
                        this.purchases.filter(p => p.vehicleNumber === vehicle).forEach(p => {
                            const key = p.materialType;
                            if (!materialMap[key]) materialMap[key] = { purchased: 0, used: 0 };
                            materialMap[key].purchased += p.quantity || 0;
                        });
                        usages.forEach(u => {
                            const key = u.materialType;
                            if (materialMap[key]) materialMap[key].used += u.quantity || 0;
                        });
                        const remainingHtml = Object.entries(materialMap).map(([mat, vals]) => {
                            const remaining = vals.purchased - vals.used;
                            return `<span class="item" style="background:#e2d6f3;color:#4b2e83;">${mat}: purchased ${vals.purchased}, used ${vals.used}, remaining ${remaining}</span>`;
                        }).join(' ');

                        const usageRows = usages.map(u => `
                            <div class="fc-task-item" style="padding:0.2rem 0;">
                                <span>${u.materialType}</span>
                                <span>Qty: ${u.quantity}</span>
                                <span>${u.remarks || ''}</span>
                                <button class="btn-icon delete-usage" data-usageid="${u.id}" style="color:var(--danger);"><span class="material-icons">delete</span></button>
                            </div>
                        `).join('');

                        html += `
                            <div class="stock-summary-card">
                                <div class="stock-header">
                                    <span class="stock-vehicle">🚗 ${vehicle}</span>
                                    <span class="stock-total-used">Total Used: ${totalUsed}</span>
                                </div>
                                <div class="stock-breakdown">${remainingHtml}</div>
                                <div style="margin-top:0.3rem;">${usageRows}</div>
                            </div>
                        `;
                    });

                    container.innerHTML = html;

                    document.getElementById('addStockUsageBtn').addEventListener('click', () => this.showStockUsageForm());

                    container.querySelectorAll('.delete-usage').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const usageId = btn.dataset.usageid;
                            this.confirm.open({
                                title: 'Delete Usage Record',
                                body: 'Remove this usage entry?',
                                onConfirm: async () => {
                                    this.loader.show();
                                    try {
                                        await DataService.deleteStockUsage(usageId);
                                        this.toast.show('Usage record deleted', 'warning');
                                        await this.loadData();
                                        this.renderStockTab();
                                    } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this.loader.hide(); }
                                }
                            });
                        });
                    });
                }

                showStockUsageForm() {
                    const vehicleOptions = this.inventory.filter(v => v.inventoryStatus !== 'Delivered').map(v => ({
                        value: v.vehicleNumber,
                        label: v.vehicleNumber
                    }));
                    const materialTypes = [...new Set(this.purchases.map(p => p.materialType).filter(Boolean))];
                    const form = `
                        <form id="stockUsageForm">
                            <div class="form-group">
                                <label>Vehicle *</label>
                                <select name="vehicleNumber" required>
                                    <option value="">-- Select --</option>
                                    ${vehicleOptions.map(v => `<option value="${v.value}">${v.label}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Material Type *</label>
                                <select name="materialType" required>
                                    <option value="">-- Select --</option>
                                    ${materialTypes.map(m => `<option value="${m}">${m}</option>`).join('')}
                                    <option value="__other__">Other (type below)</option>
                                </select>
                                <input type="text" name="otherMaterial" placeholder="Specify other material" style="margin-top:0.3rem;display:none;" />
                            </div>
                            <div class="form-group">
                                <label>Quantity Used *</label>
                                <input type="number" name="quantity" step="0.01" min="0.01" required />
                            </div>
                            <div class="form-group">
                                <label>Remarks (optional)</label>
                                <input type="text" name="remarks" placeholder="e.g. Used for chassis" />
                            </div>
                        </form>
                    `;

                    this.modal.open({
                        title: 'Log Stock Usage',
                        body: form,
                        confirmText: 'Save',
                        onConfirm: async () => {
                            const fd = new FormData(document.getElementById('stockUsageForm'));
                            const data = Object.fromEntries(fd.entries());
                            const vehicle = data.vehicleNumber;
                            let material = data.materialType;
                            if (material === '__other__') {
                                material = data.otherMaterial.trim();
                                if (!material) { this.toast.show('Please specify material', 'warning'); return; }
                            }
                            if (!vehicle || !material || !data.quantity) {
                                this.toast.show('Fill all required fields', 'warning');
                                return;
                            }
                            this.loader.show();
                            try {
                                await DataService.addStockUsage({
                                    vehicleNumber: vehicle,
                                    materialType: material,
                                    quantity: parseFloat(data.quantity),
                                    remarks: data.remarks || ''
                                });
                                this.toast.show('Usage logged', 'success');
                                this.modal.close();
                                await this.loadData();
                                this.renderStockTab();
                            } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this.loader.hide(); }
                        }
                    });

                    const materialSelect = document.querySelector('select[name="materialType"]');
                    const otherInput = document.querySelector('input[name="otherMaterial"]');
                    materialSelect.addEventListener('change', () => {
                        otherInput.style.display = materialSelect.value === '__other__' ? 'block' : 'none';
                    });
                }
            },

        // ==============================================================
        // 8. ROUTER
        // ==============================================================
        class Router {
            constructor(app) {
                this.app = app;
                this.auth = app.auth;
                this.content = document.getElementById('pageContent');
                this.title = document.getElementById('pageTitle');
                this.breadcrumb = document.getElementById('breadcrumbPage');
                this.currentPage = null;
                this.pages = {
                    dashboard: Pages.Dashboard,
                    inventory: Pages.Inventory,
                    sales: Pages.Sales,
                    supervisor: Pages.Supervisor,
                    worker: Pages.Worker,
                    users: Pages.Users,
                    accounts: Pages.Accounts,
                    leads: Pages.Leads,
                    assignments: Pages.Assignments,
                    fcprep: Pages.FCPrep,
                };
            }
            init() {
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.navigate(item.dataset.page);
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarBackdrop').classList.remove('visible');
                    });
                });
                document.querySelectorAll('#bottomNav .nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = btn.dataset.page;
                        if (page) this.navigate(page);
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarBackdrop').classList.remove('visible');
                    });
                });
                const hash = window.location.hash.slice(1) || this.getDefaultPage();
                this.navigate(hash);
                window.addEventListener('hashchange', () => {
                    this.navigate(window.location.hash.slice(1) || this.getDefaultPage());
                });
            }
            getDefaultPage() {
                const order = ['dashboard', 'supervisor', 'sales', 'inventory', 'worker', 'accounts', 'fcprep',
                    'assignments'
                ];
                return order.find(p => this.auth.hasPermission(p)) || 'dashboard';
            }
            async navigate(page) {
                if (!this.auth.hasPermission(page)) {
                    this.content.innerHTML =
                        `<div style="text-align:center;padding:3rem;"><span class="material-icons" style="font-size:3rem;color:var(--danger);">block</span><h2>Access Denied</h2><p>You don't have permission for this page.</p></div>`;
                    this.title.textContent = 'Access Denied';
                    this.breadcrumb.textContent = 'Access Denied';
                    this.updateBottomNav(page);
                    return;
                }
                const PageClass = this.pages[page];
                if (!PageClass) { this.content.innerHTML = '<h2>Page not found</h2>'; return; }
                document.getElementById('loadingOverlay').style.display = 'flex';
                try {
                    if (this.currentPage && typeof this.currentPage.destroy === 'function') { this
                            .currentPage.destroy(); }
                    const instance = new PageClass(this.app);
                    await instance.render(this.content);
                    this.currentPage = instance;
                    const titles = {
                        dashboard: 'Dashboard',
                        inventory: 'Inventory',
                        sales: 'Sales Orders',
                        supervisor: 'Supervisor',
                        worker: 'Worker',
                        users: 'Manage Users',
                        accounts: 'Accounts & Finance',
                        leads: 'Lead Tracker',
                        assignments: 'Assignments Overview',
                        fcprep: 'FC Preparation'
                    };
                    this.title.textContent = titles[page] || page;
                    this.breadcrumb.textContent = titles[page] || page;
                    document.querySelectorAll('.nav-item').forEach(el => { el.classList.toggle('active', el
                            .dataset.page === page); });
                    this.updateBottomNav(page);
                    if (window.location.hash !== `#${page}`) { history.pushState(null, '', `#${page}`); }
                } catch (e) { console.error(e);
                    this.content.innerHTML =
                        `<div class="text-center" style="padding:2rem;"><span class="material-icons">error</span><p>Failed to load page</p></div>`; } finally {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            }
            updateBottomNav(page) {
                document.querySelectorAll('#bottomNav .nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.page === page);
                });
            }
        }

        // ==============================================================
        // 9. MAIN APP
        // ==============================================================
        class App {
            constructor() {
                this.auth = new Auth();
                this.user = null;
                this.router = null;
                this.toast = new Components.Toast();
            }
            async init() {
                const isAuth = await this.auth.checkSession();
                if (!isAuth) { this.showLogin(); return; }

                await this.auth.refreshUser();

                this.user = this.auth.getCurrentUser();
                this.renderApp();
                this.renderBottomNav();
                this.router = new Router(this);
                this.router.init();
                document.getElementById('logoutBtn').addEventListener('click', () => { this.auth.logout(); });
                document.getElementById('menuToggle').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('open');
                    document.getElementById('sidebarBackdrop').classList.toggle('visible');
                });
                document.getElementById('sidebarBackdrop').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('sidebarBackdrop').classList.remove('visible');
                });
                const name = this.user.fullName || this.user.username || 'User';
                document.getElementById('userAvatar').textContent = name.split(' ').map(n => n[0]).join('')
                    .toUpperCase();
                document.getElementById('userName').textContent = name;
                document.getElementById('userRole').textContent = (this.user.role || 'worker').replace('_', ' ')
                    .toUpperCase();
                document.getElementById('userType').textContent = this.user.employeeType || 'Company';
                document.getElementById('userType').className =
                    `user-type ${(this.user.employeeType || 'Company').toLowerCase()}`;
                this.toast.show(`Welcome, ${name}! (${this.user.employeeType || 'Company'})`, 'success');
            }

            showLogin() {
                document.getElementById('app').innerHTML = `
                    <div class="login-container">
                        <div class="login-card">
                            <div class="login-logo"><div class="logo-icon"><span class="material-icons" style="font-size:2.5rem;">precision_manufacturing</span></div><h2>NewLuck Fleet ERP</h2></div>
                            <form id="loginForm">
                                <div class="form-group"><label>Username</label><input type="text" id="loginUsername" placeholder="Enter username" /></div>
                                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter password" /></div>
                                <div class="form-options"><label><input type="checkbox" checked /> Remember Me</label><a href="#">Forgot?</a></div>
                                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                                <div id="loginError" class="login-error" style="display:none;"></div>
                            </form>
                            <div class="login-footer">
                                <strong>Logins:</strong><br>
                                Owner / Operations Manager / Supervisor / Sales / Accounts — set up by admin.<br>
                                Workers log in with their first name + "123" (e.g. ravi / ravi123).
                            </div>
                            <div style="border-top:1px solid #eef2f6;margin-top:1rem;padding-top:0.8rem;text-align:center;font-size:0.7rem;color:var(--dark-gray);">
                                <span>© 2026 NewLuck Fleet ERP. All rights reserved.</span>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const username = document.getElementById('loginUsername').value.trim();
                    const password = document.getElementById('loginPassword').value.trim();
                    const errorEl = document.getElementById('loginError');
                    errorEl.style.display = 'none';
                    try {
                        await this.auth.login(username, password);
                        window.location.reload();
                    } catch (err) {
                        errorEl.textContent = err.message || 'Invalid credentials';
                        errorEl.style.display = 'block';
                    }
                });
            }

            renderApp() {
                const sidebar = document.getElementById('sidebarNav');
                const allPages = ['dashboard', 'inventory', 'sales', 'supervisor', 'worker', 'accounts',
                    'leads', 'users', 'assignments', 'fcprep'
                ];
                const labels = {
                    dashboard: 'Dashboard',
                    inventory: 'Inventory',
                    sales: 'Sales Orders',
                    supervisor: 'Supervisor',
                    worker: 'Worker',
                    accounts: 'Accounts',
                    leads: 'Lead Tracker',
                    users: 'Manage Users',
                    assignments: 'Assignments',
                    fcprep: 'FC Prep'
                };
                const icons = {
                    dashboard: 'dashboard',
                    inventory: 'inventory',
                    sales: 'receipt_long',
                    supervisor: 'supervisor_account',
                    worker: 'construction',
                    accounts: 'account_balance',
                    leads: 'trending_up',
                    users: 'group',
                    assignments: 'group_work',
                    fcprep: 'build'
                };
                sidebar.innerHTML = allPages.filter(p => this.auth.hasPermission(p)).map(p =>
                    `<a href="#${p}" class="nav-item" data-page="${p}"><span class="material-icons">${icons[p]}</span><span class="nav-label">${labels[p]}</span></a>`
                ).join('');
            }

            renderBottomNav() {
                const nav = document.getElementById('bottomNav');
                const pages = ['dashboard', 'inventory', 'sales', 'supervisor', 'worker', 'accounts', 'leads',
                    'fcprep', 'assignments'
                ];
                const labels = {
                    dashboard: 'Home',
                    inventory: 'Stock',
                    sales: 'Sales',
                    supervisor: 'Supervisor',
                    worker: 'Tasks',
                    accounts: 'Finance',
                    leads: 'Leads',
                    fcprep: 'FC Prep',
                    assignments: 'Assignments'
                };
                const icons = {
                    dashboard: 'home',
                    inventory: 'inventory_2',
                    sales: 'receipt',
                    supervisor: 'supervisor_account',
                    worker: 'construction',
                    accounts: 'account_balance',
                    leads: 'trending_up',
                    fcprep: 'build',
                    assignments: 'group_work'
                };
                const filtered = pages.filter(p => this.auth.hasPermission(p));
                nav.innerHTML = filtered.map(p => `
                    <button class="nav-btn" data-page="${p}">
                        <span class="material-icons">${icons[p]}</span>
                        <span class="nav-label">${labels[p]}</span>
                    </button>
                `).join('');
                nav.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const page = btn.dataset.page;
                        if (page && this.router) this.router.navigate(page);
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarBackdrop').classList.remove('visible');
                    });
                });
                const currentHash = window.location.hash.slice(1) || 'dashboard';
                nav.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.page === currentHash);
                });
            }
        }

        // ==============================================================
        // 10. BOOTSTRAP
        // ==============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const app = new App();
            app.init();
            window.__app = app;
        });
    </script>
</body>
</html>
