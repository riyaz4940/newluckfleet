            // ========== Production helpers ==========
            async _generateProductionTasks(salesOrderId, vehicleNumber, customerName, deliveryDate, req,
                orderType = 'vehicle') {
                const taskMap = {
                    'Tinkering': { dept: 'Tinkering', hours: '8 hours' },
                    'Mechanical': { dept: 'Mechanical', hours: '12 hours' },
                    'Dummy Closing': { dept: 'Dummy Closing', hours: '6 hours' },
                    'Body Coach': { dept: 'Body Coach', hours: '16 hours' },
                    'Kitchen Layout': { dept: 'Kitchen Layout', hours: '10 hours' },
                    'Painting': { dept: 'Painting', hours: '10 hours' },
                    'ACP Work': { dept: 'ACP', hours: '8 hours' },
                    'Vehicle Electrical': { dept: 'Electrical', hours: '8 hours' },
                    'Coach Electrical': { dept: 'Electrical', hours: '8 hours' },
                    'Plumbing': { dept: 'Plumbing', hours: '6 hours' },
                    'Canopy': { dept: 'Canopy', hours: '6 hours' },
                    'Tyre Change': { dept: 'Tyres', hours: '4 hours' },
                    'Glass Checking': { dept: 'Glass', hours: '4 hours' },
                    'Branding': { dept: 'Branding', hours: '6 hours' },
                    'Solar': { dept: 'Solar', hours: '4 hours' },
                    'UPS': { dept: 'UPS', hours: '4 hours' },
                    'Camera': { dept: 'Camera', hours: '3 hours' },
                    'QC': { dept: 'QC', hours: '4 hours' },
                    'Delivery': { dept: 'Delivery', hours: '2 hours' }
                };
                const taskDeps = {
                    'Tinkering': [],
                    'Mechanical': [],
                    'Dummy Closing': [],
                    'Body Coach': ['Tinkering', 'Mechanical'],
                    'Kitchen Layout': ['Body Coach'],
                    'Painting': ['Dummy Closing'],
                    'ACP Work': ['Kitchen Layout'],
                    'Vehicle Electrical': ['Mechanical'],
                    'Coach Electrical': ['Kitchen Layout'],
                    'Plumbing': ['Body Coach'],
                    'Canopy': ['Body Coach'],
                    'Tyre Change': ['Painting'],
                    'Glass Checking': ['Painting'],
                    'Branding': ['Painting'],
                    'Solar': ['Vehicle Electrical'],
                    'UPS': ['Vehicle Electrical'],
                    'Camera': ['Vehicle Electrical'],
                    'QC': [],
                    'Delivery': ['QC']
                };

                let taskKeys = [];
                if (orderType === 'vehicle') {
                    for (const key in taskMap) {
                        let shouldAdd = false;
                        if (key === 'QC') shouldAdd = true;
                        else if (key === 'Delivery') shouldAdd = true;
                        else if (key === 'Kitchen Layout' && (req.insideKitchen || req.outsideKitchen || req
                                .kitchenLayout)) shouldAdd = true;
                        else if (key === 'Body Coach' && req.bodyCoach) shouldAdd = true;
                        else if (key === 'Solar' && req.solar) shouldAdd = true;
                        else if (key === 'UPS' && req.ups) shouldAdd = true;
                        else if (key === 'Camera' && req.camera) shouldAdd = true;
                        else if (req[key.toLowerCase()] !== undefined) shouldAdd = !!req[key.toLowerCase()];
                        else if (req[key.replace(/ /g, '')] !== undefined) shouldAdd = !!req[key.replace(/ /g,
                            '')];
                        if (key === 'Painting' && req.painting) shouldAdd = true;
                        if (key === 'ACP Work' && req.acpWork) shouldAdd = true;
                        if (key === 'Plumbing' && req.plumbing) shouldAdd = true;
                        if (key === 'Canopy' && req.canopy) shouldAdd = true;
                        if (key === 'Tyre Change' && req.tyreChange) shouldAdd = true;
                        if (key === 'Glass Checking' && req.glassChecking) shouldAdd = true;
                        if (key === 'Branding' && req.branding) shouldAdd = true;
                        if (key === 'Vehicle Electrical' && req.vehicleElectrical) shouldAdd = true;
                        if (key === 'Coach Electrical' && req.coachElectrical) shouldAdd = true;
                        if (shouldAdd) taskKeys.push(key);
                    }
                } else {
                    const allowedNonVehicle = ['Body Coach', 'Kitchen Layout', 'Painting', 'Vehicle Electrical',
                        'Coach Electrical', 'Branding', 'QC', 'Delivery'
                    ];
                    for (const key of allowedNonVehicle) {
                        let shouldAdd = false;
                        if (key === 'QC') shouldAdd = true;
                        else if (key === 'Delivery') shouldAdd = true;
                        else if (key === 'Kitchen Layout' && (req.insideKitchen || req.outsideKitchen || req
                                .kitchenLayout)) shouldAdd = true;
                        else if (key === 'Body Coach' && req.bodyCoach) shouldAdd = true;
                        else if (key === 'Painting' && req.painting) shouldAdd = true;
                        else if (key === 'Vehicle Electrical' && req.vehicleElectrical) shouldAdd = true;
                        else if (key === 'Coach Electrical' && req.coachElectrical) shouldAdd = true;
                        else if (key === 'Branding' && req.branding) shouldAdd = true;
                        if (shouldAdd) taskKeys.push(key);
                    }
                }
                if (!taskKeys.includes('QC')) taskKeys.push('QC');
                if (!taskKeys.includes('Delivery')) taskKeys.push('Delivery');

                const batch = db.batch();
                for (let t = 0; t < taskKeys.length; t++) {
                    const taskName = taskKeys[t];
                    const config = taskMap[taskName];
                    const deps = taskDeps[taskName] || [];
                    const id = Utils.genId();
                    const ref = db.collection('production').doc(id);
                    batch.set(ref, {
                        id,
                        salesOrderId,
                        vehicleNumber: vehicleNumber,
                        customerName,
                        taskName,
                        department: config.dept,
                        assignedTeamId: '',
                        assignedWorkerId: '',
                        status: 'pending',
                        estimatedHours: config.hours,
                        actualHours: null,
                        startTime: null,
                        endTime: null,
                        remarks: '',
                        deliveryDate,
                        priorityScore: 0,
                        dependencyFlags: JSON.stringify(deps),
                        forceStart: false,
                        beforePhotoUploaded: false,
                        afterPhotoUploaded: false,
                        photoUploadedAt: null,
                        createdAt: Utils.dateUtils.now(),
                        updatedAt: Utils.dateUtils.now()
                    });
                }
                await batch.commit();
            },

            async _calculateAndUpdateProgress(vehicleNumber) {
                const snapshot = await db.collection('production').where('vehicleNumber', '==', vehicleNumber)
                    .get();
                let total = 0,
                    completed = 0;
                snapshot.forEach(doc => {
                    const task = doc.data();
                    total++;
                    if (task.status === 'completed') completed++;
                });
                const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
                const salesSnapshot = await db.collection('sales').where('vehicleNumber', '==', vehicleNumber)
                    .get();
                const batch = db.batch();
                let wasBelow50 = false;
                salesSnapshot.forEach(doc => {
                    const order = doc.data();
                    wasBelow50 = (order.progress || 0) < 50;
                    batch.update(doc.ref, { progress: percent });
                });
                await batch.commit();
                if (percent >= 50 && wasBelow50) this._notifySalesForPayment(vehicleNumber);
                return percent;
            },

            _notifySupervisor(vehicleNumber, taskName) { console.log(
                    `🔔 Supervisor notification: ${vehicleNumber} - ${taskName} ready for QC`); },
            _notifySalesForPayment(vehicleNumber) { console.log(
                `💰 Payment reminder: ${vehicleNumber} crossed 50%`); }
        };

        const PhotoService = {
            async uploadPhotoFile(data) {
                const payload = {
                    action: 'uploadPhotoFile',
                    vehicleNumber: data.vehicleNumber || '',
                    photoType: data.photoType || 'Before',
                    base64Data: data.base64Data || '',
                    mimeType: data.mimeType || 'image/jpeg',
                    productionId: data.productionId || '',
                    taskName: data.taskName || '',
                    uploadedBy: data.uploadedBy || ''
                };
                try {
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (result.error) throw new Error(result.error);
                    return result;
                } catch (err) { console.error('Photo upload error:', err);
                    throw err; }
            },

            async uploadVehiclePhoto(vehicleNumber, photoType, file) {
                const { base64, mimeType } = await Utils.fileToBase64(file);
                const result = await this.uploadPhotoFile({ vehicleNumber, photoType, base64Data: base64,
                    mimeType });
                if (result.url) {
                    const inventory = await DataService.getInventory();
                    const item = inventory.find(v => v.vehicleNumber === vehicleNumber);
                    if (item) {
                        const updateData = {};
                        if (photoType === 'VehicleFront') updateData.frontPhotoUrl = result.url;
                        else if (photoType === 'VehicleSide') updateData.sidePhotoUrl = result.url;
                        await DataService.updateInventory(item.id, updateData);
                    }
                }
                return result;
            },

            async uploadTaskPhoto(productionId, vehicleNumber, taskName, photoType, uploadedBy, file) {
                const { base64, mimeType } = await Utils.fileToBase64(file);
                const result = await this.uploadPhotoFile({ productionId, vehicleNumber, taskName, photoType,
                    base64Data: base64, mimeType, uploadedBy });
                if (result.url) {
                    const updateData = {};
                    if (photoType === 'Before') updateData.beforePhotoUploaded = true;
                    else if (photoType === 'After') updateData.afterPhotoUploaded = true;
                    updateData.photoUploadedAt = Utils.dateUtils.now();
                    await DataService.updateProduction(productionId, updateData);
                    await DataService.addPhoto({ productionId, vehicleNumber, taskName, type: photoType,
                        googleDriveUrl: result.url, uploadedBy });
                }
                return result;
            }
        };

                        ).join('') || '<span style="color:var(--dark-gray);">—</span>';

                const expiryBadge = (dateStr) => {
                    if (!dateStr) return '<span style="color:var(--dark-gray);">—</span>';
                    const days = Utils.dateUtils.daysUntil(dateStr);
                    const formatted = Utils.dateUtils.format(dateStr);
                    if (days < 0) return (
                        `<span class="badge badge-expired" title="Expired ${Math.abs(days)} day(s) ago">${formatted}</span>`
                        );
                    if (days <= 30) return (
                        `<span class="badge badge-pending_approval" title="Expires in ${days} day(s)">${formatted}</span>`
                        );
                    return `<span class="badge badge-running">${formatted}</span>`;
                };

                const docColumns = this.docTypes.map(doc => ({
                    key: doc,
                    label: doc,
                    render: (r) => {
                        const docs = (r.documents || '').split(',').map(d => d.trim());
                        return docs.includes(doc) ? '✅' : '❌';
                    }
                }));

                this.salesData = await DataService.getSales();
                const activeOrders = this.salesData.filter(o => o.status !== 'delivered' && o.vehicleNumber);
                const inProductionVehicles = new Set(activeOrders.map(o => o.vehicleNumber));

                const columns = isSales ? [
                    { key: 'vehicleNumber', label: 'Vehicle No' },
                    { key: 'vehicleName', label: 'Name' },
                    { key: 'category', label: 'Category', render: categoryBadges },
                    { key: 'fcStatus', label: 'FC', render: (r) => r.fcStatus === 'ready' ? '✅ Ready' :
                            r.fcStatus === 'in_progress' ? '🔧 Prep' : '—' },
                    { key: 'fcStatus', label: 'FC Status', render: (r) =>
                            r.fcStatus === 'ready' ?
                            `<span class="badge badge-fc-ready">✅ Ready</span>` :
                            r.fcStatus === 'in_progress' ?
                            `<span class="badge badge-fc-progress">🔧 Prep</span>` :
                            `<span style="color:var(--dark-gray);">—</span>` },
                    { key: 'inventoryStatus', label: 'Status', render: (r) =>
                            `<span class="badge ${r.inventoryStatus==='Delivered'?'badge-archived':r.inventoryStatus==='Available'?'badge-completed':'badge-pending'}">${r.inventoryStatus}</span>`
                        }
                ] : [
                    { key: 'photo', label: 'Photo', render: (r) => r.frontPhotoUrl ?
                            `<img class="vehicle-thumb" src="${r.frontPhotoUrl}" />` :
                            '<span class="material-icons" style="color:var(--gray);">directions_car</span>' },
                    { key: 'vehicleNumber', label: 'Vehicle No', render: (r) =>
                            `<span class="table-vehicle-link">${r.vehicleNumber}</span>` },
                    { key: 'vehicleName', label: 'Name' },
                    { key: 'model', label: 'Model' },
                    { key: 'chassisNumber', label: 'Chassis' },
                    { key: 'category', label: 'Category', render: categoryBadges },
                    { key: 'bodyShape', label: 'Body Shape', render: (r) => r.bodyShape ||
                            '<span style="color:var(--dark-gray);">—</span>' },
                    ...docColumns,
                    { key: 'fcExpiryDate', label: 'FC Expiry', render: (r) => expiryBadge(r.fcExpiryDate) },
                    { key: 'fcStatus', label: 'FC Status', render: (r) =>
                            r.fcStatus === 'ready' ?
                            `<span class="badge badge-fc-ready">✅ Ready</span>` :
                            r.fcStatus === 'in_progress' ?
                            `<span class="badge badge-fc-progress">🔧 Prep</span>` :
                            `<span style="color:var(--dark-gray);">—</span>` },
                    { key: 'inventoryStatus', label: 'Status', render: (r) => {
                            const isInProduction = inProductionVehicles.has(r.vehicleNumber);
                            let statusHtml =
                                `<span class="badge ${r.inventoryStatus==='Delivered'?'badge-archived':r.inventoryStatus==='Available'?'badge-completed':'badge-pending'}">${r.inventoryStatus}</span>`;
                            if (isInProduction && r.inventoryStatus !== 'Delivered') {
                                statusHtml += ` <span class="badge badge-in-production">⚙️ In Production</span>`;
                            }
                            if (r.fcStatus === 'in_progress') statusHtml +=
                                ` <span class="badge badge-fc-progress">🔧 Prep</span>`;
                            else if (r.fcStatus === 'ready') statusHtml +=
                                ` <span class="badge badge-fc-ready">✅ FC Ready</span>`;
                            return statusHtml;
                        } },
                    { key: 'actions', label: 'Actions', render: (r) => {
                            let btns =
                                `<button class="btn-icon view-details" data-id="${r.id}" title="View Details"><span class="material-icons">visibility</span></button>
                                <button class="btn-icon edit-inv" data-id="${r.id}"><span class="material-icons">edit</span></button>`;
                            if (r.inventoryStatus !== 'Delivered') {
                                btns +=
                                    `<button class="btn-icon archive-vehicle" data-id="${r.id}" title="Archive"><span class="material-icons">archive</span></button>`;
                            } else {
                                btns +=
                                    `<button class="btn-icon unarchive-vehicle" data-id="${r.id}" title="Restore"><span class="material-icons">unarchive</span></button>`;
                            }
                            if (canAdmin) {
                                btns +=
                                    `<button class="btn-icon delete-vehicle" data-id="${r.id}" style="color:var(--danger);" title="Delete"><span class="material-icons">delete</span></button>`;
                            }
                            return btns;
                        } }
                ];

                this.table = new Components.Table(document.getElementById('invTableContainer'), {
                    columns: columns,
                    onRowClick: (id) => this.showDetails(id),
                    onAction: isSales ? null : (e) => {
                        const t = e.target.closest('button');
                        if (!t) return;
                        const id = t.dataset.id;
                        if (t.classList.contains('view-details')) this.showDetails(id);
                        if (t.classList.contains('edit-inv')) this.editItem(id);
                        if (t.classList.contains('archive-vehicle')) this.archiveVehicle(id);
                        if (t.classList.contains('unarchive-vehicle')) this.unarchiveVehicle(id);
                        if (t.classList.contains('delete-vehicle')) this.deleteVehicle(id);
                    }
                });

                this.pagination = new Components.Pagination(document.getElementById('invPagination'), {
                    pageSize: this.pageSize,
                    total: this.filteredData.length,
                    onPageChange: (p) => {
                        this.currentPage = p;
                        this.renderAll();
                    }
                });

                if (!isSales) {
                    document.getElementById('addInvBtn').addEventListener('click', () => this.showForm());
                }

                this.renderAll();
                this.bindSearch();
            }

            async loadData() {
                this.loader.show();
                try {
                    this.data = await DataService.getInventory();
                    let updated = false;
                    for (const item of this.data) {
                        const updates = {};
                        if (item.fcExpiryDate) {
                            const newFcStatus = Utils.dateUtils.getStatus(item.fcExpiryDate);
                            if (item.fcStatus !== newFcStatus) { updates.fcStatus = newFcStatus;
                                updated = true; }
                        }
                        if (item.insuranceExpiryDate) {
                            const newInsurance = Utils.dateUtils.getStatus(item.insuranceExpiryDate);
                            if (item.insurance !== newInsurance) { updates.insurance = newInsurance;
                                updated = true; }
                        }
                        if (Object.keys(updates).length > 0) {
                            await DataService.updateInventory(item.id, updates);
                            Object.assign(item, updates);
                        }
                    }
                    this.filteredData = [...this.data];
                } catch (e) { this.toast.show('Failed to load inventory: ' + (e.message || e),
                    'error'); } finally { this.loader.hide(); }
            }

            applyFilters() {
                this.filteredData = this.data.filter(item => {
                    let match = true;
                    if (!this.showArchived && item.inventoryStatus === 'Delivered') match = false;
                    if (this.filters.fcStatus && this.filters.fcStatus !== 'All') { if (item
                            .fcStatus !== this.filters.fcStatus) match = false; }
                    if (this.filters.inventoryStatus && this.filters.inventoryStatus !== 'All') { if (item
                            .inventoryStatus !== this.filters.inventoryStatus) match = false; }
                    if (this.filters.category && this.filters.category !== 'All') { if (!(item
                            .category || '').includes(this.filters.category)) match = false; }
                    if (this.filters.bodyShape && this.filters.bodyShape !== 'All') { if (item
                            .bodyShape !== this.filters.bodyShape) match = false; }
                    if (this.searchTerm) {
                        const s = this.searchTerm.toLowerCase();
                        if (!`${item.vehicleNumber} ${item.vehicleName} ${item.model} ${item.chassisNumber||''} ${item.category} ${item.bodyShape} ${item.purchasedFrom||''} ${item.sellerPhone||''} ${item.documents||''} ${item.otherDocuments||''}`
                            .toLowerCase().includes(s)) match = false;
                    }
                    return match;
                });
                this.currentPage = 1;
                this.pagination.setTotal(this.filteredData.length);
                this.renderAll();
            }

            renderAll() {
                const start = (this.currentPage - 1) * this.pageSize;
                const end = start + this.pageSize;
                const pageData = this.filteredData.slice(start, end);
                this.table.render(pageData);
                this.renderCards(pageData);
                this.pagination.updatePageIndicator(this.currentPage);
            }

            renderCards(data) {
                const container = document.getElementById('invCards');
                if (data.length === 0) {
                    container.innerHTML =
                        '<div class="text-center" style="padding:1rem;color:var(--dark-gray);">No vehicles match.</div>';
                    return;
                }
                const activeOrders = this.salesData.filter(o => o.status !== 'delivered' && o.vehicleNumber);
                const inProductionSet = new Set(activeOrders.map(o => o.vehicleNumber));

                const html = data.map(r => {
                    const statusColor = r.inventoryStatus === 'Delivered' ? 'badge-archived' :
                        r.inventoryStatus === 'Available' ? 'badge-completed' : 'badge-pending';
                    const photoHtml = r.frontPhotoUrl ?
                        `<img class="inv-photo-thumb" src="${r.frontPhotoUrl}" />` : '';
                    let fcBadgeHtml = '';
                    if (r.fcStatus === 'in_progress') fcBadgeHtml =
                        `<span class="badge badge-fc-progress">🔧 Prep</span>`;
                    else if (r.fcStatus === 'ready') fcBadgeHtml =
                        `<span class="badge badge-fc-ready">✅ FC Ready</span>`;
                    let productionBadge = '';
                    if (inProductionSet.has(r.vehicleNumber) && r.inventoryStatus !== 'Delivered') {
                        productionBadge = `<span class="badge badge-in-production">⚙️ In Production</span>`;
                    }
                    return `
                        <div class="inv-card" data-id="${r.id}">
                            ${photoHtml}
                            <div class="inv-header">
                                <span class="inv-number">${r.vehicleNumber}</span>
                                <span class="badge ${statusColor} inv-status">${r.inventoryStatus}</span>
                            </div>
                            <div class="inv-name">${r.vehicleName || '—'}</div>
                            <div class="inv-model">${r.model || '—'}</div>
                            <div style="margin-top:0.2rem;display:flex;gap:0.3rem;flex-wrap:wrap;">
                                ${productionBadge}
                                ${fcBadgeHtml}
                            </div>
                        </div>
                    `;
                }).join('');
                container.innerHTML = html;
                container.querySelectorAll('.inv-card').forEach(el => {
                    el.addEventListener('click', () => this.showDetails(el.dataset.id));
                });
            }

            bindSearch() {
                document.getElementById('globalSearch').addEventListener('input', (e) => {
                    this.searchTerm = e.target.value.trim();
                    this.applyFilters();
                });
            }

            showDetails(id) {
                const vehicle = this.data.find(v => v.id === id);
                if (!vehicle) return;
                const docList = (vehicle.documents || '').split(',').filter(Boolean);
                const docHtml = this.docTypes.map(doc => {
                    const has = docList.includes(doc);
                    return `<span class="doc-tag ${has ? '' : 'missing'}">${has ? '✅' : '❌'} ${doc}</span>`;
                }).join('');
                const photoHtml = vehicle.frontPhotoUrl ?
                    `<img class="vehicle-photo-hero" src="${vehicle.frontPhotoUrl}" />` :
                    '<div style="background:var(--light-gray);border-radius:var(--radius);padding:0.8rem;text-align:center;color:var(--dark-gray);">No Front Photo</div>';
                const sidePhotoHtml = vehicle.sidePhotoUrl ?
                    `<img style="width:100%;max-height:150px;object-fit:cover;border-radius:var(--radius);margin-top:0.5rem;" src="${vehicle.sidePhotoUrl}" />` :
                    '';
                const fcRemarkHtml = vehicle.fcRemarks ? `
                    <div class="fc-remark-box">
                        <strong>🔧 FC Preparation Remark:</strong> ${vehicle.fcRemarks}
                    </div>
                ` : '';
                const html = `
                    <div class="vehicle-detail-card">
                        ${photoHtml}
                        ${sidePhotoHtml}
                        <div class="detail-section"><h4>📋 Basic Information</h4>
                            <div class="grid-2">
                                <div><span class="detail-label">Vehicle Number</span><br><span class="detail-value">${vehicle.vehicleNumber || '—'}</span></div>
                                <div><span class="detail-label">Vehicle Name</span><br><span class="detail-value">${vehicle.vehicleName || '—'}</span></div>
                                <div><span class="detail-label">Model</span><br><span class="detail-value">${vehicle.model || '—'}</span></div>
                                <div><span class="detail-label">Chassis Number</span><br><span class="detail-value">${vehicle.chassisNumber || '—'}</span></div>
                                <div><span class="detail-label">Category</span><br><span class="detail-value">${vehicle.category || '—'}</span></div>
                                <div><span class="detail-label">Body Shape</span><br><span class="detail-value">${vehicle.bodyShape || '—'}</span></div>
                                <div><span class="detail-label">Location</span><br><span class="detail-value">${vehicle.location || '—'}</span></div>
                                <div><span class="detail-label">Status</span><br><span class="badge ${vehicle.inventoryStatus==='Delivered'?'badge-archived':vehicle.inventoryStatus==='Available'?'badge-completed':'badge-pending'}">${vehicle.inventoryStatus}</span></div>
                            </div>
                        </div>
                        <div class="detail-section"><h4>📄 Documents</h4><div style="display:flex;flex-wrap:wrap;gap:0.3rem;">${docHtml}</div>
                            ${vehicle.otherDocuments ? `<div style="margin-top:0.3rem;"><span class="detail-label">Other Documents:</span> ${vehicle.otherDocuments}</div>` : ''}
                        </div>
                        <div class="detail-section"><h4>🔧 FC & Insurance</h4>
                            <div class="grid-3">
                                <div><span class="detail-label">FC Status</span><br><span class="badge ${vehicle.fcStatus==='Running'?'badge-running':'badge-expired'}">${vehicle.fcStatus}</span></div>
                                <div><span class="detail-label">FC Expiry</span><br><span class="detail-value">${Utils.dateUtils.format(vehicle.fcExpiryDate)}</span></div>
                                <div><span class="detail-label">Insurance</span><br><span class="badge ${vehicle.insurance==='Running'?'badge-running':'badge-expired'}">${vehicle.insurance}</span></div>
                                <div><span class="detail-label">Insurance Expiry</span><br><span class="detail-value">${Utils.dateUtils.format(vehicle.insuranceExpiryDate)}</span></div>
                            </div>
                            ${fcRemarkHtml}
                        </div>
                        <div class="detail-section"><h4>🏷️ Purchase Details</h4>
                            <div class="grid-2">
                                <div><span class="detail-label">Purchase Date</span><br><span class="detail-value">${Utils.dateUtils.format(vehicle.purchaseDate)}</span></div>
                                <div><span class="detail-label">Purchased From</span><br><span class="detail-value">${vehicle.purchasedFrom || '—'}</span></div>
                                <div><span class="detail-label">Seller Phone</span><br><span class="detail-value">${vehicle.sellerPhone || '—'}</span></div>
                            </div>
                        </div>
                        <div class="detail-section" style="font-size:0.75rem;color:var(--dark-gray);">
                            <div>Created: ${new Date(vehicle.createdAt).toLocaleString()}</div>
                            <div>Updated: ${new Date(vehicle.updatedAt).toLocaleString()}</div>
                        </div>
                    </div>
                `;
                this.modal.open({
                    title: `🚗 ${vehicle.vehicleNumber} – Details`,
                    body: html,
                    confirmText: 'Close',
                    showCancel: false,
                    onConfirm: () => this.modal.close()
                });
            }

            async archiveVehicle(id) {
                const item = this.data.find(v => v.id === id);
                if (!item) return;
                this.confirm.open({
                    title: 'Archive Vehicle',
                    body: `Archive "${item.vehicleNumber}"? This will mark it as Delivered and hide it.`,
                    onConfirm: async () => {
                        this.loader.show();
                        try {
                            await DataService.updateInventory(id, { inventoryStatus: 'Delivered' });
                            this.toast.show(`✅ "${item.vehicleNumber}" archived`, 'success');
                            await this.loadData();
                            this.applyFilters();
                        } catch (e) { this.toast.show('Failed to archive: ' + (e.message || e),
                                'error'); } finally { this.loader.hide(); }
                    }
                });
            }

            async unarchiveVehicle(id) {
                const item = this.data.find(v => v.id === id);
                if (!item) return;
                this.confirm.open({
                    title: 'Unarchive Vehicle',
                    body: `Restore "${item.vehicleNumber}" from archive? This will set it to Available.`,
                    onConfirm: async () => {
                        this.loader.show();
                        try {
                            await DataService.updateInventory(id, { inventoryStatus: 'Available' });
                            this.toast.show(`✅ "${item.vehicleNumber}" restored`, 'success');
                            await this.loadData();
                            this.applyFilters();
                        } catch (e) { this.toast.show('Failed to restore: ' + (e.message || e),
                                'error'); } finally { this.loader.hide(); }
                    }
                });
            }

            async deleteVehicle(id) {
                const item = this.data.find(v => v.id === id);
                if (!item) return;
                this.confirm.open({
                    title: 'Delete Vehicle Permanently',
                    body: `Are you sure you want to permanently delete "${item.vehicleNumber}"? This cannot be undone.`,
                    onConfirm: async () => {
                        this.loader.show();
                        try {
                            await DataService.deleteInventory(id);
                            this.toast.show(`🗑️ "${item.vehicleNumber}" deleted permanently.`,
                                'warning');
                            await this.loadData();
                            this.applyFilters();
                        } catch (e) { this.toast.show('Failed to delete: ' + (e.message || e),
                                'error'); } finally { this.loader.hide(); }
                    }
                });
            }

            showForm(item = null) {
                const isEdit = !!item;
                const existingCategories = (item?.category || '').split(',').map(c => c.trim());
                const bodyShapeOptions = ['Normal', 'Canteen', 'Container', 'Food Truck', 'Mobile Clinic'];
                const isCustomShape = item?.bodyShape && !bodyShapeOptions.includes(item.bodyShape);
                const existingDocs = (item?.documents || '').split(',').map(d => d.trim());
                const docCheckboxes = this.docTypes.map(d =>
                    `<label><input type="checkbox" name="doc_${d.replace(/ /g,'_')}" ${existingDocs.includes(d)?'checked':''} /> ${d}</label>`
                ).join('');

                const form = `
                    <form id="invForm">
                        <div class="form-row">
                            <div class="form-group"><label>Vehicle Number *</label><input type="text" name="vehicleNumber" value="${item?.vehicleNumber||''}" required style="text-transform:uppercase;" /></div>
                            <div class="form-group"><label>Vehicle Name</label><input type="text" name="vehicleName" value="${item?.vehicleName||''}" /></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Model</label><input type="text" name="model" value="${item?.model||''}" /></div>
                            <div class="form-group"><label>Chassis Number</label><input type="text" name="chassisNumber" value="${item?.chassisNumber||''}" /></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Purchase Date</label><input type="date" name="purchaseDate" value="${item?.purchaseDate||''}" /></div>
                            <div class="form-group"><label>Purchased From</label><input type="text" name="purchasedFrom" value="${item?.purchasedFrom||''}" /></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Seller Phone</label><input type="text" name="sellerPhone" value="${item?.sellerPhone||''}" /></div>
                            <div class="form-group"><label>Location</label><input type="text" name="location" value="${item?.location||''}" /></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Inventory Status</label><select name="inventoryStatus"><option ${item?.inventoryStatus==='Available'?'selected':''}>Available</option><option ${item?.inventoryStatus==='Under Maintenance'?'selected':''}>Under Maintenance</option><option ${item?.inventoryStatus==='Scrapped'?'selected':''}>Scrapped</option><option ${item?.inventoryStatus==='Delivered'?'selected':''}>Delivered</option></select></div>
                            <div class="form-group"><label>Body Shape</label>
                                <select name="bodyShape" id="bodyShapeSelect">
                                    ${bodyShapeOptions.map(o => `<option value="${o}" ${item?.bodyShape===o?'selected':''}>${o}</option>`).join('')}
                                    <option value="__other__" ${isCustomShape?'selected':''}>Other (type below)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" id="bodyShapeOtherGroup" style="${isCustomShape?'':'display:none;'}">
                            <label>Specify Body Shape</label>
                            <input type="text" name="bodyShapeOther" value="${isCustomShape?item.bodyShape:''}" />
                        </div>
                        <div class="form-group">
                            <label>Vehicle Category</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="catStock" ${existingCategories.includes('Stock')?'checked':''} /> Stock</label>
                                <label><input type="checkbox" name="catAdvance" ${existingCategories.includes('Advance')?'checked':''} /> Advance</label>
                                <label><input type="checkbox" name="catParkSale" ${existingCategories.includes('Park & Sale')?'checked':''} /> Park &amp; Sale</label>
                                <label><input type="checkbox" name="catRefurbished" ${existingCategories.includes('Refurbished')?'checked':''} /> Refurbished</label>
                            </div>
                        </div>
                        <fieldset>
                            <legend>📄 Documents</legend>
                            <div class="checkbox-group">${docCheckboxes}</div>
                            <div class="form-group" style="margin-top:0.5rem;">
                                <label>Other Documents</label>
                                <input type="text" name="otherDocuments" value="${item?.otherDocuments||''}" placeholder="e.g. Road Tax, Insurance Renewal" />
                            </div>
                        </fieldset>
                        <div class="form-row">
                            <div class="form-group"><label>FC Expiry Date</label><input type="date" name="fcExpiryDate" value="${item?.fcExpiryDate||''}" /></div>
                            <div class="form-group"><label>Insurance Expiry Date</label><input type="date" name="insuranceExpiryDate" value="${item?.insuranceExpiryDate||''}" /></div>
                        </div>
                        <div class="form-group">
                            <label>Vehicle Photos</label>
                            <div class="photo-grid">
                                <div class="photo-upload-box ${item?.frontPhotoUrl?'uploaded':''}" id="invFrontPhotoBox">
                                    <span class="photo-label">FRONT</span>
                                    ${item?.frontPhotoUrl ? `<img class="vehicle-thumb" style="width:80px;height:56px;" src="${item.frontPhotoUrl}" />` : '<span class="photo-placeholder">📤 Tap to upload</span>'}
                                    <input type="file" accept="image/*" class="photo-input" id="invFrontPhotoInput" />
                                </div>
                                <div class="photo-upload-box ${item?.sidePhotoUrl?'uploaded':''}" id="invSidePhotoBox">
                                    <span class="photo-label">SIDE</span>
                                    ${item?.sidePhotoUrl ? `<img class="vehicle-thumb" style="width:80px;height:56px;" src="${item.sidePhotoUrl}" />` : '<span class="photo-placeholder">📤 Tap to upload</span>'}
                                    <input type="file" accept="image/*" class="photo-input" id="invSidePhotoInput" />
                                </div>
                            </div>
                        </div>
                    </form>
                `;

                this.modal.open({
                    title: isEdit ? 'Edit Vehicle' : 'Add Vehicle',
                    body: form,
                    confirmText: isEdit ? 'Update' : 'Save',
                    onConfirm: async () => {
                        const fd = new FormData(document.getElementById('invForm'));
                        const data = Object.fromEntries(fd.entries());
                        const vehicleNumber = data.vehicleNumber.trim().toUpperCase();
                        if (!vehicleNumber) { this.toast.show('Vehicle Number is required',
                            'warning'); return; }
                        data.vehicleNumber = vehicleNumber;
                        const isDuplicate = await this.checkDuplicateVehicle(vehicleNumber,
                            isEdit ? item.id : null);
                        if (isDuplicate) { this.toast.show(
                                `❌ Vehicle number "${vehicleNumber}" already exists!`,
                                'error', 5000); return; }
                        const categories = [];
                        if (data.catStock) categories.push('Stock');
                        if (data.catAdvance) categories.push('Advance');
                        if (data.catParkSale) categories.push('Park & Sale');
                        if (data.catRefurbished) categories.push('Refurbished');
                        data.category = categories.join(', ');
                        data.bodyShape = data.bodyShape === '__other__' ? (data.bodyShapeOther ||
                            '') : data.bodyShape;
                        const docs = [];
                        this.docTypes.forEach(d => {
                            const key = `doc_${d.replace(/ /g,'_')}`;
                            if (data[key]) docs.push(d);
                        });
                        data.documents = docs.join(', ');
                        data.otherDocuments = data.otherDocuments || '';
                        data.fcStatus = 'not_started';
                        data.fcRemarks = '';
                        this.loader.show();
                        try {
                            if (isEdit) {
                                await DataService.updateInventory(item.id, data);
                                this.toast.show('Vehicle updated', 'success');
                            } else {
                                await DataService.addInventory(data);
                                if (this._pendingFrontPhoto && this._pendingFrontPhoto
                                    .pending) {
                                    await PhotoService.uploadVehiclePhoto(data
                                        .vehicleNumber, 'VehicleFront', this
                                        ._pendingFrontPhoto.file);
                                }
                                if (this._pendingSidePhoto && this._pendingSidePhoto
                                    .pending) {
                                    await PhotoService.uploadVehiclePhoto(data
                                        .vehicleNumber, 'VehicleSide', this
                                        ._pendingSidePhoto.file);
                                }
                                this.toast.show('Vehicle added', 'success');
                            }
                            this.modal.close();
                            this._pendingFrontPhoto = null;
                            this._pendingSidePhoto = null;
                            await this.loadData();
                            this.applyFilters();
                        } catch (e) { this.toast.show('Failed to save: ' + (e.message ||
                                e), 'error'); } finally { this.loader.hide(); }
                    }
                });

                document.getElementById('bodyShapeSelect').addEventListener('change', (e) => {
                    document.getElementById('bodyShapeOtherGroup').style.display = e.target.value ===
                        '__other__' ? '' : 'none';
                });

                const wireUpload = (boxId, inputId, photoType) => {
                    const box = document.getElementById(boxId);
                    const input = document.getElementById(inputId);
                    box.addEventListener('click', () => input.click());
                    input.addEventListener('change', async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        if (isEdit) {
                            this.loader.show();
                            try {
                                const result = await PhotoService.uploadVehiclePhoto(item
                                    .vehicleNumber, photoType, file);
                                this.toast.show('Photo saved', 'success');
                                await this.loadData();
                                this.applyFilters();
                                box.classList.add('uploaded');
                                box.querySelector('.photo-placeholder')?.remove();
                                const img = document.createElement('img');
                                img.className = 'vehicle-thumb';
                                img.style.width = '80px';
                                img.style.height = '56px';
                                img.src = result.url;
                                box.appendChild(img);
                            } catch (err) { this.toast.show('Failed to upload: ' + err
                                    .message, 'error'); } finally { this.loader
                                    .hide(); }
                        } else {
                            const key = photoType === 'VehicleFront' ?
                                '_pendingFrontPhoto' :
                                '_pendingSidePhoto';
                            this[key] = { file, pending: true };
                            box.classList.add('uploaded');
                            box.querySelector('.photo-placeholder')?.remove();
                            const img = document.createElement('img');
                            img.className = 'vehicle-thumb';
                            img.style.width = '80px';
                            img.style.height = '56px';
                            img.src = URL.createObjectURL(file);
                            box.appendChild(img);
                            this.toast.show('Photo ready — click Save to attach it',
                                'success');
                        }
                    });
                };
                wireUpload('invFrontPhotoBox', 'invFrontPhotoInput', 'VehicleFront');
                wireUpload('invSidePhotoBox', 'invSidePhotoInput', 'VehicleSide');
            }

            async editItem(id) { const item = this.data.find(v => v.id === id); if (item) this.showForm(
                item); }
        };

        // ---------- SALES (with Body Coach SS/MS/Both, Water Tank 100/200 Ltr, Design Description) ----------
        Pages.Sales = class {
            constructor(app) {
                this.app = app;
                this.toast = new Components.Toast();
                this.loader = new Components.Loader();
                this.modal = new Components.Modal();
                this.confirm = new Components.ConfirmationDialog();
                this.data = [];
                this.filteredData = [];
                this.currentPage = 1;
                this.pageSize = 5;
                this.filters = {};
                this.salesSearchTerm = '';
                this.table = null;
                this.pagination = null;
                this.filtersComp = null;
                this.vehicles = [];
                this._submitting = false;
            }

            getActiveOrderVehicleSet() {
                const activeOrders = this.data.filter(o => o.status !== 'delivered' && o.status !==
                    'in_production' && o.vehicleNumber);
                return new Set(activeOrders.map(o => o.vehicleNumber));
            }

            async render(container) {
                container.innerHTML = `
                    <div class="flex justify-between items-center" style="margin-bottom:0.8rem;">
                        <h2>Sales Orders</h2>
                        <button id="addSalesBtn" class="btn btn-primary"><span class="material-icons">add</span> New Order</button>
                    </div>
                    <div id="salesFilters"></div>
                    <div class="sales-search-bar">
                        <input type="text" id="salesSearchInput" placeholder="🔍 Search orders by Token, Vehicle, Customer..." />
                        <span style="font-size:0.8rem;color:var(--dark-gray);">${this.data.length} orders</span>
                    </div>
                    <div class="sales-table-container" id="salesTableContainer"></div>
                    <div class="sales-cards inventory-cards" id="salesCards"></div>
                    <div id="salesPagination"></div>
                `;

                await this.loadData();

                this.filtersComp = new Components.Filters(document.getElementById('salesFilters'), {
                    fields: [{ name: 'status', label: 'Status', options: ['All', 'awaiting_vehicle',
                            'draft', 'confirmed', 'in_production', 'delivered'
                        ] }],
                    onApply: (f) => { this.filters = f;
                        this.applyFilters(); }
                });

                const user = this.app.auth.getCurrentUser();
                const canEdit = ['owner', 'operations_manager'].includes(user?.role);

                this.table = new Components.Table(document.getElementById('salesTableContainer'), {
                    columns: [
                        { key: 'token', label: 'Token' },
                        { key: 'salesperson', label: 'Salesperson', render: (r) => r.salesperson ||
                                '<span style="color:var(--dark-gray);">—</span>' },
                        { key: 'vehicleNumber', label: 'Vehicle / Product', render: (r) => {
                                if (r.orderType === 'non-vehicle') {
                                    return r.productName || r.productType || 'Non‑Vehicle';
                                }
                                return r.vehicleNumber ||
                                    '<em style="color:var(--dark-gray);">To be purchased</em>';
                            } },
                        { key: 'customerName', label: 'Customer' },
                        { key: 'deliveryDate', label: 'Delivery', render: (r) => Utils.dateUtils
                                .format(r.deliveryDate) },
                        { key: 'progress', label: 'Progress %', render: (r) => {
                                const p = r.progress || 0;
                                const color = p >= 100 ? 'var(--success)' : (p > 50 ?
                                    'var(--warning)' : 'var(--accent)');
                                return `<div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${color};"></div><span>${p}%</span></div>`;
                            } },
                        { key: 'status', label: 'Status', render: (r) =>
                                `<span class="badge badge-${r.status}">${r.status.replace('_',' ')}</span>` },
                        { key: 'actions', label: 'Actions', render: (r) => {
                                let btns =
                                    `<button class="btn-icon view-order" data-id="${r.id}" title="View Details"><span class="material-icons">visibility</span></button>`;
                                if (r.status === 'awaiting_vehicle' && r.orderType ===
                                    'vehicle') {
                                    btns +=
                                        `<button class="btn btn-sm btn-primary link-vehicle" data-id="${r.id}"><span class="material-icons" style="font-size:16px;">directions_car</span> Link</button> `;
                                }
                                if (canEdit) {
                                    btns +=
                                        `<button class="btn-icon edit-sales" data-id="${r.id}"><span class="material-icons">edit</span></button>
                                                <button class="btn-icon delete-sales" data-id="${r.id}"><span class="material-icons">delete</span></button>`;
                                }
                                if (r.progress > 50 && !r.paymentReminderSent) {
                                    btns +=
                                        `<button class="btn-icon remind-sales" data-id="${r.id}" style="color:var(--warning);"><span class="material-icons">notifications_active</span></button>`;
                                }
                                return btns;
                            } }
                    ],
                    onAction: (e) => {
                        const t = e.target.closest('button');
                        if (!t) return;
                        const id = t.dataset.id;
                        if (t.classList.contains('view-order')) this.showOrderDetails(id);
                        if (t.classList.contains('edit-sales')) this.editItem(id);
                        if (t.classList.contains('delete-sales')) this.deleteItem(id);
                        if (t.classList.contains('remind-sales')) this.sendReminder(id);
                        if (t.classList.contains('link-vehicle')) this.showLinkVehicle(id);
                    },
                    onRowClick: (id) => this.showOrderDetails(id)
                });

                this.pagination = new Components.Pagination(document.getElementById('salesPagination'), {
                    pageSize: this.pageSize,
                    total: this.filteredData.length,
                    onPageChange: (p) => {
                        this.currentPage = p;
                        this.renderTable();
                    }
                });

                document.getElementById('addSalesBtn').addEventListener('click', () => this.showForm());
                document.getElementById('salesSearchInput').addEventListener('input', (e) => {
                    this.salesSearchTerm = e.target.value.trim();
                    this.applyFilters();
                });

                this.renderTable();
                this.showReminderBanner();
            }

            showReminderBanner() {
                const pending = this.data.filter(o => o.progress > 50 && !o.paymentReminderSent);
                const container = document.getElementById('pageContent');
                const existing = container.querySelector('.payment-reminder-banner');
                if (existing) existing.remove();
                if (pending.length === 0) return;
                const banner = document.createElement('div');
                banner.className = 'payment-reminder-banner';
                banner.innerHTML = `
                    <div class="flex justify-between">
                        <div>
                            <strong>⚠️ Payment Reminders Pending</strong>
                            <p style="margin:0.2rem 0;font-size:0.9rem;">
                                ${pending.length} order(s) have crossed 50% production.
                                <strong>Call the customer for remaining payment!</strong>
                            </p>
                            <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;">
                                ${pending.map(o => `
                                    <span style="background:white;padding:0.2rem 0.6rem;border-radius:12px;font-size:0.8rem;border:1px solid #ddd;">
                                        ${o.vehicleNumber || o.productName || 'Order'} (${o.progress}%) — ${o.customerPhone || 'no phone'}
                                        <button class="btn btn-sm btn-success" data-id="${o.id}">✓ Called / Remind</button>
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                        <span style="font-size:2rem;">💰</span>
                    </div>
                `;
                container.prepend(banner);
                banner.querySelectorAll('[data-id]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        await this.sendReminder(id);
                    });
                });
            }

            async sendReminder(id) {
                this.loader.show();
                try {
                    await DataService.sendPaymentReminder(id);
                    this.toast.show('Marked as followed up ✅', 'success');
                    await this.loadData();
                    this.applyFilters();
                    this.showReminderBanner();
                } catch (e) { this.toast.show('Failed to send reminder: ' + (e.message || e),
                        'error'); } finally { this.loader.hide(); }
            }

            async loadData() {
                this.loader.show();
                try {
                    this.vehicles = await DataService.getInventory();
                    this.data = await DataService.getSales();
                    this.filteredData = [...this.data];
                } catch (e) { this.toast.show('Failed to load sales: ' + (e.message || e),
                        'error'); } finally { this.loader.hide(); }
            }

            applyFilters() {
                this.filteredData = this.data.filter(item => {
                    let match = true;
                    if (this.filters.status && this.filters.status !== 'All') { if (item
                            .status !== this.filters.status) match = false; }
                    if (this.salesSearchTerm) {
                        const s = this.salesSearchTerm.toLowerCase();
                        const searchString =
                            `${item.token} ${item.vehicleNumber || ''} ${item.productName || ''} ${item.customerName || ''} ${item.salesperson || ''} ${item.customerPhone || ''} ${item.customerEmail || ''}`
                            .toLowerCase();
                        if (!searchString.includes(s)) match = false;
                    }
                    return match;
                });
                this.currentPage = 1;
                this.pagination.setTotal(this.filteredData.length);
                this.renderTable();
                this.showReminderBanner();
            }

            renderTable() {
                const start = (this.currentPage - 1) * this.pageSize;
                const end = start + this.pageSize;
                const pageData = this.filteredData.slice(start, end);
                this.table.render(pageData);
                this.renderCards(pageData);
                this.pagination.updatePageIndicator(this.currentPage);
            }

            renderCards(data) {
                const container = document.getElementById('salesCards');
                if (data.length === 0) {
                    container.innerHTML =
                        '<div class="text-center" style="padding:1rem;color:var(--dark-gray);">No orders found.</div>';
                    return;
                }
                const html = data.map(r => {
                    const statusColor = r.status || 'draft';
                    const progress = r.progress || 0;
                    const vehicleDisplay = (r.orderType === 'non-vehicle') ?
                        (r.productName || r.productType || 'Non‑Vehicle') :
                        (r.vehicleNumber || '<em style="color:var(--dark-gray);">To be purchased</em>');
                    let actionBtns =
                        `<button class="btn-icon view-order" data-id="${r.id}" title="View"><span class="material-icons">visibility</span></button>`;
                    if (r.status === 'awaiting_vehicle' && r.orderType === 'vehicle') {
                        actionBtns +=
                            `<button class="btn btn-sm btn-primary link-vehicle" data-id="${r.id}"><span class="material-icons" style="font-size:16px;">directions_car</span> Link</button>`;
                    }
                    const canEdit = ['owner', 'operations_manager'].includes(this.app.auth.getCurrentUser()
                        ?.role);
                    if (canEdit) {
                        actionBtns +=
                            `<button class="btn-icon edit-sales" data-id="${r.id}"><span class="material-icons">edit</span></button>
                            <button class="btn-icon delete-sales" data-id="${r.id}"><span class="material-icons">delete</span></button>`;
                    }
                    if (r.progress > 50 && !r.paymentReminderSent) {
                        actionBtns +=
                            `<button class="btn-icon remind-sales" data-id="${r.id}" style="color:var(--warning);"><span class="material-icons">notifications_active</span></button>`;
                    }
                    let seatworkBadge = '';
                    try {
                        const req = JSON.parse(r.requirements || '{}');
                        if (req.seatwork) seatworkBadge =
                            `<span class="badge" style="background:#e2d6f3;color:#4b2e83;">🪑 Seatwork</span>`;
                    } catch (e) {}

                    return `
                        <div class="inv-card" data-id="${r.id}">
                            <div class="inv-header">
                                <span class="inv-number">${r.token || '—'}</span>
                                <span class="badge badge-${statusColor} inv-status">${statusColor.replace('_',' ')}</span>
                            </div>
                            <div class="inv-name">${r.customerName || '—'} ${seatworkBadge}</div>
                            <div class="inv-model">${vehicleDisplay}</div>
                            <div class="inv-meta">
                                <span><span class="material-icons" style="font-size:14px;">person</span> ${r.salesperson || '—'}</span>
                                <span><span class="material-icons" style="font-size:14px;">event</span> ${Utils.dateUtils.format(r.deliveryDate)}</span>
                                <span><span class="material-icons" style="font-size:14px;">trending_up</span> ${progress}%</span>
                            </div>
                            <div class="inv-progress">
                                <div class="progress-bar" style="width:100%;"><div class="progress-fill" style="width:${progress}%;"></div><span>${progress}%</span></div>
                            </div>
                            <div class="inv-actions">${actionBtns}</div>
                        </div>
                    `;
                }).join('');
                container.innerHTML = html;

                container.querySelectorAll('.view-order').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation();
                        this.showOrderDetails(btn.dataset.id); });
                });
                container.querySelectorAll('.edit-sales').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation();
                        this.editItem(btn.dataset.id); });
                });
                container.querySelectorAll('.delete-sales').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation();
                        this.deleteItem(btn.dataset.id); });
                });
                container.querySelectorAll('.remind-sales').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation();
                        this.sendReminder(btn.dataset.id); });
                });
                container.querySelectorAll('.link-vehicle').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.stopPropagation();
                        this.showLinkVehicle(btn.dataset.id); });
                });
                container.querySelectorAll('.inv-card').forEach(card => {
                    card.addEventListener('click', () => {
                        this.showOrderDetails(card.dataset.id);
                    });
                });
            }

            showOrderDetails(id) {
                const order = this.data.find(o => o.id === id);
                if (!order) { this.toast.show('Order not found', 'error'); return; }

                let req = {};
                try { req = JSON.parse(order.requirements || '{}'); } catch (e) { req = {}; }
                const branding = req.brandingDetails || {};
                const optional = req.optional || {};
                const seatwork = req.seatwork ? '✅ Yes' : '❌ No';
                const exhaustFan = req.exhaustFan || 'None';
                const brandingStickering = req.brandingStickering || 'None';
                const bodyCoachMaterial = req.bodyCoachMaterial || 'None';
                const waterTank = req.waterTank || 'None';
                const designDescription = req.designDescription || '';

                const reqKeys = ['tinkering', 'mechanical', 'dummyClosing', 'bodyCoach', 'insideKitchen',
                    'outsideKitchen', 'kitchenLayout', 'painting', 'acpWork', 'vehicleElectrical',
                    'coachElectrical', 'upsWiring', 'normalWiring', 'plumbing', 'canopy', 'tyreChange',
                    'glassChecking', 'branding', 'solar', 'ups', 'camera'
                ];
                const reqLabels = {
                    tinkering: 'Tinkering',
                    mechanical: 'Mechanical',
                    dummyClosing: 'Dummy Closing',
                    bodyCoach: 'Body Coach',
                    insideKitchen: 'Inside Kitchen',
                    outsideKitchen: 'Outside Kitchen',
                    kitchenLayout: 'Kitchen Layout',
                    painting: 'Painting',
                    acpWork: 'ACP Work',
                    vehicleElectrical: 'Vehicle Electrical',
                    coachElectrical: 'Coach Electrical',
                    upsWiring: 'UPS Wiring',
                    normalWiring: 'Normal Wiring',
                    plumbing: 'Plumbing',
                    canopy: 'Canopy',
                    tyreChange: 'Tyre Change',
                    glassChecking: 'Glass Checking',
                    branding: 'Branding',
                    solar: 'Solar',
                    ups: 'UPS',
                    camera: 'Camera'
                };
                const reqHtml = reqKeys.map(k => {
                    const val = req[k] || false;
                    return `<span class="req-tag ${val ? 'yes' : 'no'}">${reqLabels[k] || k}: ${val ? '✅' : '❌'}</span>`;
                }).join('');

                const brandingHtml = `
                    <div style="margin-top:0.3rem;">
                        <span class="req-tag ${branding.plainSticker ? 'yes' : 'no'}">Plain Sticker: ${branding.plainSticker ? '✅' : '❌'}</span>
                        <span class="req-tag ${branding.lighting ? 'yes' : 'no'}">Lighting: ${branding.lighting ? '✅' : '❌'}</span>
                        <span class="req-tag ${branding.threeDLogo ? 'yes' : 'no'}">3D Logo: ${branding.threeDLogo ? '✅' : '❌'}</span>
                        <span class="req-tag ${branding.acpBoard ? 'yes' : 'no'}">ACP Board: ${branding.acpBoard ? '✅' : '❌'}</span>
                    </div>
                `;

                const optionalHtml = `
                    <div style="margin-top:0.3rem;">
                        <span class="req-tag ${optional.solar ? 'yes' : 'no'}">Solar: ${optional.solar ? '✅' : '❌'}</span>
                        <span class="req-tag ${optional.ups ? 'yes' : 'no'}">UPS: ${optional.ups ? '✅' : '❌'}</span>
                        <span class="req-tag ${optional.camera ? 'yes' : 'no'}">Camera: ${optional.camera ? '✅' : '❌'}</span>
                    </div>
                `;

                const vehicleDisplay = order.orderType === 'non-vehicle' ?
                    `${order.productName || order.productType || 'Non‑Vehicle'}` :
                    (order.vehicleNumber || '⏳ Awaiting vehicle purchase');

                const html = `
                    <div class="order-detail-grid">
                        <div class="detail-item"><div class="label">Token</div><div class="value">${order.token || '—'}</div></div>
                        <div class="detail-item"><div class="label">Order Type</div><div class="value">${order.orderType === 'vehicle' ? '🚗 Vehicle' : '📦 Non‑Vehicle'}</div></div>
                        <div class="detail-item"><div class="label">Seatwork</div><div class="value">${seatwork}</div></div>
                        <div class="detail-item"><div class="label">Exhaust Fan</div><div class="value">${exhaustFan}</div></div>
                        <div class="detail-item"><div class="label">Branding & Stickering</div><div class="value">${brandingStickering}</div></div>
                        <div class="detail-item"><div class="label">Body Coach Material</div><div class="value">${bodyCoachMaterial}</div></div>
                        <div class="detail-item"><div class="label">Water Tank</div><div class="value">${waterTank}</div></div>
                        ${designDescription ? `<div class="detail-item full-width"><div class="label">Design Description</div><div class="value">${designDescription}</div></div>` : ''}
                        <div class="detail-item"><div class="label">Salesperson</div><div class="value">${order.salesperson || '—'}</div></div>
                        <div class="detail-item"><div class="label">Status</div><div class="value"><span class="badge badge-${order.status}">${order.status.replace('_',' ')}</span></div></div>
                        <div class="detail-item full-width"><div class="label">Vehicle / Product</div><div class="value">${vehicleDisplay}</div></div>
                        <div class="detail-item"><div class="label">Customer</div><div class="value">${order.customerName || '—'}</div></div>
                        <div class="detail-item"><div class="label">Phone</div><div class="value">${order.customerPhone || '—'}</div></div>
                        <div class="detail-item"><div class="label">Email</div><div class="value">${order.customerEmail || '—'}</div></div>
                        <div class="detail-item"><div class="label">Delivery Date</div><div class="value">${Utils.dateUtils.format(order.deliveryDate)}</div></div>
                        <div class="detail-item"><div class="label">Progress</div><div class="value">${order.progress || 0}%</div></div>
                        <div class="detail-item"><div class="label">Advance Amount</div><div class="value">₹${(order.advanceAmount || 0).toLocaleString()}</div></div>
                        <div class="detail-item"><div class="label">Paint Colour</div><div class="value">${order.paintColour || '—'}</div></div>
                        ${order.orderType === 'non-vehicle' ? `
                            <div class="detail-item full-width"><div class="label">Product Type</div><div class="value">${order.productType || '—'}</div></div>
                        ` : ''}
                        <div class="detail-item full-width">
                            <div class="label">Requirements</div>
                            <div class="order-requirements-list">${reqHtml}</div>
                        </div>
                        ${Object.keys(branding).some(k => branding[k]) ? `
                            <div class="detail-item full-width">
                                <div class="label">Branding Details</div>
                                ${brandingHtml}
                            </div>
                        ` : ''}
                        ${Object.keys(optional).some(k => optional[k]) ? `
                            <div class="detail-item full-width">
                                <div class="label">Optional Features</div>
                                ${optionalHtml}
                            </div>
                        ` : ''}
                        ${req.remarks ? `
                            <div class="detail-item full-width">
                                <div class="label">Remarks</div>
                                <div class="value" style="font-size:0.85rem;font-weight:400;">${req.remarks}</div>
                            </div>
                        ` : ''}
                        <div class="detail-item full-width" style="border-bottom:none;padding-top:0.5rem;font-size:0.7rem;color:var(--dark-gray);">
                            <div>Created: ${new Date(order.createdAt).toLocaleString()}</div>
                            ${order.updatedAt ? `<div>Updated: ${new Date(order.updatedAt).toLocaleString()}</div>` : ''}

                                <label><input type="checkbox" name="outsideKitchen" ${chk('outsideKitchen')} /> Outside Kitchen</label>
                                <label><input type="checkbox" name="kitchenLayout" ${chk('kitchenLayout')} /> Kitchen Layout</label>
                                <label><input type="checkbox" name="painting" ${chk('painting')} /> Painting</label>

                                    <label>Design Description</label>

                                <textarea name="remarks" rows="2">${req.remarks || ''}</textarea>
                            </div>
                        </fieldset>

                        <div class="form-group">
                            <label>Status</label>
                            <select name="status">
                                <option value="draft" ${order?.status==='draft'?'selected':''}>Draft</option>
                                <option value="confirmed" ${order?.status==='confirmed'?'selected':''}>Confirmed</option>
                                <option value="in_production" ${order?.status==='in_production'?'selected':''}>In Production</option>
