                        <button class="tab-btn" data-tab="stock">📊 Stock Overview</button>
                        <button class="tab-btn" data-tab="usage">📋 Usage Log</button>
                        <button class="tab-btn" data-tab="owner">💰 Owner Overview</button>
                    </div>
                    <div id="purchaseTab" class="tab-content active"></div>
                    <div id="stockTab" class="tab-content"></div>
                    <div id="usageTab" class="tab-content"></div>
                    <div id="ownerTab" class="tab-content"></div>
                `;
                await this.loadData();
                this.renderPurchaseTab();
                this.renderStockTab();
                this.renderUsageTab();
                this.renderOwnerTab();
                this.bindTabs();
            }

            async loadData() {
                this.loader.show();
                try {
                    this.inventory = await DataService.getPurchaseInventory();
                    this.stockUsage = await DataService.getStockUsage();
                    this.vehicles = await DataService.getInventory();
                } catch (e) { this.toast.show('Failed to load data: ' + (e.message || e), 'error'); } finally { this
                        .loader.hide(); }
            }

            bindTabs() {
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove(
                            'active'));
                        btn.classList.add('active');
                        const tab = btn.dataset.tab;
                        document.querySelectorAll('.tab-content').forEach(el => el.classList
                            .remove('active'));
                        document.getElementById(tab + 'Tab').classList.add('active');
                    });
                });
            }

            renderPurchaseTab() {
                const container = document.getElementById('purchaseTab');
                const form = `
                    <form id="purchaseInvForm">
                        <div class="form-group">
                            <label>Product Name *</label>
                            <input type="text" name="productName" placeholder="e.g. Steel Sheet" required />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Quantity *</label>
                                <input type="number" name="quantity" step="0.01" min="0.01" required />
                            </div>
                            <div class="form-group">
                                <label>Per Piece Amount (₹) *</label>
                                <input type="number" name="perPieceAmount" step="0.01" min="0.01" required />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Total Amount (₹) <span style="color:var(--dark-gray);font-size:0.8rem;">(auto-calculated)</span></label>
                            <input type="number" name="totalAmount" step="0.01" readonly style="background:#f5f5f5;" />
                        </div>
                        <div class="form-group">
                            <label>Supplier (optional)</label>
                            <input type="text" name="supplier" placeholder="Supplier name" />
                        </div>
                        <button type="submit" class="btn btn-primary">Add Purchase</button>
                    </form>
                    <div style="margin-top:1rem;border-top:1px solid #eee;padding-top:1rem;">
                        <h4>Recent Purchases</h4>
                        <div id="recentPurchases"></div>
                    </div>
                `;
                container.innerHTML = form;

                const qtyInput = container.querySelector('input[name="quantity"]');
                const perPieceInput = container.querySelector('input[name="perPieceAmount"]');
                const totalInput = container.querySelector('input[name="totalAmount"]');

                const calcTotal = () => {
                    const qty = parseFloat(qtyInput.value) || 0;
                    const perPiece = parseFloat(perPieceInput.value) || 0;
                    totalInput.value = (qty * perPiece).toFixed(2);
                };
                qtyInput.addEventListener('input', calcTotal);
                perPieceInput.addEventListener('input', calcTotal);

                container.querySelector('#purchaseInvForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    const data = Object.fromEntries(fd.entries());
                    if (!data.productName || !data.quantity || !data.perPieceAmount) {
                        this.toast.show('Fill all required fields', 'warning');
                        return;
                    }
                    this.loader.show();
                    try {
                        await DataService.addPurchaseInventory({
                            productName: data.productName,
                            quantity: parseFloat(data.quantity),
                            perPieceAmount: parseFloat(data.perPieceAmount),
                            totalAmount: parseFloat(data.totalAmount),
                            supplier: data.supplier || ''
                        });
                        this.toast.show('Product added to stock', 'success');
                        e.target.reset();
                        await this.loadData();
                        this.renderPurchaseTab();
                        this.renderStockTab();
                        this.renderUsageTab();
                        this.renderOwnerTab();
                    } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this.loader
                            .hide(); }
                });

                this.renderRecentPurchases();
            }

            async renderRecentPurchases() {
                const container = document.getElementById('recentPurchases');
                const recent = this.inventory.slice(0, 5);
                if (recent.length === 0) {
                    container.innerHTML = '<p style="color:var(--dark-gray);">No purchases yet.</p>';
                    return;
                }
                let html = `<div class="table-container"><table><thead><tr><th>Product</th><th>Qty</th><th>Total Amount</th></tr></thead><tbody>`;
                recent.forEach(p => {
                    html += `<tr><td>${p.productName}</td><td>${p.quantity}</td><td>₹${(p.totalAmount || 0).toFixed(2)}</td></tr>`;
                });
                html += `</tbody></table></div>`;
                container.innerHTML = html;
            }

            renderStockTab() {
                const container = document.getElementById('stockTab');
                if (this.inventory.length === 0) {
                    container.innerHTML = '<p style="color:var(--dark-gray);">No stock items yet. Add purchases first.</p>';
                    return;
                }
                let html = `<div class="inventory-cards">`;
                this.inventory.forEach(item => {
                    const qty = item.quantity || 0;
                    const isLow = qty < 3;
                    const statusBadge = isLow ?
                        `<span class="badge badge-stock-low">⚠️ Low Stock (${qty})</span>` :
                        `<span class="badge badge-stock-ok">✅ In Stock (${qty})</span>`;
                    html += `
                        <div class="purchase-inv-card">
                            <div class="inv-header">
                                <span class="inv-product">${item.productName}</span>
                                <span class="inv-qty ${isLow ? 'low' : 'ok'}">${qty} units</span>
                            </div>
                            <div class="inv-details">
                                Per Piece: ₹${(item.perPieceAmount || 0).toFixed(2)} | Total: ₹${(item.totalAmount || 0).toFixed(2)}
                                ${item.supplier ? `| Supplier: ${item.supplier}` : ''}
                            </div>
                            <div class="inv-status">${statusBadge}</div>
                            <div class="inv-actions">
                                <button class="btn btn-sm btn-secondary edit-stock" data-id="${item.id}">Edit</button>
                                <button class="btn btn-sm btn-danger delete-stock" data-id="${item.id}">Delete</button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
                container.innerHTML = html;

                container.querySelectorAll('.edit-stock').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.editStockItem(btn.dataset.id);
                    });
                });
                container.querySelectorAll('.delete-stock').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.deleteStockItem(btn.dataset.id);
                    });
                });
            }

            async editStockItem(id) {
                const item = this.inventory.find(i => i.id === id);
                if (!item) return;
                const form = `
                    <form id="editStockForm">
                        <div class="form-group"><label>Product Name</label><input type="text" name="productName" value="${item.productName}" required /></div>
                        <div class="form-row">
                            <div class="form-group"><label>Quantity</label><input type="number" name="quantity" step="0.01" value="${item.quantity}" required /></div>
                            <div class="form-group"><label>Per Piece Amount (₹)</label><input type="number" name="perPieceAmount" step="0.01" value="${item.perPieceAmount}" required /></div>
                        </div>
                        <div class="form-group"><label>Total Amount (₹) (auto-calculated)</label><input type="number" name="totalAmount" step="0.01" value="${item.totalAmount}" readonly style="background:#f5f5f5;" /></div>
                        <div class="form-group"><label>Supplier</label><input type="text" name="supplier" value="${item.supplier || ''}" /></div>
                    </form>
                `;
                this.modal.open({
                    title: 'Edit Stock Item',
                    body: form,
                    confirmText: 'Update',
                    onConfirm: async () => {
                        const fd = new FormData(document.getElementById('editStockForm'));
                        const data = Object.fromEntries(fd.entries());
                        const qty = parseFloat(data.quantity) || 0;
                        const perPiece = parseFloat(data.perPieceAmount) || 0;
                        data.totalAmount = (qty * perPiece).toFixed(2);
                        this.loader.show();
                        try {
                            await DataService.updatePurchaseInventory(id, data);
                            this.toast.show('Stock updated', 'success');
                            this.modal.close();
                            await this.loadData();
                            this.renderStockTab();
                            this.renderOwnerTab();
                        } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this.loader
                                .hide(); }
                    }
                });
                const qtyInput = document.querySelector('input[name="quantity"]');
                const perPieceInput = document.querySelector('input[name="perPieceAmount"]');
                const totalInput = document.querySelector('input[name="totalAmount"]');
                const calcTotal = () => {
                    const q = parseFloat(qtyInput.value) || 0;
                    const p = parseFloat(perPieceInput.value) || 0;
                    totalInput.value = (q * p).toFixed(2);
                };
                qtyInput.addEventListener('input', calcTotal);
                perPieceInput.addEventListener('input', calcTotal);
            }

            async deleteStockItem(id) {
                this.confirm.open({
                    title: 'Delete Stock Item',
                    body: 'Remove this product from inventory?',
                    onConfirm: async () => {
                        this.loader.show();
                        try {
                            await DataService.deletePurchaseInventory(id);
                            this.toast.show('Stock item deleted', 'warning');
                            await this.loadData();
                            this.renderStockTab();
                            this.renderOwnerTab();
                        } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this.loader
                                .hide(); }
                    }
                });
            }

            renderUsageTab() {
                const container = document.getElementById('usageTab');
                const vehicleOptions = this.vehicles.filter(v => v.inventoryStatus !== 'Delivered').map(v => ({
                    value: v.vehicleNumber,
                    label: v.vehicleNumber
                }));
                const productOptions = this.inventory.map(v => ({
                    value: v.productName,
                    label: `${v.productName} (${v.quantity || 0} in stock)`
                }));

                const form = `
                    <form id="stockUsageForm">
                        <div class="form-group">
                            <label>Vehicle *</label>
                            <select name="vehicleNumber" required>
                                <option value="">-- Select --</option>
                                ${vehicleOptions.map(v => `<option value="${v.value}">${v.label}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Product *</label>
                            <select name="productName" required>
                                <option value="">-- Select --</option>
                                ${productOptions.map(p => `<option value="${p.value}">${p.label}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Quantity Used *</label>
                            <input type="number" name="quantity" step="0.01" min="0.01" required />
                        </div>
                        <div class="form-group">
                            <label>Remarks (optional)</label>
                            <input type="text" name="remarks" placeholder="e.g. Used for chassis" />
                        </div>
                        <button type="submit" class="btn btn-primary">Log Usage</button>
                    </form>
                    <div style="margin-top:1rem;border-top:1px solid #eee;padding-top:1rem;">
                        <h4>Recent Usage</h4>
                        <div id="recentUsage"></div>
                    </div>
                `;
                container.innerHTML = form;

                container.querySelector('#stockUsageForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData(e.target);
                    const data = Object.fromEntries(fd.entries());
                    if (!data.vehicleNumber || !data.productName || !data.quantity) {
                        this.toast.show('Fill all required fields', 'warning');
                        return;
                    }
                    this.loader.show();
                    try {
                        await DataService.addStockUsage({
                            vehicleNumber: data.vehicleNumber,
                            productName: data.productName,
                            quantity: parseFloat(data.quantity),
                            remarks: data.remarks || ''
                        });
                        this.toast.show('Usage logged - stock deducted', 'success');
                        e.target.reset();
                        await this.loadData();
                        this.renderUsageTab();
                        this.renderStockTab();
                        this.renderOwnerTab();
                    } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this.loader
                            .hide(); }
                });

                this.renderRecentUsage();
            }

            async renderRecentUsage() {
                const container = document.getElementById('recentUsage');
                const recent = this.stockUsage.slice(0, 10);
                if (recent.length === 0) {
                    container.innerHTML = '<p style="color:var(--dark-gray);">No usage records yet.</p>';
                    return;
                }
                let html = `<div class="table-container"><table><thead><tr><th>Vehicle</th><th>Product</th><th>Qty Used</th><th>Remarks</th><th>Action</th></tr></thead><tbody>`;
                recent.forEach(u => {
                    html += `<tr>
                        <td>${u.vehicleNumber}</td>
                        <td>${u.productName}</td>
                        <td>${u.quantity}</td>
                        <td>${u.remarks || ''}</td>
                        <td><button class="btn btn-sm btn-danger delete-usage" data-id="${u.id}">Delete</button></td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
                container.innerHTML = html;

                container.querySelectorAll('.delete-usage').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.dataset.id;
                        this.confirm.open({
                            title: 'Delete Usage Record',
                            body: 'This will restore the stock quantity.',
                            onConfirm: async () => {
                                this.loader.show();
                                try {
                                    await DataService.deleteStockUsage(id);
                                    this.toast.show('Usage record deleted - stock restored',
                                        'success');
                                    await this.loadData();
                                    this.renderUsageTab();
                                    this.renderStockTab();
                                    this.renderOwnerTab();
                                } catch (e) { this.toast.show('Failed: ' + e
                                        .message, 'error'); } finally { this.loader
                                        .hide(); }
                            }
                        });
                    });
                });
            }

            renderOwnerTab() {
                const container = document.getElementById('ownerTab');
                const usageByVehicle = {};
                this.stockUsage.forEach(u => {
                    if (!usageByVehicle[u.vehicleNumber]) usageByVehicle[u.vehicleNumber] = [];
                    usageByVehicle[u.vehicleNumber].push(u);
                });

                const productCosts = {};
                this.inventory.forEach(p => {
                    productCosts[p.productName] = p.perPieceAmount || 0;
                });

                if (Object.keys(usageByVehicle).length === 0) {
                    container.innerHTML =
                        '<p style="color:var(--dark-gray);">No usage records yet. Log usage to see cost overview.</p>';
                    return;
                }

                let html = `<div class="owner-summary"><h3>💰 Owner Cost Overview</h3>
                    <p style="color:var(--dark-gray);font-size:0.85rem;">Total cost per vehicle based on stock usage.</p></div>`;
                let grandTotal = 0;

                for (const [vehicle, usages] of Object.entries(usageByVehicle)) {
                    let vehicleTotal = 0;
                    const items = usages.map(u => {
                        const perPiece = productCosts[u.productName] || 0;
                        const total = perPiece * (u.quantity || 0);
                        vehicleTotal += total;
                        return {
                            product: u.productName,
                            qty: u.quantity,
                            perPiece: perPiece,
                            total: total,
                            remarks: u.remarks || ''
                        };
                    });

                    grandTotal += vehicleTotal;
                    const itemHtml = items.map(i =>
                        `<div class="cost-item"><span>${i.product} × ${i.qty}</span><span>₹${i.total.toFixed(2)} (₹${i.perPiece.toFixed(2)}/unit)</span></div>`
                    ).join('');

                    html += `
                        <div class="owner-vehicle-cost">
                            <div class="cost-header">
                                <span class="cost-vehicle">🚗 ${vehicle}</span>
                                <span class="cost-total">₹${vehicleTotal.toFixed(2)}</span>
                            </div>
                            <div class="cost-items">${itemHtml}</div>
                            <div style="font-size:0.7rem;color:var(--dark-gray);margin-top:0.2rem;">${usages.length} usage entries</div>
                        </div>
                    `;
                }

                html += `
                    <div class="owner-summary" style="margin-top:0.5rem;background:var(--primary-blue);color:white;padding:0.8rem;border-radius:var(--radius);">
                        <h3>Grand Total</h3>
                        <div class="total-cost" style="color:#ffc107;font-size:1.5rem;font-weight:700;">₹${grandTotal.toFixed(2)}</div>
                    </div>
                `;
                container.innerHTML = html;
            }
        };

        // ---------- LEADS ----------
        Pages.Leads = class {
            constructor(app) {
                this.app = app;
                this.toast = new Components.Toast();
                this.loader = new Components.Loader();
                this.modal = new Components.Modal();
                this.confirm = new Components.ConfirmationDialog();
                this.data = [];
                this.filteredData = [];
                this.currentPage = 1;
                this.pageSize = 5;
                this.searchTerm = '';
                this.table = null;
                this.pagination = null;
            }

            async render(container) {
                container.innerHTML = `
                    <div class="flex justify-between items-center" style="margin-bottom:0.8rem;">
                        <h2>Lead Tracker</h2>
                        <button id="addLeadBtn" class="btn btn-primary"><span class="material-icons">add</span> New Lead</button>
                    </div>
                    <div class="sales-search-bar">
                        <input type="text" id="leadSearchInput" placeholder="🔍 Search leads..." />
                        <span style="font-size:0.8rem;color:var(--dark-gray);">${this.data.length} leads</span>
                    </div>
                    <div id="leadsTable"></div>
                    <div id="leadsPagination"></div>
                `;

                await this.loadData();

                this.table = new Components.Table(document.getElementById('leadsTable'), {
                    columns: [
                        { key: 'leadName', label: 'Lead Name' },
                        { key: 'salesman', label: 'Salesman', render: (r) => r.salesman ||
                                '<span style="color:var(--dark-gray);">—</span>' },
                        { key: 'phone', label: 'Phone' },
                        { key: 'source', label: 'Source', render: (r) => r.source ||
                                '<span style="color:var(--dark-gray);">—</span>' },
                        { key: 'status', label: 'Status', render: (r) =>
                                `<span class="badge badge-lead-${r.status?.toLowerCase() || 'new'}">${r.status || 'New'}</span>` },
                        { key: 'actions', label: 'Actions', render: (r) =>
                                `<button class="btn-icon edit-lead" data-id="${r.id}"><span class="material-icons">edit</span></button>
                                <button class="btn-icon delete-lead" data-id="${r.id}" style="color:var(--danger);"><span class="material-icons">delete</span></button>`
                            }
                    ],
                    onAction: (e) => {
                        const t = e.target.closest('button');
                        if (!t) return;
                        if (t.classList.contains('edit-lead')) this.editItem(t.dataset.id);
                        if (t.classList.contains('delete-lead')) this.deleteItem(t.dataset.id);
                    },
                    onRowClick: (id) => this.viewLead(id)
                });

                this.pagination = new Components.Pagination(document.getElementById('leadsPagination'), {
                    pageSize: this.pageSize,
                    total: this.filteredData.length,
                    onPageChange: (p) => {
                        this.currentPage = p;
                        this.renderTable();
                    }
                });

                document.getElementById('addLeadBtn').addEventListener('click', () => this.showForm());
                document.getElementById('leadSearchInput').addEventListener('input', (e) => {
                    this.searchTerm = e.target.value.trim();
                    this.applyFilters();
                });

                this.renderTable();
            }

            async loadData() {
                this.loader.show();
                try {
                    this.data = await DataService.getLeads();
                    this.filteredData = [...this.data];
                } catch (e) { this.toast.show('Failed to load leads: ' + (e.message || e),
                        'error'); } finally { this.loader.hide(); }
            }

            applyFilters() {
                this.filteredData = this.data.filter(item => {
                    if (this.searchTerm) {
                        const s = this.searchTerm.toLowerCase();
                        const searchString =
                            `${item.leadName||''} ${item.salesman||''} ${item.phone||''} ${item.source||''} ${item.status||''}`
                            .toLowerCase();
                        if (!searchString.includes(s)) return false;
                    }
                    return true;
                });
                this.currentPage = 1;
                this.pagination.setTotal(this.filteredData.length);
                this.renderTable();
            }

            renderTable() {
                const start = (this.currentPage - 1) * this.pageSize;
                const end = start + this.pageSize;
                const pageData = this.filteredData.slice(start, end);
                this.table.render(pageData);
                this.pagination.updatePageIndicator(this.currentPage);
            }

            viewLead(id) {
                const lead = this.data.find(l => l.id === id);
                if (!lead) { this.toast.show('Lead not found', 'error'); return; }
                const html = `
                    <div class="vehicle-detail-card">
                        <div class="detail-section"><h4>📋 Lead Details</h4>
                            <div class="grid-2">
                                <div><span class="detail-label">Lead Name</span><br><span class="detail-value">${lead.leadName || '—'}</span></div>
                                <div><span class="detail-label">Salesman</span><br><span class="detail-value">${lead.salesman || '—'}</span></div>
                                <div><span class="detail-label">Phone</span><br><span class="detail-value">${lead.phone || '—'}</span></div>
                                <div><span class="detail-label">Source</span><br><span class="detail-value">${lead.source || '—'}</span></div>
                                <div><span class="detail-label">Status</span><br><span class="badge badge-lead-${lead.status?.toLowerCase() || 'new'}">${lead.status || 'New'}</span></div>
                            </div>
                        </div>
                        ${lead.remarks ? `<div class="detail-section"><h4>📝 Remarks</h4><p>${lead.remarks}</p></div>` : ''}
                        <div class="detail-section" style="font-size:0.75rem;color:var(--dark-gray);">
                            <div>Created: ${new Date(lead.createdAt).toLocaleString()}</div>
                            ${lead.updatedAt ? `<div>Updated: ${new Date(lead.updatedAt).toLocaleString()}</div>` : ''}
                        </div>
                    </div>
                `;
                this.modal.open({
                    title: `📋 ${lead.leadName || 'Lead'}`,
                    body: html,
                    confirmText: 'Close',
                    showCancel: false,
                    onConfirm: () => this.modal.close()
                });
            }

            showForm(item = null) {
                const isEdit = !!item;
                const form = `
                    <form id="leadForm">
                        <div class="form-group"><label>Lead Name *</label><input type="text" name="leadName" value="${item?.leadName||''}" required /></div>
                        <div class="form-row">
                            <div class="form-group"><label>Salesman</label>
                                <select name="salesman">
                                    <option value="">-- Select --</option>
                                    ${SALESPEOPLE.map(s => `<option value="${s}" ${item?.salesman===s?'selected':''}>${s}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group"><label>Phone</label><input type="text" name="phone" value="${item?.phone||''}" /></div>
                        </div>
                        <div class="form-group"><label>Source</label>
                            <select name="source">
                                <option value="">-- Select --</option>
                                ${LEAD_SOURCES.map(s => `<option value="${s}" ${item?.source===s?'selected':''}>${s}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group"><label>Status</label>
                            <select name="status">
                                ${LEAD_STATUSES.map(s => `<option value="${s}" ${item?.status===s?'selected':''}>${s}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group"><label>Remarks</label><textarea name="remarks" rows="2">${item?.remarks||''}</textarea></div>
                    </form>
                `;

                this.modal.open({
                    title: isEdit ? 'Edit Lead' : 'New Lead',
                    body: form,
                    confirmText: isEdit ? 'Update' : 'Save',
                    onConfirm: async () => {
                        const fd = new FormData(document.getElementById('leadForm'));
                        const data = Object.fromEntries(fd.entries());
                        if (!data.leadName) { this.toast.show('Lead Name is required',
                                'warning'); return; }
                        this.loader.show();
                        try {
                            if (isEdit) {
                                await DataService.updateLead(item.id, data);
                                this.toast.show('Lead updated', 'success');
                            } else {
                                await DataService.addLead(data);
                                this.toast.show('Lead added', 'success');
                            }
                            this.modal.close();
                            await this.loadData();
                            this.applyFilters();
                        } catch (e) { this.toast.show('Failed to save: ' + (e.message ||
                                e), 'error'); } finally { this.loader.hide(); }
                    }
                });
            }

            async editItem(id) {
                const item = this.data.find(l => l.id === id);
                if (item) this.showForm(item);
            }

            async deleteItem(id) {
                const item = this.data.find(l => l.id === id);
                if (!item) return;
                this.confirm.open({
                    title: 'Delete Lead',
                    body: `Delete "${item.leadName}"?`,
                    onConfirm: async () => {
                        this.loader.show();
                        try {
                            await DataService.deleteLead(id);
                            this.toast.show('Lead deleted', 'warning');
                            await this.loadData();
                            this.applyFilters();
                        } catch (e) { this.toast.show('Failed to delete: ' + (e
                                .message || e), 'error'); } finally { this.loader
                                .hide(); }
                    }
                });
            }
        };

                            <div class="form-group"><label>Username ${isEdit?'':'(blank = first name, lowercase)'}</label><input type="text" name="username" value="${item?.username||''}" /></div>

                            <div class="form-group"><label>Role</label>

                                    <option value="sales" ${item?.role==='sales'?'selected':''}>Sales</option>
                                    <option value="inventory" ${item?.role==='inventory'?'selected':''}>Inventory Clerk</option>
                                    <option value="operations_manager" ${item?.role==='operations_manager'?'selected':''}>Operations Manager</option>
                                    <option value="owner" ${item?.role==='owner'?'selected':''}>Owner</option>

                            <div class="form-group"><label>Employee Type</label>

                                    <option value="Company" ${item?.employeeType==='Company'?'selected':''}>Company</option>
                                    <option value="Contractual" ${item?.employeeType==='Contractual'?'selected':''}>Contractual</option>
                                </select>

                        </div>
                        <div class="form-group"><label>Department (for workers)</label>
                            <select name="department">

                        </div>
                        <div class="form-group"><label>Skills (comma separated, optional)</label><input type="text" name="skills" value="${item?.skills||''}" /></div>
                    </form>
                `;

                this.modal.open({
                    title: isEdit ? 'Edit User' : 'Add Worker/User',
                    body: form,
                    confirmText: isEdit ? 'Update' : 'Create Login',
                    onConfirm: async () => {
                        const fd = new FormData(document.getElementById('userForm'));
                        const data = Object.fromEntries(fd.entries());
                        const id = isEdit ? item.id : Utils.genId();
                        const now = Utils.dateUtils.now();
                        const userData = {
                            id: id,
                            uid: id,
                            fullName: data.fullName,
                            username: data.username || data.fullName.split(' ')[0]
                                .toLowerCase(),
                            password: data.password || (data.fullName.split(' ')[0]
                                .toLowerCase() + '123'),
                            role: data.role || 'worker',
                            employeeType: data.employeeType || 'Company',
                            department: data.department || '',
                            skills: data.skills || '',
                            active: true,
                            createdAt: now,
                            updatedAt: now
                        };
                        this.loader.show();
                        try {
                            if (isEdit) {
                                await DataService.updateUser(item.id, userData);
                                this.toast.show('User updated', 'success');
                            } else {
                                await DataService.addUser(userData);
                                this.toast.show(
                                    `Login created — username: ${userData.username}, password: ${userData.password}`,
                                    'success', 7000);
                            }
                            this.modal.close();
                            await this.loadData();

                        } catch (e) { this.toast.show('Failed to save: ' + (e
                                .message || e), 'error'); } finally { this.loader
                                .hide(); }

                });
