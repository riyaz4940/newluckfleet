                            'warning'); return; }
                    const task = tasks[0];
                    const photos = await DataService.getPhotosByVehicle(vehicleNumber);
                    const beforePhoto = photos.find(p => p.taskName === task.taskName && p.type === 'Before');
                    const afterPhoto = photos.find(p => p.taskName === task.taskName && p.type === 'After');
                    let photoHtml = '<div class="photo-grid">';
                    photoHtml += beforePhoto ?
                        `<div class="photo-upload-box uploaded" style="cursor:default;"><span class="photo-label">BEFORE</span><img class="vehicle-thumb" style="width:100px;height:70px;" src="${beforePhoto.googleDriveUrl}" /></div>` :
                        `<div class="photo-upload-box" style="cursor:default;">Before ❌</div>`;
                    photoHtml += afterPhoto ?
                        `<div class="photo-upload-box uploaded" style="cursor:default;"><span class="photo-label">AFTER</span><img class="vehicle-thumb" style="width:100px;height:70px;" src="${afterPhoto.googleDriveUrl}" /></div>` :
                        `<div class="photo-upload-box" style="cursor:default;">After ❌</div>`;
                    photoHtml += '</div>';

                    const form = `
                        <p><strong>${task.vehicleNumber || task.taskName} - ${task.taskName}</strong></p>
                        <p>Worker(s): ${(task.assignedWorkerId || '').split(',').filter(Boolean).map(id => this.workers.find(w => String(w.id) === id.trim())?.name || 'Unknown').join(', ') || 'Unassigned'}</p>
                        <p>Estimated: ${task.estimatedHours} hrs | Actual: ${task.actualHours ? task.actualHours.toFixed(1) : '--'} hrs</p>
                        ${photoHtml}
                        <div class="form-group"><label>Remarks</label><textarea id="qcRemarks" rows="2">${task.remarks || ''}</textarea></div>
                        <div class="form-group">
                            <label>Decision</label>
                            <select id="qcDecision">
                                <option value="Approved">✅ Accept</option>
                                <option value="Rework">🔄 Rework</option>
                                <option value="Rejected">❌ Reject</option>
                            </select>
                        </div>
                    `;

                    this.modal.open({
                        title: `Site Visit / QC Check - ${task.vehicleNumber || task.taskName}`,
                        body: form,
                        confirmText: 'Submit Decision',
                        onConfirm: async () => {
                            const decision = document.getElementById('qcDecision').value;
                            const remarks = document.getElementById('qcRemarks').value;
                            this.loader.show();
                            try {
                                await DataService.approveTask(task.id, decision, remarks);
                                this.toast.show(`Task ${decision.toLowerCase()}`, 'success');
                                this.modal.close();
                                await this.loadData();
                                this.renderQueue();
                                this.renderStats();
                                this.renderAssignmentsOverview();
                            } catch (e) { this.toast.show('Failed to update: ' + (e
                                    .message || e), 'error'); } finally { this.loader
                                    .hide(); }
                        }
                    });
                }

                async showDelivery(vehicleNumber) {
                    const vehicle = this.priorityQueue.find(v => v.vehicleNumber === vehicleNumber || (v
                            .orderType === 'non-vehicle' && v.productName === vehicleNumber));
                    if (!vehicle) { this.toast.show('Item not found', 'warning'); return; }
                    let deliveries = await DataService.getDelivery();
                    let delivery = deliveries.find(d => d.vehicleNumber === vehicleNumber);
                    if (!delivery) {
                        await DataService.addDelivery({
                            productionId: null,
                            vehicleNumber: vehicleNumber,
                            status: 'Ready',
                            estimatedDate: vehicle.deliveryDate,
                            actualDate: '',
                            keysHandoverPhotoUrl: '',
                            remarks: ''
                        });
                        deliveries = await DataService.getDelivery();
                        delivery = deliveries.find(d => d.vehicleNumber === vehicleNumber);
                    }
                    if (!delivery) { this.toast.show('Delivery record not found', 'error'); return; }

                    const form = `
                        <p><strong>${vehicleNumber}</strong> — ready for delivery</p>
                        <p>Estimated Delivery: ${Utils.dateUtils.format(delivery.estimatedDate)}</p>
                        <p>Status: ${delivery.status}</p>
                        <div class="form-group"><label>Keys Handover Photo</label>
                            <div class="photo-upload-box" id="deliveryPhotoBox">
                                ${delivery.keysHandoverPhotoUrl ? '✅ Photo uploaded' : '📤 Tap to upload'}
                                <input type="file" accept="image/*" id="deliveryPhotoInput" />
                            </div>
                        </div>
                        <div class="form-group"><label>Remarks</label><textarea id="deliveryRemarks" rows="2">${delivery.remarks || ''}</textarea></div>
                        <div class="form-group">
                            <label>Action</label>
                            <select id="deliveryAction">
                                <option value="Delivered" ${delivery.status === 'Delivered' ? 'selected' : ''}>Mark as Delivered</option>
                                <option value="Completed" ${delivery.status === 'Completed' ? 'selected' : ''}>Mark as Completed</option>
                            </select>
                        </div>
                    `;

                    this.modal.open({
                        title: `Delivery - ${vehicleNumber}`,
                        body: form,
                        confirmText: 'Update',
                        onConfirm: async () => {
                            const action = document.getElementById('deliveryAction').value;
                            const remarks = document.getElementById('deliveryRemarks').value;
                            const photoInput = document.getElementById('deliveryPhotoInput');
                            let photoUrl = delivery.keysHandoverPhotoUrl;
                            if (photoInput.files.length > 0) {
                                try {
                                    const file = photoInput.files[0];
                                    const { base64, mimeType } = await Utils.fileToBase64(
                                        file);
                                    const result = await PhotoService.uploadPhotoFile({
                                        vehicleNumber: vehicleNumber,
                                        photoType: 'KeysHandover',
                                        base64Data: base64,
                                        mimeType: mimeType,
                                        productionId: delivery.productionId || '',
                                        taskName: 'Delivery',
                                        uploadedBy: this.app.auth.getCurrentUser()
                                            ?.id || ''
                                    });
                                    photoUrl = result.url;
                                } catch (err) {
                                    this.toast.show('Failed to upload photo: ' + err
                                        .message, 'error');
                                    return;
                                }
                            }
                            this.loader.show();
                            try {
                                await DataService.completeDelivery(delivery.id, action,
                                    remarks, photoUrl);
                                this.toast.show(
                                    `Delivery ${action.toLowerCase()} — actual date recorded`,
                                    'success');
                                this.modal.close();
                                await this.loadData();
                                this.renderQueue();
                                this.renderAssignmentsOverview();
                            } catch (e) { this.toast.show('Failed to update: ' + (e
                                    .message || e), 'error'); } finally { this.loader
                                    .hide(); }
                        }
                    });

                    document.getElementById('deliveryPhotoBox')?.addEventListener('click', () => {
                        document.getElementById('deliveryPhotoInput').click();
                    });
                }

                renderAssignmentsOverview() {
                    const container = document.getElementById('assignmentsOverview');
                    const assigned = this.data.filter(t => t.assignedWorkerId);
                    if (assigned.length === 0) {
                        container.innerHTML =
                            `<div class="no-assignments">No tasks assigned yet.</div>`;
                        return;
                    }
                    const groups = {};
                    assigned.forEach(t => {
                        const key = t.vehicleNumber || 'Non-Vehicle';
                        if (!groups[key]) groups[key] = [];
                        groups[key].push(t);
                    });
                    let html = '';
                    for (const [vehicle, tasks] of Object.entries(groups)) {
                        const workerNames = tasks.map(t => {
                            const ids = (t.assignedWorkerId || '').split(',').filter(Boolean);
                            return ids.map(id => this.workers.find(w => String(w.id) === id.trim())
                                ?.name || 'Unknown').join(', ');
                        }).filter(Boolean);
                        const uniqueWorkers = [...new Set(workerNames)];
                        html += `<div class="assign-item">
                            <div class="vehicle">${vehicle}</div>
                            <div class="worker">👷 ${uniqueWorkers.join(', ') || 'No worker'}</div>
                            <div><span class="badge badge-${tasks[0].status} status-badge">${tasks[0].status}</span> ${tasks.length} task(s)</div>
                        </div>`;
                    }
                    container.innerHTML = html;
                }
            },

            // ========== FC Preparation Page ==========
            FCPrep: class {
                constructor(app) {
                    this.app = app;
                    this.toast = new Components.Toast();
                    this.loader = new Components.Loader();
                    this.modal = new Components.Modal();
                    this.confirm = new Components.ConfirmationDialog();
                    this.inventory = [];
                    this.fcTasks = [];
                    this.workers = [];
                    this.vehiclePhotos = {};
                    this.productionTasks = [];
                }

                async render(container) {
                    container.innerHTML = `
                        <div class="page-header"><h2>🔧 FC Preparation</h2>
                            <p style="color:var(--dark-gray);font-size:0.85rem;">Vehicles being restored for Fitness Certificate (FC). 
                            <strong>Only vehicles not in production, or with Tinkering, Mechanical & Painting completed</strong> are shown.</p>
                        </div>
                        <div id="fcInventoryCards" class="inventory-cards"></div>
                    `;
                    await this.loadData();
                    this.renderCards();
                }

                async loadData() {
                    this.loader.show();
                    try {
                        const [inventory, fcTasks, workers, production] = await Promise.all([
                            DataService.getInventory(),
                            DataService.getFCTasks(),
                            DataService.getWorkers(),
                            DataService.getProduction()
                        ]);
                        this.productionTasks = production;
                        this.workers = workers;
                        this.fcTasks = fcTasks;

                        let filtered = inventory.filter(v => v.inventoryStatus !== 'Delivered' && v.fcStatus !== 'ready');

                        const finalList = [];
                        for (const v of filtered) {
                            const prodTasks = production.filter(p => p.vehicleNumber === v.vehicleNumber);
                            const hasProd = prodTasks.length > 0;
                            if (!hasProd) {
                                finalList.push(v);
                            } else {
                                const requiredTasks = ['Tinkering', 'Mechanical', 'Painting'];
                                const allCompleted = requiredTasks.every(taskName => {
                                    const task = prodTasks.find(p => p.taskName === taskName);
                                    return task && task.status === 'completed';
                                });
                                if (allCompleted) {
                                    finalList.push(v);
                                }
                            }
                        }
                        this.inventory = finalList;
                        this.vehiclePhotos = {};
                        this.inventory.forEach(v => { this.vehiclePhotos[v.vehicleNumber] = v.frontPhotoUrl ||
                                ''; });
                    } catch (e) { this.toast.show('Failed to load data: ' + (e.message || e), 'error'); } finally { this
                            .loader.hide(); }
                }

                renderCards() {
                    const container = document.getElementById('fcInventoryCards');
                    if (this.inventory.length === 0) {
                        container.innerHTML =
                            `<p style="color:var(--dark-gray);">No vehicles available for FC preparation.</p>`;
                        return;
                    }

                    const html = this.inventory.map(v => {
                        const tasks = this.fcTasks.filter(t => t.vehicleNumber === v.vehicleNumber);
                        const totalTasks = tasks.length;
                        const completed = tasks.filter(t => t.status === 'completed').length;
                        const progress = totalTasks > 0 ? Math.round((completed / totalTasks) * 100) : 0;
                        const fcStatus = v.fcStatus || 'not_started';
                        const statusLabel = fcStatus === 'ready' ? '✅ Ready' :
                            fcStatus === 'in_progress' ? '🔧 In Progress' : '⏳ Not Started';
                        const statusClass = fcStatus === 'ready' ? 'badge-fc-ready' :
                            fcStatus === 'in_progress' ? 'badge-fc-progress' : 'badge-draft';

                        const photoUrl = this.vehiclePhotos[v.vehicleNumber] || '';
                        const photoHtml = photoUrl ?
                            `<img class="inv-photo-thumb" src="${photoUrl}" />` :
                            '';

                        let taskListHtml = '';
                        if (tasks.length > 0) {
                            taskListHtml = tasks.map(t => {
                                    const workerName = t.assignedWorkerId ? this.workers.find(w => String(w.id) === t.assignedWorkerId)?.name || 'Unknown' : 'Unassigned';
                                    return `
                                        <div class="fc-task-item">
                                            <span class="task-name">${t.taskName}</span>
                                            <span class="task-status badge badge-${t.status}">${t.status}</span>
                                            <span class="task-worker">👷 ${workerName}</span>
                                        </div>
                                    `;
                                }).join('');
                        } else {
                            taskListHtml = `<div style="color:var(--dark-gray);font-size:0.8rem;">No tasks assigned yet.</div>`;
                        }

                        return `
                            <div class="inv-card" data-id="${v.id}" data-vehicle="${v.vehicleNumber}">
                                ${photoHtml}
                                <div class="inv-header">
                                    <span class="inv-number">${v.vehicleNumber}</span>
                                    <span class="badge ${statusClass}">${statusLabel}</span>
                                </div>
                                <div class="inv-name">${v.vehicleName || '—'}</div>
                                <div class="inv-model">${v.model || '—'}</div>
                                <div style="margin-top:0.3rem;">
                                    <div class="flex justify-between items-center">
                                        <span style="font-size:0.8rem;color:var(--dark-gray);">Progress</span>
                                        <span style="font-size:0.8rem;font-weight:600;">${progress}%</span>
                                    </div>
                                    <div class="fc-progress-bar"><div class="fc-progress-fill" style="width:${progress}%;"></div></div>
                                </div>
                                <div style="margin-top:0.3rem;">
                                    <strong style="font-size:0.8rem;">Tasks:</strong>
                                    <div style="margin-top:0.2rem;">${taskListHtml}</div>
                                </div>
                                ${v.fcRemarks ? `<div class="fc-remark-box">📝 ${v.fcRemarks}</div>` : ''}
                                <div class="inv-actions" style="display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.3rem;">
                                    <button class="btn btn-sm btn-primary manage-fc" data-vehicle="${v.vehicleNumber}">Manage Tasks</button>
                                    ${fcStatus !== 'ready' ? `<button class="btn btn-sm btn-success mark-ready" data-vehicle="${v.vehicleNumber}" ${tasks.length === 0 || completed < totalTasks ? 'disabled' : ''}>Mark Ready for FC</button>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');

                    container.innerHTML = html;

                    container.querySelectorAll('.manage-fc').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.manageFCTasks(btn.dataset.vehicle);
                        });
                    });

                    container.querySelectorAll('.mark-ready').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this.markReady(btn.dataset.vehicle);
                        });
                    });

                    container.querySelectorAll('.inv-card').forEach(card => {
                        card.addEventListener('click', () => {
                            this.toast.show('Click Manage Tasks to assign work', 'info');
                        });
                    });
                }

                async manageFCTasks(vehicleNumber) {
                    const allTasks = await DataService.getFCTasksByVehicle(vehicleNumber);
                    const vehicle = this.inventory.find(v => v.vehicleNumber === vehicleNumber);
                    if (!vehicle) { this.toast.show('Vehicle not found', 'error'); return; }

                    const taskOptions = FC_TASK_TYPES.map(t => ({ value: t, label: t }));
                    let existingTasksHtml = allTasks.map(t => {
                            const workerName = t.assignedWorkerId ? this.workers.find(w => String(w.id) === t.assignedWorkerId)?.name || 'Unknown' : 'Unassigned';
                            return `
                                <div class="fc-task-item">
                                    <span class="task-name">${t.taskName}</span>
                                    <span class="task-status badge badge-${t.status}">${t.status}</span>
                                    <span class="task-worker">👷 ${workerName}</span>
                                    <div style="display:flex;gap:0.3rem;">
                                        <button class="btn btn-sm btn-secondary update-fc-task" data-taskid="${t.id}" data-vehicle="${vehicleNumber}">Update</button>
                                        <button class="btn btn-sm btn-danger delete-fc-task" data-taskid="${t.id}" data-vehicle="${vehicleNumber}">Delete</button>
                                    </div>
                                </div>
                            `;
                        }).join('') || '<div style="color:var(--dark-gray);">No tasks yet.</div>';

                    const form = `
                        <form id="fcTaskForm">
                            <div class="form-group"><label>Vehicle</label><input type="text" value="${vehicleNumber}" disabled /></div>
                            <div class="form-group"><label>Add New Task</label>
                                <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                                    <select id="newTaskSelect" style="flex:1;min-width:120px;">
                                        ${taskOptions.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
                                    </select>
                                    <button type="button" id="addFcTaskBtn" class="btn btn-primary btn-sm">Add</button>
                                </div>
                            </div>
                            <div style="margin-top:0.8rem;">
                                <strong>Existing Tasks</strong>
                                <div id="fcTaskList">${existingTasksHtml}</div>
                            </div>
                        </form>
                    `;

                    this.modal.open({
                        title: `FC Tasks - ${vehicleNumber}`,
                        body: form,
                        confirmText: 'Close',
                        showCancel: false,
                        onConfirm: () => this.modal.close()
                    });

                    document.getElementById('addFcTaskBtn').addEventListener('click', async () => {
                        const taskName = document.getElementById('newTaskSelect').value;
                        if (!taskName) { this.toast.show('Select a task', 'warning'); return; }
                        if (allTasks.some(t => t.taskName === taskName)) {
                            this.toast.show('Task already exists for this vehicle', 'warning');
                            return;
                        }
                        this.loader.show();
                        try {
                            await DataService.addFCTask({
                                vehicleNumber: vehicleNumber,
                                taskName: taskName,
                                status: 'pending',
                                assignedWorkerId: '',
                                remarks: ''
                            });
                            this.toast.show('Task added', 'success');
                            this.modal.close();
                            await this.loadData();
                            this.renderCards();
                            this.manageFCTasks(vehicleNumber);
                        } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this
                                .loader.hide(); }
                    });

                    document.querySelectorAll('.update-fc-task').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const taskId = btn.dataset.taskid;
                            const task = allTasks.find(t => t.id === taskId);
                            if (!task) return;
                            const workerOptions = this.workers.map(w =>
                                `<option value="${w.id}" ${task.assignedWorkerId === w.id ? 'selected' : ''}>${w.name} (${w.department})</option>`
                                ).join('');
                            const updateForm = `
                                <form id="updateFcTaskForm">
                                    <div class="form-group"><label>Task</label><input type="text" value="${task.taskName}" disabled /></div>
                                    <div class="form-group"><label>Assign Worker</label>
                                        <select name="assignedWorkerId">
                                            <option value="">-- Unassigned --</option>
                                            ${workerOptions}
                                        </select>
                                    </div>
                                    <div class="form-group"><label>Status</label>
                                        <select name="status">
                                            <option value="pending" ${task.status==='pending'?'selected':''}>Pending</option>
                                            <option value="in_progress" ${task.status==='in_progress'?'selected':''}>In Progress</option>
                                            <option value="completed" ${task.status==='completed'?'selected':''}>Completed</option>
                                        </select>
                                    </div>
                                    <div class="form-group"><label>Remarks</label><textarea name="remarks" rows="2">${task.remarks || ''}</textarea></div>
                                </form>
                            `;
                            this.modal.open({
                                title: 'Update Task',
                                body: updateForm,
                                confirmText: 'Update',
                                onConfirm: async () => {
                                    const fd = new FormData(document.getElementById(
                                        'updateFcTaskForm'));
                                    const data = Object.fromEntries(fd.entries());
                                    this.loader.show();
                                    try {
                                        await DataService.updateFCTask(taskId, data);
                                        this.toast.show('Task updated', 'success');
                                        this.modal.close();
                                        await this.loadData();
                                        this.renderCards();
                                        this.manageFCTasks(vehicleNumber);
                                    } catch (e) { this.toast.show('Failed: ' + e
                                            .message, 'error'); } finally { this
                                            .loader.hide(); }
                                }
                            });
                        });
                    });

                    document.querySelectorAll('.delete-fc-task').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const taskId = btn.dataset.taskid;
                            this.confirm.open({
                                title: 'Delete Task',
                                body: 'Remove this task?',
                                onConfirm: async () => {
                                    this.loader.show();
                                    try {
                                        await DataService.deleteFCTask(taskId);
                                        this.toast.show('Task deleted', 'warning');
                                        await this.loadData();
                                        this.renderCards();
                                        this.manageFCTasks(vehicleNumber);
                                    } catch (e) { this.toast.show('Failed: ' +
                                            e.message, 'error'); } finally { this
                                            .loader.hide(); }
                                }
                            });
                        });
                    });
                }

                async markReady(vehicleNumber) {
                    const tasks = await DataService.getFCTasksByVehicle(vehicleNumber);
                    const total = tasks.length;
                    const completed = tasks.filter(t => t.status === 'completed').length;
                    if (total === 0 || completed < total) {
                        this.toast.show('Complete all tasks before marking ready', 'warning');
                        return;
                    }
                    const form = `
                        <div class="form-group"><label>FC Remark (optional)</label>
                            <textarea id="fcRemarkInput" rows="3" placeholder="e.g. All work done, pending RTO inspection"></textarea>
                        </div>
                    `;
                    this.modal.open({
                        title: 'Mark Vehicle Ready for FC',
                        body: form,
                        confirmText: 'Mark Ready',
                        onConfirm: async () => {
                            const remark = document.getElementById('fcRemarkInput').value.trim();
                            this.loader.show();
                            try {
                                await DataService.updateInventory(
                                    this.inventory.find(v => v.vehicleNumber === vehicleNumber).id, {
                                        fcStatus: 'ready',
                                        fcRemarks: remark || 'Ready for FC'
                                    }
                                );
                                this.toast.show('✅ Vehicle marked ready for FC', 'success');
                                this.modal.close();
                                await this.loadData();
                                this.renderCards();
                            } catch (e) { this.toast.show('Failed: ' + e.message,
                                    'error'); } finally { this.loader.hide(); }
                        }
                    });
                }
            },

            // ========== ASSIGNMENTS PAGE ==========
            Assignments: class {
                constructor(app) {
                    this.app = app;
                    this.toast = new Components.Toast();
                    this.loader = new Components.Loader();
                    this.modal = new Components.Modal();
                    this.confirm = new Components.ConfirmationDialog();
                    this.data = [];
                    this.workers = [];
                }
                async render(container) {
                    container.innerHTML = `
                        <div class="page-header"><h2>👷 Assignments Overview</h2>
                            <p style="color:var(--dark-gray);font-size:0.85rem;">All tasks with assigned workers. Click "Unassign" to remove worker and make task available.</p>
                        </div>
                        <div id="assignmentsGrid" class="assignments-grid"></div>
                    `;
                    await this.loadData();
                    this.renderGrid();
                }

                async loadData() {
                    this.loader.show();
                    try {
                        const [production, fcTasks, workers] = await Promise.all([
                            DataService.getProduction(),
                            DataService.getFCTasks(),
                            DataService.getWorkers()
                        ]);
                        this.data = [...production, ...fcTasks.map(t => ({ ...t, type: 'fc' }))];
                        this.workers = workers;
                    } catch (e) { this.toast.show('Failed to load: ' + (e.message || e), 'error'); } finally { this
                            .loader.hide(); }
                }

                renderGrid() {
                    const container = document.getElementById('assignmentsGrid');
                    const assigned = this.data.filter(t => t.assignedWorkerId);
                    if (assigned.length === 0) {
                        container.innerHTML =
                            `<div class="text-center" style="padding:2rem;color:var(--dark-gray);">No tasks assigned yet.</div>`;
                        return;
                    }
                    const groups = {};
                    assigned.forEach(t => {
                        const key = t.vehicleNumber || 'Non-Vehicle';
                        if (!groups[key]) groups[key] = [];
                        groups[key].push(t);
                    });
                    let html = '';
                    for (const [vehicle, tasks] of Object.entries(groups)) {
                        const workerNames = tasks.map(t => {
                            const ids = (t.assignedWorkerId || '').split(',').filter(Boolean);
                            return ids.map(id => this.workers.find(w => String(w.id) === id.trim())
                                ?.name || 'Unknown').join(', ');
                        }).filter(Boolean);
                        const uniqueWorkers = [...new Set(workerNames)];
                        const taskListHtml = tasks.map(t => `
                            <div class="fc-task-item" style="padding:0.2rem 0;border-bottom:1px solid #eee;">
                                <span class="task-name">${t.taskName}</span>
                                <span class="badge badge-${t.status}">${t.status}</span>
                                <span class="task-worker">👷 ${t.assignedWorkerId ? this.workers.find(w => String(w.id) === t.assignedWorkerId)?.name || 'Unknown' : 'Unassigned'}</span>
                                <button class="btn-icon unassign-assignment" data-taskid="${t.id}" data-vehicle="${vehicle}" style="color:var(--warning);" title="Unassign worker"><span class="material-icons">person_remove</span></button>
                            </div>
                        `).join('');
                        html += `
                            <div class="assignment-card">
                                <div class="assign-vehicle">${vehicle}</div>
                                <div class="assign-workers">
                                    ${uniqueWorkers.map(w => `<span class="assign-worker">👷 ${w}</span>`).join('')}
                                </div>
                                <div class="assign-tasks">${tasks.length} task(s)</div>
                                <div class="assign-status"><span class="badge badge-${tasks[0].type === 'fc' ? 'info' : 'primary'}">${tasks[0].type === 'fc' ? 'FC Prep' : 'Production'}</span></div>
                                <div style="margin-top:0.4rem;">${taskListHtml}</div>
                            </div>
                        `;
                    }
                    container.innerHTML = html;

                    container.querySelectorAll('.unassign-assignment').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const taskId = btn.dataset.taskid;
                            const vehicle = btn.dataset.vehicle;
                            this.confirm.open({
                                title: 'Unassign Worker',
                                body: `Remove all workers from this task on ${vehicle}? The task will become pending and available for reassignment.`,
                                onConfirm: async () => {
                                    this.loader.show();
                                    try {
                                        const task = this.data.find(t => t.id === taskId);
                                        if (task) {
                                            if (task.type === 'fc') {
                                                await DataService.updateFCTask(taskId, {
                                                    assignedWorkerId: '',
                                                    status: 'pending'
                                                });
                                            } else {
                                                await DataService.updateProduction(taskId, {
                                                    assignedWorkerId: '',
                                                    status: 'pending'
                                                });
                                            }
                                            this.toast.show('Worker unassigned', 'success');
                                            await this.loadData();
                                            this.renderGrid();
                                        }
                                    } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this.loader.hide(); }
                                }
                            });
                        });
                    });
                }
            },

            // ========== WORKER PAGE ==========
            Worker: class {
                constructor(app) {
                    this.app = app;
                    this.toast = new Components.Toast();
                    this.loader = new Components.Loader();
                    this.modal = new Components.Modal();
                    this.confirm = new Components.ConfirmationDialog();
                    this.data = [];
                    this.assignedTasks = [];
                    this.currentUser = app.auth.getCurrentUser();
                    this.vehiclePhotos = {};
                    this.workers = [];
                }
                async render(container) {
                    container.innerHTML = `
                        <div class="page-header"><h2>My Work</h2></div>
                        <div id="workerTaskCards"></div>
                    `;
                    await this.loadData();
                    this.renderTasks();
                }

                async loadData() {
                    this.loader.show();
                    try {
                        const [inventory, production, fcTasks, workers] = await Promise.all([
                            DataService.getInventory(),
                            DataService.getProduction(),
                            DataService.getFCTasks(),
                            DataService.getWorkers()
                        ]);
                        this.workers = workers;
                        this.vehiclePhotos = {};
                        inventory.forEach(v => { this.vehiclePhotos[v.vehicleNumber] = v.frontPhotoUrl ||
                                ''; });
                        const allTasks = [...production, ...fcTasks.map(t => ({ ...t, type: 'fc' }))];
                        const myId = String(this.currentUser?.id || this.currentUser?.uid || '');
                        this.assignedTasks = allTasks.filter(t => {
                            if (!t.assignedWorkerId) return false;
                            const workerIds = t.assignedWorkerId.split(',').map(s => s.trim());
                            return workerIds.includes(myId);
                        });
                    } catch (e) { this.toast.show('Failed to load tasks: ' + (e.message || e),
                            'error'); } finally { this.loader.hide(); }
                }

                renderTasks() {
                    const container = document.getElementById('workerTaskCards');
                    if (this.assignedTasks.length === 0) {
                        container.innerHTML =
                            `<div class="text-center" style="padding:2rem;color:var(--dark-gray);"><span class="material-icons" style="font-size:2.5rem;">task_alt</span><p>No tasks assigned to you right now.</p></div>`;
                        return;
                    }
                    container.innerHTML = `<div class="worker-task-list">${this.assignedTasks.map(t => {
                            const photoUrl = this.vehiclePhotos[t.vehicleNumber] || '';
                            const photoHtml = photoUrl
                                ? `<img class="task-vehicle-photo" src="${photoUrl}" />`
                                : `<div class="task-vehicle-photo-placeholder"><span class="material-icons" style="font-size:2rem;">directions_car</span></div>`;
                            let actionBtn = '';
                            const isFc = t.type === 'fc';
                            if (t.status === 'pending' || t.status === 'in_progress') {
                                actionBtn += `<button class="btn btn-secondary btn-sm view-worklog" data-id="${t.id}" data-type="${isFc ? 'fc' : 'production'}"><span class="material-icons" style="font-size:16px;">assignment</span> Open</button>`;
                            }
                            if (t.status === 'in_progress') {
                                actionBtn += `<button class="btn btn-success btn-sm complete-task" data-id="${t.id}" data-type="${isFc ? 'fc' : 'production'}"><span class="material-icons" style="font-size:16px;">check_circle</span> Complete</button>`;
                            }
                            const typeLabel = isFc ? '🔧 FC' : '🏭 Prod';
                            return `
                                <div class="worker-task-card">
                                    ${photoHtml}
                                    <div class="task-info">
                                        <div class="task-vehicle-number">${t.vehicleNumber} <span style="font-size:0.7rem;color:var(--dark-gray);">${typeLabel}</span></div>
                                        <div class="task-name">${t.taskName}</div>
                                        <div class="task-meta">Est. ${t.estimatedHours || '--'} hrs &nbsp;•&nbsp; <span class="badge badge-${t.status}">${t.status}</span></div>
                                    </div>
                                    <div class="task-actions">${actionBtn}</div>
                                </div>
                            `;
                        }).join('')}</div>`;
                    container.querySelectorAll('.view-worklog').forEach(btn => btn.addEventListener('click', () =>
                        this.openWorkLog(btn.dataset.id, btn.dataset.type)));
                    container.querySelectorAll('.complete-task').forEach(btn => btn.addEventListener('click', () =>
                        this.completeTask(btn.dataset.id, btn.dataset.type)));
                }

                async openWorkLog(taskId, type) {
                    let task;
                    if (type === 'fc') {
                        const tasks = await DataService.getFCTasks();
                        task = tasks.find(t => t.id === taskId);
                    } else {
                        const res = await DataService.getTask(taskId);
                        task = res.task;
                    }
                    if (!task) { this.toast.show('Task not found', 'error'); return; }

                    if (type === 'fc') {
                        const form = `
                            <div class="work-log">
                                <h3>🔧 ${task.taskName} (FC)</h3>
                                <p><strong>Vehicle:</strong> ${task.vehicleNumber}</p>
                                <p><strong>Status:</strong> <span class="badge badge-${task.status}">${task.status}</span></p>
                                <p><strong>Assigned to:</strong> ${task.assignedWorkerId ? this.workers.find(w => String(w.id) === task.assignedWorkerId)?.name || 'Unknown' : 'Unassigned'}</p>
                                <div class="form-group"><label>Remarks</label><textarea id="fcRemarkInput" rows="3">${task.remarks || ''}</textarea></div>
                                <div class="form-group"><label>Update Status</label>
                                    <select id="fcStatusSelect">
                                        <option value="pending" ${task.status==='pending'?'selected':''}>Pending</option>
                                        <option value="in_progress" ${task.status==='in_progress'?'selected':''}>In Progress</option>
                                        <option value="completed" ${task.status==='completed'?'selected':''}>Completed</option>
                                    </select>
                                </div>
                                <button class="btn btn-primary" id="updateFcTaskBtn">Update</button>
                            </div>
                        `;
                        this.modal.open({
                            title: 'FC Task Details',
                            body: form,
                            confirmText: 'Close',
                            showCancel: false,
                            onConfirm: () => this.modal.close()
                        });
                        document.getElementById('updateFcTaskBtn').addEventListener('click', async () => {
                            const status = document.getElementById('fcStatusSelect').value;
                            const remarks = document.getElementById('fcRemarkInput').value;
                            this.loader.show();
                            try {
                                await DataService.updateFCTask(taskId, { status, remarks });
                                this.toast.show('Task updated', 'success');
                                this.modal.close();
                                await this.loadData();
                                this.renderTasks();
                            } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this
                                    .loader.hide(); }
                        });
                        return;
                    }

                    // Production task worklog
                    const history = await DataService.getVehicleTasks(task.vehicleNumber);
                    const photos = await DataService.getPhotosByVehicle(task.vehicleNumber);
                    const beforePhoto = photos.find(p => p.taskName === task.taskName && p.type === 'Before');
                    const afterPhoto = photos.find(p => p.taskName === task.taskName && p.type === 'After');
                    const vehiclePhotoUrl = this.vehiclePhotos[task.vehicleNumber] || '';

                    const modalHtml = `
                        <div class="work-log">
                            ${vehiclePhotoUrl ? `<img class="vehicle-photo-hero" src="${vehiclePhotoUrl}" />` : ''}
                            <div class="work-log-header">
                                <h3>🚗 ${task.vehicleNumber} - ${task.taskName}</h3>
                                <div class="work-log-meta">
                                    <span>Department: ${task.department}</span>
                                    <span>Status: <span class="badge badge-${task.status}">${task.status}</span></span>
                                    <span>Estimated: ${task.estimatedHours || '--'} hrs</span>
                                    <span>Actual: ${task.actualHours ? task.actualHours.toFixed(1) : '--'} hrs</span>
                                </div>
                            </div>

                            <div class="photo-section">
                                <h4>📷 Photos</h4>
                                <div class="photo-grid">
                                    <div class="photo-upload-box ${task.beforePhotoUploaded ? 'uploaded' : ''}" data-type="Before">
                                        <span class="photo-label">BEFORE (required to Start)</span>
                                        ${task.beforePhotoUploaded ? '<span class="photo-check">✅</span>' : '<span class="photo-placeholder">📤 Tap to upload</span>'}
                                        <input type="file" accept="image/*" class="photo-input" data-type="Before" />
                                    </div>
                                    <div class="photo-upload-box ${task.afterPhotoUploaded ? 'uploaded' : ''}" data-type="After">
                                        <span class="photo-label">AFTER (required to Complete)</span>
                                        ${task.afterPhotoUploaded ? '<span class="photo-check">✅</span>' : '<span class="photo-placeholder">📤 Tap to upload</span>'}
                                        <input type="file" accept="image/*" class="photo-input" data-type="After" />
                                    </div>
                                </div>
                                <small>Upload Before to unlock Start, After to unlock Complete.</small>
                            </div>

                            <div class="remarks-section">
                                <h4>📝 Remarks</h4>
                                <textarea id="workRemarks" rows="2" placeholder="Add your remarks...">${task.remarks || ''}</textarea>
                            </div>

                            <div class="timeline-section">
                                <h4>⏱️ Timeline</h4>
                                <div class="timeline-item"><span class="timeline-label">Started:</span><span>${task.startTime ? new Date(task.startTime).toLocaleString() : 'Not started yet'}</span></div>
                                <div class="timeline-item"><span class="timeline-label">Completed:</span><span>${task.endTime ? new Date(task.endTime).toLocaleString() : 'Not completed'}</span></div>
                                <div class="timeline-item"><span class="timeline-label">Estimated vs Actual:</span><span>${task.estimatedHours || '--'} hrs / ${task.actualHours ? task.actualHours.toFixed(1) : '--'} hrs</span></div>
                            </div>

                            <div class="history-section">
                                <h4>📊 Task History (${task.vehicleNumber})</h4>
                                <div class="history-list">
                                    ${history.map(t => `
                                        <div class="history-item ${t.status === 'completed' ? 'done' : t.status === 'in_progress' ? 'active' : ''}">
                                            <span class="history-task">${t.taskName}</span>
                                            <span class="history-status ${t.status}">${t.status}</span>
                                            <span class="history-hours">${t.estimatedHours || '--'} / ${t.actualHours ? t.actualHours.toFixed(1) : '--'} hrs</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="work-log-actions">
                                <button class="btn btn-secondary" id="closeWorkLog">⬅ Back</button>
                                ${task.status === 'in_progress' ? `<button class="btn btn-success" id="completeTaskBtn" ${!task.afterPhotoUploaded ? 'disabled title="Upload After photo first"' : ''}>✅ Complete Work</button>` : ''}
                                ${task.status === 'pending' ? `<button class="btn btn-primary" id="startTaskBtn" ${!task.beforePhotoUploaded ? 'disabled title="Upload Before photo first"' : ''}>▶ Start Work</button>` : ''}
                            </div>
                        </div>
                    `;

                    this.modal.open({
                        title: 'Work Log',
                        body: modalHtml,
                        confirmText: 'Close',
                        showCancel: false,
                        onConfirm: () => this.modal.close()
                    });

                    document.querySelectorAll('.photo-input').forEach(input => {
                        input.addEventListener('change', async (e) => {
                            const file = e.target.files[0];
                            if (!file) return;
                            const type = e.target.dataset.type;
                            this.toast.show('Uploading photo...', 'info');
                            try {
                                const uploadedBy = this.currentUser?.id || this.currentUser
                                    ?.uid || '';
                                await PhotoService.uploadTaskPhoto(
                                    taskId,
                                    task.vehicleNumber,
                                    task.taskName,
                                    type,
                                    uploadedBy,
                                    file
                                );
                                this.toast.show(`${type} photo uploaded!`, 'success');
                                this.modal.close();
                                this.openWorkLog(taskId, 'production');
                            } catch (err) { this.toast.show('Failed to upload: ' + err
                                    .message, 'error'); }
                        });
                    });

                    document.querySelectorAll('.photo-upload-box').forEach(box => {
                        box.addEventListener('click', () => {
                            const input = box.querySelector('.photo-input');
                            if (input) input.click();
                        });
                    });

                    document.getElementById('startTaskBtn')?.addEventListener('click', async () => {
                        if (!task.beforePhotoUploaded) { this.toast.show(
                                'Upload a Before photo first', 'warning'); return; }
                        this.loader.show();
                        try {
                            await DataService.startWork(taskId);
                            this.toast.show('Work started!', 'success');
                            this.modal.close();
                            await this.loadData();
                            this.renderTasks();
                        } catch (e) { this.toast.show('Failed to start: ' + (e.message || e),
                                'error'); } finally { this.loader.hide(); }
                    });

                    document.getElementById('completeTaskBtn')?.addEventListener('click', async () => {
                        if (!task.beforePhotoUploaded || !task.afterPhotoUploaded) {
                            this.toast.show(
                                'Please upload Before AND After photos first!',
                                'warning');
                            return;
                        }
                        const remarks = document.getElementById('workRemarks').value;
                        this.loader.show();
                        try {
                            await DataService.completeWork(taskId, remarks);
                            this.toast.show('Work completed! Supervisor notified.',
                                'success');
                            this.modal.close();
                            await this.loadData();
                            this.renderTasks();
                        } catch (e) { this.toast.show('Failed to complete: ' + (e.message ||
                                e), 'error'); } finally { this.loader.hide(); }
                    });

                    document.getElementById('closeWorkLog')?.addEventListener('click', () => {
                        this.modal.close();
                    });
                }

                async completeTask(taskId, type) {
                    this.openWorkLog(taskId, type);
                }
            },

            // ========== USERS PAGE ==========
