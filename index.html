                    this.workers = [];
                    this.priorityQueue = [];
                    this.departmentTypes = {};
                    this.filterType = 'All';
                    this.vehiclePhotos = {};
                }
                async render(container) {
                    container.innerHTML = `
                <div class="page-header"><h2>Supervisor</h2></div>
                <div class="dashboard-stats" id="supStats"></div>
                <div class="department-status"><h3>Department Status</h3><div class="dept-cards" id="deptCards"></div></div>
                <div class="department-status">
                  <h3>Average Task Duration (based on completed work)</h3>
                  <div id="taskAnalytics"></div>
                </div>
                <div class="priority-queue">
                  <div class="flex justify-between items-center" style="margin-bottom:1rem;">
                    <h3>Vehicles (sorted by delivery date — tap a vehicle to assign work)</h3>
                    <div class="filter-group">
                      <label>Worker Type:</label>
                      <select id="typeFilter">
                        <option value="All">All</option>
                        <option value="Contractual">Contractual Only</option>
                        <option value="Company">Company Only</option>
                      </select>
                    </div>
                  </div>
                  <div id="supTable"></div>
                </div>
                <div class="department-status">
                  <h3>Assignments Overview (who's working on what)</h3>
                  <div id="assignmentsOverview"></div>
                </div>
              `;
                    await this.loadData();
                    this.renderStats();
                    this.renderDeptStatus();
                    this.renderTaskAnalytics();
                    this.renderQueue();
                    this.renderAssignmentsOverview();
                    document.getElementById('typeFilter').addEventListener('change', (e) => {
                        this.filterType = e.target.value;
                        this.renderQueue();
                    });
                }
                renderAssignmentsOverview() {
                    const container = document.getElementById('assignmentsOverview');
                    const assigned = this.data.filter(t => t.assignedWorkerId);
                    if (assigned.length === 0) {
                        container.innerHTML = `<p style="color:var(--dark-gray);">No tasks assigned yet.</p>`;
                        return;
                    }
                    const table = new Components.Table(container, {
                        columns: [
                            { key: 'vehicleNumber', label: 'Vehicle' },
                            { key: 'taskName', label: 'Task' },
                            { key: 'workers', label: 'Assigned To', render: (r) => (r
                                        .assignedWorkerId || '').split(',').filter(Boolean)
                                    .map(id => this.workers.find(w => String(w.id) === id
                                        .trim())?.name || 'Unknown').join(', ') || '—' },
                            { key: 'status', label: 'Status', render: (r) =>
                                    `<span class="badge badge-${r.status}">${r.status}</span>` },
                            { key: 'hours', label: 'Est / Actual', render: (r) =>
                                    `${r.estimatedHours || '--'} / ${r.actualHours ? r.actualHours.toFixed(1) : '--'} hrs`
                                }
                        ]
                    });
                    table.render(assigned);
                }
                async loadData() {
                    this.loader.show();
                    try {
                        const [inventory, production, deptRes, workers] = await Promise.all([
                            DataService.getInventory(),
                            DataService.getProduction(),
                            DataService.getDepartmentTypes(),
                            DataService.getWorkers()
                        ]);
                        this.vehiclePhotos = {};
                        inventory.forEach(v => { this.vehiclePhotos[v.vehicleNumber] = v.frontPhotoUrl ||
                            ''; });
                        this.data = production;
                        this.departmentTypes = deptRes.departmentTypes || {};
                        this.workers = workers;

                        const grouped = {};
                        this.data.forEach(t => {
                            const dept = t.department || '';
                            const type = this.departmentTypes[dept] || 'Company';
                            if (!grouped[t.vehicleNumber]) {
                                grouped[t.vehicleNumber] = {
                                    vehicleNumber: t.vehicleNumber,
                                    customerName: t.customerName,
                                    deliveryDate: t.deliveryDate,
                                    department: dept,
                                    employeeType: type,
                                    tasks: [],
                                    status: 'pending'
                                };
                            }
                            grouped[t.vehicleNumber].tasks.push(t);
                            const statuses = grouped[t.vehicleNumber].tasks.map(t => t.status);
                            if (statuses.every(s => s === 'completed')) grouped[t.vehicleNumber]
                                .status = 'completed';
                            else if (statuses.some(s => s === 'pending_approval')) grouped[t
                                    .vehicleNumber].status = 'pending_approval';
                            else if (statuses.some(s => s === 'in_progress')) grouped[t.vehicleNumber]
                                .status = 'in_progress';
                            else grouped[t.vehicleNumber].status = 'pending';
                        });
                        this.priorityQueue = Object.values(grouped);
                        this.priorityQueue.sort((a, b) => new Date(a.deliveryDate) - new Date(b
                        .deliveryDate));
                    } catch (e) { console.error(e);
                        this.toast.show('Failed to load data: ' + (e.message || e), 'error'); } finally { this
                            .loader.hide(); }
                }
                renderStats() {
                    const stats = {
                        waiting: this.priorityQueue.filter(v => v.status === 'pending').length,
                        inProgress: this.priorityQueue.filter(v => v.status === 'in_progress').length,
                        pendingApproval: this.priorityQueue.filter(v => v.status === 'pending_approval')
                            .length,
                        delayed: this.priorityQueue.filter(v => { const days = Utils.dateUtils
                                .daysUntil(v.deliveryDate); return days < 0 && v.status !==
                                'completed'; }).length
                    };
                    document.getElementById('supStats').innerHTML = `
                <div class="stat-card info"><div class="stat-label">Waiting Assignment</div><div class="stat-value">${stats.waiting}</div><span class="material-icons stat-icon">pending_actions</span></div>
                <div class="stat-card warning"><div class="stat-label">In Progress</div><div class="stat-value">${stats.inProgress}</div><span class="material-icons stat-icon">build</span></div>
                <div class="stat-card success"><div class="stat-label">Pending Approval</div><div class="stat-value">${stats.pendingApproval}</div><span class="material-icons stat-icon">approval</span></div>
                <div class="stat-card danger"><div class="stat-label">Delayed</div><div class="stat-value">${stats.delayed}</div><span class="material-icons stat-icon">warning</span></div>
              `;
                    document.getElementById('notifBadge').textContent = stats.pendingApproval;
                }
                renderDeptStatus() {
                    const deptCounts = {};
                    const deptTypes = {};
                    this.data.forEach(t => {
                        deptCounts[t.department] = (deptCounts[t.department] || 0) + 1;
                        deptTypes[t.department] = this.departmentTypes[t.department] || 'Company';
                    });
                    document.getElementById('deptCards').innerHTML = Object.entries(deptCounts).map(([name,
                            count]) => {
                        const type = deptTypes[name] || 'Company';
                        const bgColor = type === 'Contractual' ? '#ff6b6b' : '#4a90d9';
                        return `<div class="dept-card"><span class="dept-name">${name}</span><span class="dept-count" style="background:${bgColor};">${count}</span><span style="font-size:0.7rem;color:${type === 'Contractual' ? '#cc0000' : '#1a3a5c'};">${type}</span></div>`;
                    }).join('');
                }
                async renderTaskAnalytics() {
                    const container = document.getElementById('taskAnalytics');
                    try {
                        const analytics = await DataService.getTaskAnalytics();
                        if (analytics.length === 0) {
                            container.innerHTML =
                                `<p style="color:var(--dark-gray);">No completed tasks yet — averages will appear once work starts finishing.</p>`;
                            return;
                        }
                        const table = new Components.Table(container, {
                            columns: [
                                { key: 'taskName', label: 'Task' },
                                { key: 'avgHours', label: 'Avg Hours', render: (r) =>
                                        `<strong>${r.avgHours}</strong> hrs` },
                                { key: 'minHours', label: 'Fastest' },
                                { key: 'maxHours', label: 'Slowest' },
                                { key: 'completedCount', label: 'Completed' }
                            ]
                        });
                        table.render(analytics);
                    } catch (e) { container.innerHTML = ''; }
                }
                renderQueue() {
                    const container = document.getElementById('supTable');
                    let filtered = this.priorityQueue;
                    if (this.filterType === 'Contractual') filtered = filtered.filter(v => v
                            .employeeType === 'Contractual');
                    else if (this.filterType === 'Company') filtered = filtered.filter(v => v
                        .employeeType === 'Company');

                    if (filtered.length === 0) {
                        container.innerHTML =
                            `<p style="color:var(--dark-gray);padding:1rem;">No vehicles in the queue.</p>`;
                        return;
                    }

                    container.innerHTML = `<div class="worker-task-list">${filtered.map(r => {
                    const photoUrl = (this.vehiclePhotos && this.vehiclePhotos[r.vehicleNumber]) || '';
                    const photoHtml = photoUrl
                      ? `<img class="task-vehicle-photo" src="${photoUrl}" />`
                      : `<div class="task-vehicle-photo-placeholder"><span class="material-icons" style="font-size:2rem;">directions_car</span></div>`;
                    const tasks = r.tasks || [];
                    const completed = tasks.filter(t => t.status === 'completed').length;
                    const p = tasks.length > 0 ? Math.round((completed / tasks.length) * 100) : 0;
                    const days = Utils.dateUtils.daysUntil(r.deliveryDate);
                    const daysColor = days < 0 ? 'var(--danger)' : days < 3 ? 'var(--warning)' : 'var(--dark-gray)';
                    const typeColor = r.employeeType === 'Contractual' ? '#dc3545' : '#28a745';
                    let extraBtns = `<button class="btn btn-secondary btn-sm view-timeline" data-vehicle="${r.vehicleNumber}"><span class="material-icons" style="font-size:16px;">timeline</span> Timeline</button>`;
                    if (r.status === 'pending_approval') extraBtns += `<button class="btn btn-sm qc-approve" data-vehicle="${r.vehicleNumber}" style="background:var(--warning);color:#333;" title="Worker marked complete — needs your review"><span class="material-icons" style="font-size:16px;">verified</span> QC Check</button>`;
                    if (r.status === 'completed') extraBtns += `<button class="btn btn-success btn-sm delivery" data-vehicle="${r.vehicleNumber}"><span class="material-icons" style="font-size:16px;">local_shipping</span> Delivery</button>`;
                    return `
                      <div class="worker-task-card">
                        ${photoHtml}
                        <div class="task-info assign-team" data-vehicle="${r.vehicleNumber}" style="cursor:pointer;" title="Tap to assign work">
                          <div class="task-vehicle-number">${r.vehicleNumber} <span class="material-icons" style="font-size:16px;color:var(--accent);vertical-align:middle;">touch_app</span></div>
                          <div class="task-name">${r.customerName}</div>
                          <div class="task-meta">
                            Delivery: ${Utils.dateUtils.format(r.deliveryDate)} — <span style="color:${daysColor};font-weight:600;">${days} day(s) left</span>
                            &nbsp;•&nbsp; <span style="color:${typeColor};font-weight:600;">${r.employeeType || 'Company'}</span>
                            &nbsp;•&nbsp; <span class="badge badge-${r.status}">${r.status}</span>
                          </div>
                          <div class="progress-bar" style="margin-top:0.4rem;"><div class="progress-fill" style="width:${p}%;"></div><span>${p}%</span></div>
                        </div>
                        <div class="task-actions" style="flex-wrap:wrap;">${extraBtns}</div>
                      </div>
                    `;
                  }).join('')}</div>`;

                    container.querySelectorAll('.assign-team').forEach(el => el.addEventListener('click', () =>
                        this.assignTeam(el.dataset.vehicle)));
                    container.querySelectorAll('.view-timeline').forEach(el => el.addEventListener('click',
                        (e) => { e.stopPropagation();
                            this.viewTimeline(el.dataset.vehicle); }));
                    container.querySelectorAll('.qc-approve').forEach(el => el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.showQCApprove(el.dataset.vehicle);

                    container.querySelectorAll('.delivery').forEach(el => el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.showDelivery(el.dataset.vehicle);
                    }));
                }

                async viewTimeline(vehicleNumber) {
                    const vehicle = this.priorityQueue.find(v => v.vehicleNumber === vehicleNumber);
                    if (!vehicle) return;
                    const tasks = this.data.filter(t => t.vehicleNumber === vehicleNumber);
                    const salesData = await DataService.getSales();
                    const order = salesData.find(o => o.vehicleNumber === vehicleNumber);
                    let reqHtml = '';
                    if (order?.requirements) {
                        const req = order.requirements;
                        const list = Object.keys(req).filter(k => k !== 'remarks' && (req[k] === true ||
                            req[k] === 'Inside' || req[k] === 'Outside'));
                        if (list.length) reqHtml += `<p><strong>Requirements:</strong> ${list.join(', ')}</p>`;
                        if (req.remarks) reqHtml += `<p><strong>Remarks:</strong> ${req.remarks}</p>`;
                    }
                    const stepsHtml = tasks.map(t =>
                        `<div class="step ${t.status==='completed'?'completed':t.status==='in_progress'||t.status==='pending_approval'?'active':''}">${t.taskName} (${t.status})</div>`
                        ).join('');
                    const photoUrl = (this.vehiclePhotos && this.vehiclePhotos[vehicleNumber]) || '';
                    const html = `
                ${photoUrl ? `<img class="vehicle-photo-hero" src="${photoUrl}" />` : ''}
                <h4>${vehicle.vehicleNumber} - ${vehicle.customerName}</h4>
                <p>Delivery: ${Utils.dateUtils.format(vehicle.deliveryDate)} (${Utils.dateUtils.daysUntil(vehicle.deliveryDate)} days left)</p>
                ${reqHtml}
                <div class="timeline-steps">${stepsHtml}</div>
                <div class="timeline-details"><p><strong>Total Tasks:</strong> ${tasks.length}</p><p><strong>Completed:</strong> ${tasks.filter(t=>t.status==='completed').length}</p></div>
              `;
                    this.modal.open({ title: `Timeline - ${vehicleNumber}`, body: html, confirmText: 'Close',
                        showCancel: false, onConfirm: () => this.modal.close() });
                }

                async assignTeam(vehicleNumber) {
                    const vehicle = this.priorityQueue.find(v => v.vehicleNumber === vehicleNumber);
                    if (!vehicle) return;
                    const pendingTasks = this.data.filter(t => t.vehicleNumber === vehicleNumber && (t
                        .status === 'pending' || (t.status === 'in_progress' && !t.assignedWorkerId)));
                    if (pendingTasks.length === 0) { this.toast.show('No pending tasks for this vehicle',
                            'warning'); return; }
                    const dept = pendingTasks[0].department || '';
                    const type = this.departmentTypes[dept] || 'Company';

                    const sortedWorkers = [...this.workers].sort((a, b) => {
                        const aMatch = a.department === dept ? 0 : 1;
                        const bMatch = b.department === dept ? 0 : 1;
                        return aMatch - bMatch || a.name.localeCompare(b.name);
                    });
                    const workerCheckboxes = sortedWorkers.map(w =>
                        `<label><input type="checkbox" name="worker_${w.id}" value="${w.id}" /> ${w.name} <span style="color:var(--dark-gray);font-size:0.8rem;">— ${w.department || 'no dept'} (${w.employeeType})</span></label>`
                        ).join('') || '<p style="color:var(--dark-gray);">No workers set up yet — add them in Manage Users.</p>';

                    const form = `
                <form id="assignForm">
                  <div class="form-group"><label>Vehicle</label><input type="text" value="${vehicleNumber}" disabled /></div>
                  <div class="form-group"><label>Task</label><select name="taskId">${pendingTasks.map(t => `<option value="${t.id}" ${t.department===dept?'':''}>${t.taskName} (${t.department})</option>`).join('')}</select></div>
                  <div class="form-group">
                    <label>Workers (tick one or more by name)</label>
                    <div class="checkbox-group" style="max-height:220px;overflow-y:auto;display:block;">${workerCheckboxes}</div>
                  </div>
                  <div class="form-group"><label>Estimated Hours</label><input type="number" name="estimatedHours" value="${pendingTasks[0]?.estimatedHours || 8}" step="0.5" /></div>
                  <div class="form-group"><label><input type="checkbox" name="forceStart" /> Force Start (skip dependency)</label></div>
                </form>
              `;
                    this.modal.open({
                        title: `Assign Work - ${vehicleNumber}`,
                        body: form,
                        confirmText: 'Assign',
                        onConfirm: async () => {
                            const fd = new FormData(document.getElementById('assignForm'));
                            const data = Object.fromEntries(fd.entries());
                            const taskId = data.taskId;
                            const task = this.data.find(t => t.id === taskId);
                            const selectedWorkerIds = sortedWorkers.filter(w => data[
                                    'worker_' + w.id])
                                .map(w => w.id);
                            if (selectedWorkerIds.length === 0) { this.toast.show(
                                    'Select at least one worker', 'warning'); return; }
                            if (task) {
                                await DataService.updateProduction(taskId, {
                                    assignedWorkerId: selectedWorkerIds.join(','),
                                    estimatedHours: parseFloat(data.estimatedHours) || 8,
                                    status: 'pending',
                                    forceStart: !!data.forceStart
                                });
                                this.toast.show(
                                    'Task assigned — worker(s) will see it in their task list',
                                    'success');
                                this.modal.close();
                                await this.loadData();
                                this.renderQueue();
                                this.renderStats();
                            }
                        }
                    });
                }

                async showQCApprove(vehicleNumber) {
                    const tasks = this.data.filter(t => t.vehicleNumber === vehicleNumber && t.status ===
                        'pending_approval');
                    if (tasks.length === 0) { this.toast.show('No tasks pending approval', 'warning'); return; }
                    const task = tasks[0];

                    const photos = await DataService.getPhotosByVehicle(vehicleNumber);
                    const beforePhoto = photos.find(p => p.taskName === task.taskName && p.type === 'Before');
                    const afterPhoto = photos.find(p => p.taskName === task.taskName && p.type === 'After');

                    let photoHtml = '<div class="photo-grid">';
                    photoHtml += beforePhoto ?
                        `<div class="photo-upload-box uploaded" style="cursor:default;"><span class="photo-label">BEFORE</span><img class="vehicle-thumb" style="width:100px;height:70px;" src="${beforePhoto.googleDriveUrl}" /></div>` :
                        `<div class="photo-upload-box" style="cursor:default;">Before ❌</div>`;
                    photoHtml += afterPhoto ?
                        `<div class="photo-upload-box uploaded" style="cursor:default;"><span class="photo-label">AFTER</span><img class="vehicle-thumb" style="width:100px;height:70px;" src="${afterPhoto.googleDriveUrl}" /></div>` :
                        `<div class="photo-upload-box" style="cursor:default;">After ❌</div>`;
                    photoHtml += '</div>';

                    const form = `
                <p><strong>${task.vehicleNumber} - ${task.taskName}</strong></p>
                <p>Worker(s): ${(task.assignedWorkerId || '').split(',').filter(Boolean).map(id => this.workers.find(w => String(w.id) === id.trim())?.name || 'Unknown').join(', ') || 'Unassigned'}</p>
                <p>Estimated: ${task.estimatedHours} hrs | Actual: ${task.actualHours ? task.actualHours.toFixed(1) : '--'} hrs</p>
                ${photoHtml}
                <div class="form-group"><label>Remarks</label><textarea id="qcRemarks" rows="2">${task.remarks || ''}</textarea></div>
                <div class="form-group">
                  <label>Decision</label>
                  <select id="qcDecision">
                    <option value="Approved">✅ Accept</option>
                    <option value="Rework">🔄 Rework</option>
                    <option value="Rejected">❌ Reject</option>
                  </select>
                </div>
              `;
                    this.modal.open({
                        title: `Site Visit / QC Check - ${task.vehicleNumber}`,
                        body: form,
                        confirmText: 'Submit Decision',
                        onConfirm: async () => {
                            const decision = document.getElementById('qcDecision').value;
                            const remarks = document.getElementById('qcRemarks').value;
                            this.loader.show();
                            try {
                                await DataService.approveTask(task.id, decision, remarks);
                                this.toast.show(`Task ${decision.toLowerCase()}`, 'success');
                                this.modal.close();
                                await this.loadData();
                                this.renderQueue();
                                this.renderStats();
                            } catch (e) { this.toast.show('Failed to update: ' + (e
                                    .message || e), 'error'); } finally { this.loader
                                    .hide(); }
                        }

                async showDelivery(vehicleNumber) {
                    const vehicle = this.priorityQueue.find(v => v.vehicleNumber === vehicleNumber);
                    if (!vehicle) return;
                    let deliveries = await DataService.getDelivery();
                    let delivery = deliveries.find(d => d.vehicleNumber === vehicleNumber);
                    if (!delivery) {
                        await DataService.addDelivery({
                            productionId: null,
                            vehicleNumber: vehicleNumber,
                            status: 'Ready',
                            estimatedDate: vehicle.deliveryDate,
                            actualDate: '',
                            keysHandoverPhotoUrl: '',
                            remarks: ''
                        });
                        deliveries = await DataService.getDelivery();
                        delivery = deliveries.find(d => d.vehicleNumber === vehicleNumber);
                    }
                    if (!delivery) { this.toast.show('Delivery record not found', 'error'); return; }

                    const form = `
                <p><strong>${vehicleNumber}</strong> — 100% complete, ready for delivery</p>
                <p>Estimated Delivery: ${Utils.dateUtils.format(delivery.estimatedDate)}</p>
                <p>Status: ${delivery.status}</p>
                <div class="form-group"><label>Keys Handover Photo</label>
                  <div class="photo-upload-box" id="deliveryPhotoBox">
                    ${delivery.keysHandoverPhotoUrl ? '✅ Photo uploaded' : '📤 Tap to upload'}
                    <input type="file" accept="image/*" id="deliveryPhotoInput" />
                  </div>
                </div>
                <div class="form-group"><label>Remarks</label><textarea id="deliveryRemarks" rows="2">${delivery.remarks || ''}</textarea></div>
                <div class="form-group">
                  <label>Action</label>
                  <select id="deliveryAction">
                    <option value="Delivered" ${delivery.status === 'Delivered' ? 'selected' : ''}>Mark as Delivered (records actual date)</option>
                    <option value="Completed" ${delivery.status === 'Completed' ? 'selected' : ''}>Mark as Completed</option>
                  </select>
                </div>
              `;
                    this.modal.open({
                        title: `Delivery - ${vehicleNumber}`,
                        body: form,
                        confirmText: 'Update',
                        onConfirm: async () => {
                            const action = document.getElementById('deliveryAction').value;
                            const remarks = document.getElementById('deliveryRemarks').value;
                            const photoInput = document.getElementById('deliveryPhotoInput');
                            let photoUrl = delivery.keysHandoverPhotoUrl;
                            if (photoInput.files.length > 0) {
                                // Upload the photo
                                try {
                                    const file = photoInput.files[0];
                                    const { base64, mimeType } = await Utils.fileToBase64(
                                    file);
                                    const result = await PhotoService.uploadPhotoFile({
                                        vehicleNumber: vehicleNumber,
                                        photoType: 'KeysHandover',
                                        base64Data: base64,

        // ==============================================================
        // 8. ROUTER
        // ==============================================================
        class Router {
            constructor(app) {
                this.app = app;
                this.auth = app.auth;
                this.content = document.getElementById('pageContent');
                this.title = document.getElementById('pageTitle');
                this.breadcrumb = document.getElementById('breadcrumbPage');
                this.currentPage = null;
                this.pages = {
                    dashboard: Pages.Dashboard,
                    inventory: Pages.Inventory,
                    sales: Pages.Sales,
                    supervisor: Pages.Supervisor,
                    worker: Pages.Worker,
                    users: Pages.Users,
                };
            }
            init() {
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.navigate(item.dataset.page);
                        document.getElementById('sidebar').classList.remove('open');
                        document.getElementById('sidebarBackdrop').classList.remove('visible');
                    });
                });
                const hash = window.location.hash.slice(1) || this.getDefaultPage();
                this.navigate(hash);
                window.addEventListener('hashchange', () => {
                    this.navigate(window.location.hash.slice(1) || this.getDefaultPage());
                });
            }
            getDefaultPage() {
                const order = ['dashboard', 'supervisor', 'sales', 'inventory', 'worker'];
                return order.find(p => this.auth.hasPermission(p)) || 'dashboard';
            }
            async navigate(page) {
                if (!this.auth.hasPermission(page)) {
                    this.content.innerHTML =
                        `<div style="text-align:center;padding:4rem;"><span class="material-icons" style="font-size:4rem;color:var(--danger);">block</span><h2>Access Denied</h2><p>You don't have permission for this page.</p></div>`;
                    this.title.textContent = 'Access Denied';
                    this.breadcrumb.textContent = 'Access Denied';
                    return;
                }
                const PageClass = this.pages[page];
                if (!PageClass) { this.content.innerHTML = '<h2>Page not found</h2>'; return; }
                document.getElementById('loadingOverlay').style.display = 'flex';
                try {
                    if (this.currentPage && typeof this.currentPage.destroy === 'function') { this
                            .currentPage.destroy(); }
                    const instance = new PageClass(this.app);
                    await instance.render(this.content);
                    this.currentPage = instance;
                    const titles = { dashboard: 'Dashboard', inventory: 'Inventory', sales: 'Sales Orders',
                        supervisor: 'Supervisor', worker: 'Worker', users: 'Manage Users' };
                    this.title.textContent = titles[page] || page;
                    this.breadcrumb.textContent = titles[page] || page;
                    document.querySelectorAll('.nav-item').forEach(el => { el.classList.toggle('active', el
                            .dataset.page === page); });
                    if (window.location.hash !== `#${page}`) { history.pushState(null, '', `#${page}`); }
                } catch (e) { console.error(e);
                    this.content.innerHTML =
                        `<div class="text-center" style="padding:2rem;"><span class="material-icons">error</span><p>Failed to load page</p></div>`; } finally {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            }
        }

                    errorEl.style.display = 'none';
                    try {
                        await this.auth.login(username, password);
                        window.location.reload();
                    } catch (err) {
                        errorEl.textContent = err.message || 'Invalid credentials';
                        errorEl.style.display = 'block';
                    }
                });
            }
            renderApp() {
                const sidebar = document.getElementById('sidebarNav');
                const pages = ['dashboard', 'inventory', 'sales', 'supervisor', 'worker', 'users'];
                const labels = { dashboard: 'Dashboard', inventory: 'Inventory', sales: 'Sales Orders',
                    supervisor: 'Supervisor', worker: 'Worker', users: 'Manage Users' };
                const icons = { dashboard: 'dashboard', inventory: 'inventory', sales: 'receipt_long',
                    supervisor: 'supervisor_account', worker: 'construction', users: 'group' };
                sidebar.innerHTML = pages.filter(p => this.auth.hasPermission(p)).map(p =>
                    `<a href="#${p}" class="nav-item" data-page="${p}"><span class="material-icons">${icons[p]}</span><span class="nav-label">${labels[p]}</span></a>`
                ).join('');
            }
        }

        // ==============================================================
        // 10. BOOTSTRAP
        // ==============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const app = new App();
            app.init();
            window.__app = app;
        });
    </script>
</body>
</html>
