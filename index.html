                        // Show order type badge
                        let typeBadge = '';
                        if (r.orderType === 'seatwork') typeBadge = '🪑 Seatwork';
                        else if (r.orderType === 'non-vehicle') typeBadge = '📦 Non-Vehicle';
                        else typeBadge = '🚗 Vehicle';

                        return `
                            <div class="inv-card" data-id="${r.id}">
                                <div class="inv-header">
                                    <span class="inv-number">${r.token || '—'}</span>
                                    <span class="badge badge-${statusColor} inv-status">${statusColor.replace('_',' ')}</span>
                                </div>
                                <div class="inv-name">${r.customerName || '—'} <span style="font-size:0.6rem;color:var(--dark-gray);">${typeBadge}</span></div>
                                <div class="inv-model">${vehicleDisplay}</div>
                                <div class="inv-meta">
                                    <span><span class="material-icons" style="font-size:14px;">person</span> ${r.salesperson || '—'}</span>
                                    <span><span class="material-icons" style="font-size:14px;">event</span> ${Utils.dateUtils.format(r.deliveryDate)}</span>
                                    <span><span class="material-icons" style="font-size:14px;">trending_up</span> ${progress}%</span>
                                </div>
                                <div class="inv-progress">
                                    <div class="progress-bar" style="width:100%;"><div class="progress-fill" style="width:${progress}%;"></div><span>${progress}%</span></div>
                                </div>
                                <div class="inv-actions">${actionBtns}</div>
                            </div>
                        `;
                    }).join('');
                    container.innerHTML = html;

                    container.querySelectorAll('.view-order').forEach(btn => {
                        btn.addEventListener('click', (e) => { e.stopPropagation();
                            this.showOrderDetails(btn.dataset.id); });
                    });
                    container.querySelectorAll('.edit-sales').forEach(btn => {
                        btn.addEventListener('click', (e) => { e.stopPropagation();
                            this.editItem(btn.dataset.id); });
                    });
                    container.querySelectorAll('.delete-sales').forEach(btn => {
                        btn.addEventListener('click', (e) => { e.stopPropagation();
                            this.deleteItem(btn.dataset.id); });
                    });
                    container.querySelectorAll('.remind-sales').forEach(btn => {
                        btn.addEventListener('click', (e) => { e.stopPropagation();
                            this.sendReminder(btn.dataset.id); });
                    });
                    container.querySelectorAll('.link-vehicle').forEach(btn => {
                        btn.addEventListener('click', (e) => { e.stopPropagation();
                            this.showLinkVehicle(btn.dataset.id); });
                    });
                    container.querySelectorAll('.inv-card').forEach(card => {
                        card.addEventListener('click', () => {
                            this.showOrderDetails(card.dataset.id);
                        });
                    });
                }

                showOrderDetails(id) {
                    const order = this.data.find(o => o.id === id);
                    if (!order) { this.toast.show('Order not found', 'error'); return; }

                    let req = {};
                    try { req = JSON.parse(order.requirements || '{}'); } catch (e) { req = {}; }
                    const branding = req.brandingDetails || {};
                    const optional = req.optional || {};
                    const bodyCoachMaterial = req.bodyCoachMaterial || 'N/A';
                    const plumbingTankSize = req.plumbingTankSize || 'N/A';

                    const reqKeys = ['tinkering', 'mechanical', 'dummyClosing', 'bodyCoach', 'insideKitchen',
                        'outsideKitchen', 'kitchenLayout', 'painting', 'acpWork', 'vehicleElectrical',
                        'coachElectrical', 'upsWiring', 'normalWiring', 'plumbing', 'canopy', 'tyreChange',
                        'glassChecking', 'branding', 'solar', 'ups', 'camera'
                    ];
                    const reqLabels = {
                        tinkering: 'Tinkering',
                        mechanical: 'Mechanical',
                        dummyClosing: 'Dummy Closing',
                        bodyCoach: 'Body Coach',
                        insideKitchen: 'Inside Kitchen',
                        outsideKitchen: 'Outside Kitchen',
                        kitchenLayout: 'Kitchen Layout',
                        painting: 'Painting',
                        acpWork: 'ACP Work',
                        vehicleElectrical: 'Vehicle Electrical',
                        coachElectrical: 'Coach Electrical',
                        upsWiring: 'UPS Wiring',
                        normalWiring: 'Normal Wiring',
                        plumbing: 'Plumbing',
                        canopy: 'Canopy',
                        tyreChange: 'Tyre Change',
                        glassChecking: 'Glass Checking',
                        branding: 'Branding',
                        solar: 'Solar',
                        ups: 'UPS',
                        camera: 'Camera'
                    };
                    const reqHtml = reqKeys.map(k => {
                        const val = req[k] || false;
                        return `<span class="req-tag ${val ? 'yes' : 'no'}">${reqLabels[k] || k}: ${val ? '✅' : '❌'}</span>`;
                    }).join('');

                    const brandingHtml = `
                        <div style="margin-top:0.3rem;">
                            <span class="req-tag ${branding.plainSticker ? 'yes' : 'no'}">Plain Sticker: ${branding.plainSticker ? '✅' : '❌'}</span>
                            <span class="req-tag ${branding.lighting ? 'yes' : 'no'}">Lighting: ${branding.lighting ? '✅' : '❌'}</span>
                            <span class="req-tag ${branding.threeDLogo ? 'yes' : 'no'}">3D Logo: ${branding.threeDLogo ? '✅' : '❌'}</span>
                            <span class="req-tag ${branding.acpBoard ? 'yes' : 'no'}">ACP Board: ${branding.acpBoard ? '✅' : '❌'}</span>
                        </div>
                    `;

                    const optionalHtml = `
                        <div style="margin-top:0.3rem;">
                            <span class="req-tag ${optional.solar ? 'yes' : 'no'}">Solar: ${optional.solar ? '✅' : '❌'}</span>
                            <span class="req-tag ${optional.ups ? 'yes' : 'no'}">UPS: ${optional.ups ? '✅' : '❌'}</span>
                            <span class="req-tag ${optional.camera ? 'yes' : 'no'}">Camera: ${optional.camera ? '✅' : '❌'}</span>
                        </div>
                    `;

                    const vehicleDisplay = (order.orderType === 'non-vehicle' || order.orderType === 'seatwork') ?
                        `${order.productName || order.productType || 'Non‑Vehicle'}` :
                        (order.vehicleNumber || '⏳ Awaiting vehicle purchase');

                    // Show the new fields if they exist
                    let extraDetails = '';
                    if (order.orderType === 'seatwork') extraDetails +=
                        `<div class="detail-item"><div class="label">Order Type</div><div class="value">🪑 Seatwork</div></div>`;
                    if (bodyCoachMaterial !== 'N/A') extraDetails +=
                        `<div class="detail-item"><div class="label">Body Coach Material</div><div class="value">${bodyCoachMaterial}</div></div>`;
                    if (plumbingTankSize !== 'N/A') extraDetails +=
                        `<div class="detail-item"><div class="label">Water Tank Size</div><div class="value">${plumbingTankSize}</div></div>`;

                    const html = `
                        <div class="order-detail-grid">
                            <div class="detail-item"><div class="label">Token</div><div class="value">${order.token || '—'}</div></div>
                            ${extraDetails}
                            <div class="detail-item"><div class="label">Salesperson</div><div class="value">${order.salesperson || '—'}</div></div>
                            <div class="detail-item"><div class="label">Status</div><div class="value"><span class="badge badge-${order.status}">${order.status.replace('_',' ')}</span></div></div>
                            <div class="detail-item full-width"><div class="label">Vehicle / Product</div><div class="value">${vehicleDisplay}</div></div>
                            <div class="detail-item"><div class="label">Customer</div><div class="value">${order.customerName || '—'}</div></div>
                            <div class="detail-item"><div class="label">Phone</div><div class="value">${order.customerPhone || '—'}</div></div>
                            <div class="detail-item"><div class="label">Email</div><div class="value">${order.customerEmail || '—'}</div></div>
                            <div class="detail-item"><div class="label">Delivery Date</div><div class="value">${Utils.dateUtils.format(order.deliveryDate)}</div></div>
                            <div class="detail-item"><div class="label">Progress</div><div class="value">${order.progress || 0}%</div></div>
                            <div class="detail-item"><div class="label">Advance Amount</div><div class="value">₹${(order.advanceAmount || 0).toLocaleString()}</div></div>
                            <div class="detail-item"><div class="label">Paint Colour</div><div class="value">${order.paintColour || '—'}</div></div>
                            ${(order.orderType === 'non-vehicle' || order.orderType === 'seatwork') ? `
                                <div class="detail-item full-width"><div class="label">Product Type</div><div class="value">${order.productType || '—'}</div></div>
                            ` : ''}
                            <div class="detail-item full-width">
                                <div class="label">Requirements</div>
                                <div class="order-requirements-list">${reqHtml}</div>
                            </div>
                            ${Object.keys(branding).some(k => branding[k]) ? `
                                <div class="detail-item full-width">
                                    <div class="label">Branding Details</div>
                                    ${brandingHtml}
                                </div>
                            ` : ''}
                            ${Object.keys(optional).some(k => optional[k]) ? `
                                <div class="detail-item full-width">
                                    <div class="label">Optional Features</div>
                                    ${optionalHtml}
                                </div>
                            ` : ''}
                            ${req.remarks ? `
                                <div class="detail-item full-width">
                                    <div class="label">Remarks</div>
                                    <div class="value" style="font-size:0.85rem;font-weight:400;">${req.remarks}</div>
                                </div>
                            ` : ''}
                            <div class="detail-item full-width" style="border-bottom:none;padding-top:0.5rem;font-size:0.7rem;color:var(--dark-gray);">
                                <div>Created: ${new Date(order.createdAt).toLocaleString()}</div>
                                ${order.updatedAt ? `<div>Updated: ${new Date(order.updatedAt).toLocaleString()}</div>` : ''}
                                ${order.paymentReminderSent ? `<div>💬 Payment follow-up done</div>` : ''}
                            </div>
                        </div>
                    `;

                    this.modal.open({
                        title: `📋 Order ${order.token || ''}`,
                        body: html,
                        confirmText: 'Close',
                        showCancel: false,
                        onConfirm: () => this.modal.close()
                    });
                }

                showForm(order = null) {
                    const isEdit = !!order;
                    let req = {};
                    try { req = order?.requirements ? JSON.parse(order.requirements) : {}; } catch (e) { req =
                        {}; }
                    const bd = req.brandingDetails || {};
                    const opt = req.optional || {};
                    const DEFAULTS = { tinkering: true, mechanical: true, dummyClosing: true, bodyCoach: true,
                        vehicleElectrical: true };

                    const chk = (key) => (isEdit ? !!req[key] : !!DEFAULTS[key]) ? 'checked' : '';

                    const orderType = order?.orderType || 'vehicle';
                    const isVehicle = orderType === 'vehicle';
                    const isSeatwork = orderType === 'seatwork';
                    const productType = order?.productType || '';
                    const productName = order?.productName || '';

                    const activeVehicleSet = this.getActiveOrderVehicleSet();
                    const availableVehicles = this.vehicles.filter(v => {
                        if (v.inventoryStatus === 'Delivered') return false;
                        if (isEdit && order?.vehicleNumber === v.vehicleNumber) return true;
                        if (activeVehicleSet.has(v.vehicleNumber)) return false;
                        return true;
                    });
                    const vehicleOptions = availableVehicles.map(v => ({
                        value: v.vehicleNumber,
                        label: `${v.vehicleNumber} - ${v.vehicleName} (FC: ${v.fcStatus})`
                    }));

                    const productOptions = NON_VEHICLE_TYPES.map(pt => ({ value: pt, label: pt }));
                    // Add Seatwork specific options or keep generic
                    const seatworkOptions = ['Single Seat', 'Double Seat', 'Bench Seat', 'Custom Seat'];

                    const form = `
                        <form id="salesForm">
                            <div class="form-group">
                                <label>Order Type *</label>
                                <div class="radio-picker">
                                    <label><input type="radio" name="orderType" value="vehicle" ${orderType==='vehicle'?'checked':''} /> Vehicle</label>
                                    <label><input type="radio" name="orderType" value="non-vehicle" ${orderType==='non-vehicle'?'checked':''} /> Non‑Vehicle (Kiosk, Cart, etc.)</label>
                                    <label><input type="radio" name="orderType" value="seatwork" ${orderType==='seatwork'?'checked':''} /> 🪑 Seatwork</label>
                                </div>
                            </div>

                            <div id="vehicleSection" ${isVehicle?'':'style="display:none;"'}>
                                <div class="form-group">
                                    <label><input type="checkbox" id="vehiclePendingToggle" ${!order?.vehicleNumber && isEdit ? 'checked' : ''} /> Vehicle not in inventory yet – will be purchased later</label>
                                </div>
                                <div class="form-row">
                                    <div class="form-group" id="vehicleSelectGroup">
                                        <label>Vehicle *</label>
                                        <div id="vehicleDropdownContainer"></div>
                                        <input type="hidden" name="vehicleNumber" id="vehicleNumberHidden" />
                                    </div>
                                </div>
                            </div>

                            <div id="nonVehicleSection" ${(isVehicle || isSeatwork)?'':'style="display:none;"'}>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Product Type *</label>
                                        <select name="productType" id="productTypeSelect">
                                            ${productOptions.map(p => `<option value="${p.value}" ${p.value===productType?'selected':''}>${p.label}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Product Name (optional)</label>
                                        <input type="text" name="productName" value="${productName}" placeholder="e.g. Deluxe Kiosk" />
                                    </div>
                                </div>
                            </div>
                            <div id="seatworkSection" ${isSeatwork?'':'style="display:none;"'}>
                                <div class="form-group">
                                    <label>Seat Type</label>
                                    <select name="productType">
                                        ${seatworkOptions.map(p => `<option value="${p}" ${p===productType?'selected':''}>${p}</option>`).join('')}
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Product Name (optional)</label>
                                    <input type="text" name="productName" value="${productName}" placeholder="e.g. Luxury Driver Seat" />
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Salesperson *</label>
                                <div class="radio-picker">
                                    ${SALESPEOPLE.map(name => `
                                        <label><input type="radio" name="salesperson" value="${name}" ${order?.salesperson===name?'checked':''} required /> <span>${name}</span></label>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group"><label>Customer Name *</label><input type="text" name="customerName" value="${order?.customerName||''}" required /></div>
                                <div class="form-group"><label>Phone</label><input type="text" name="customerPhone" value="${order?.customerPhone||''}" /></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>Email</label><input type="email" name="customerEmail" value="${order?.customerEmail||''}" /></div>
                                <div class="form-group"><label>Delivery Date *</label><input type="date" name="deliveryDate" value="${order?.deliveryDate||''}" required /></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>Advance Amount</label><input type="number" name="advanceAmount" value="${order?.advanceAmount||0}" step="0.01" /></div>
                                <div class="form-group"><label>Paint Colour</label><input type="text" name="paintColour" value="${order?.paintColour||''}" /></div>
                            </div>

                            <fieldset>
                                <legend>Production Requirements</legend>
                                <div class="checkbox-group" id="vehicleReqs">
                                    <label><input type="checkbox" name="tinkering" ${chk('tinkering')} /> Tinkering</label>
                                    <label><input type="checkbox" name="mechanical" ${chk('mechanical')} /> Mechanical</label>
                                    <label><input type="checkbox" name="dummyClosing" ${chk('dummyClosing')} /> Dummy Closing</label>
                                    <label><input type="checkbox" name="bodyCoach" ${chk('bodyCoach')} /> Body Coach</label>
                                    <label><input type="checkbox" name="insideKitchen" ${chk('insideKitchen')} /> Inside Kitchen</label>
                                    <label><input type="checkbox" name="outsideKitchen" ${chk('outsideKitchen')} /> Outside Kitchen</label>
                                    <label><input type="checkbox" name="kitchenLayout" ${chk('kitchenLayout')} /> Kitchen Layout</label>
                                    <label><input type="checkbox" name="painting" ${chk('painting')} /> Painting</label>
                                    <label><input type="checkbox" name="acpWork" ${chk('acpWork')} /> ACP Work</label>
                                    <label><input type="checkbox" name="vehicleElectrical" ${chk('vehicleElectrical')} /> Vehicle Electrical</label>
                                    <label><input type="checkbox" name="coachElectrical" ${chk('coachElectrical')} /> Coach Electrical</label>
                                    <label><input type="checkbox" name="upsWiring" ${chk('upsWiring')} /> UPS Wiring</label>
                                    <label><input type="checkbox" name="normalWiring" ${chk('normalWiring')} /> Normal Wiring</label>
                                    <label><input type="checkbox" name="plumbing" ${chk('plumbing')} /> Plumbing</label>
                                    <label><input type="checkbox" name="canopy" ${chk('canopy')} /> Canopy</label>
                                    <label><input type="checkbox" name="tyreChange" ${chk('tyreChange')} /> Tyre Change</label>
                                    <label><input type="checkbox" name="glassChecking" ${chk('glassChecking')} /> Glass Checking</label>
                                    <label><input type="checkbox" name="branding" ${chk('branding')} /> Branding</label>
                                    <label><input type="checkbox" name="solar" ${opt.solar?'checked':''} /> Solar</label>
                                    <label><input type="checkbox" name="ups" ${opt.ups?'checked':''} /> UPS</label>
                                    <label><input type="checkbox" name="camera" ${opt.camera?'checked':''} /> Camera</label>
                                </div>
                                <div class="checkbox-group" id="nonVehicleReqs" style="${(isVehicle || isSeatwork)?'':'display:none;'}">
                                    <label><input type="checkbox" name="bodyCoach" ${chk('bodyCoach')} /> Body Coach</label>
                                    <label><input type="checkbox" name="kitchenLayout" ${chk('kitchenLayout')} /> Kitchen Layout</label>
                                    <label><input type="checkbox" name="painting" ${chk('painting')} /> Painting</label>
                                    <label><input type="checkbox" name="vehicleElectrical" ${chk('vehicleElectrical')} /> Electrical Work</label>
                                    <label><input type="checkbox" name="coachElectrical" ${chk('coachElectrical')} /> Coach Electrical</label>
                                    <label><input type="checkbox" name="branding" ${chk('branding')} /> Branding / Stickering</label>
                                </div>

                                <!-- NEW: Body Coach Material & Plumbing Tank Size -->
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Body Coach Material</label>
                                        <select name="bodyCoachMaterial">
                                            <option value="None">None</option>
                                            <option value="SS" ${req.bodyCoachMaterial==='SS'?'selected':''}>SS</option>
                                            <option value="MS" ${req.bodyCoachMaterial==='MS'?'selected':''}>MS</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Water Tank Size (Plumbing)</label>
                                        <select name="plumbingTankSize">
                                            <option value="None">None</option>
                                            <option value="100 Lts" ${req.plumbingTankSize==='100 Lts'?'selected':''}>100 Lts</option>
                                            <option value="200 Lts" ${req.plumbingTankSize==='200 Lts'?'selected':''}>200 Lts</option>
                                        </select>
                                    </div>
                                </div>

                                <div style="margin-top:0.5rem;">
                                    <label>Branding Details:</label>
                                    <div class="checkbox-group">
                                        <label><input type="checkbox" name="plainSticker" ${bd.plainSticker?'checked':''} /> Plain Sticker</label>
                                        <label><input type="checkbox" name="lighting" ${bd.lighting?'checked':''} /> Lighting</label>
                                        <label><input type="checkbox" name="threeDLogo" ${bd.threeDLogo?'checked':''} /> 3D Logo</label>
                                        <label><input type="checkbox" name="acpBoard" ${bd.acpBoard?'checked':''} /> ACP Board</label>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Remarks (optional)</label>
                                    <textarea name="remarks" rows="2">${req.remarks || ''}</textarea>
                                </div>
                            </fieldset>

                            <div class="form-group">
                                <label>Status</label>
                                <select name="status">
                                    <option value="draft" ${order?.status==='draft'?'selected':''}>Draft</option>
                                    <option value="confirmed" ${order?.status==='confirmed'?'selected':''}>Confirmed</option>
                                    <option value="in_production" ${order?.status==='in_production'?'selected':''}>In Production</option>
                                    <option value="delivered" ${order?.status==='delivered'?'selected':''}>Delivered</option>
                                </select>
                            </div>
                        </form>
                    `;

                    this.modal.open({
                        title: isEdit ? 'Edit Sales Order' : 'New Sales Order',
                        body: form,
                        confirmText: isEdit ? 'Update' : 'Create',
                        onConfirm: async () => {
                            if (this._submitting) return;
                            this._submitting = true;
                            const confirmBtn = document.getElementById('modalConfirm');
                            if (confirmBtn) confirmBtn.disabled = true;

                            try {
                                const fd = new FormData(document.getElementById('salesForm'));
                                const data = Object.fromEntries(fd.entries());

                                const orderType = data.orderType || 'vehicle';
                                const isVehicle = orderType === 'vehicle';
                                const isSeatwork = orderType === 'seatwork';
                                const vehiclePending = document.getElementById('vehiclePendingToggle')
                                    ?.checked || false;

                                let vehicleNumber = '';
                                if (isVehicle) {
                                    vehicleNumber = document.getElementById('vehicleNumberHidden')
                                        .value;
                                    if (!vehiclePending && !vehicleNumber) {
                                        this.toast.show(
                                            'Select a vehicle, or tick "vehicle not in inventory yet"',
                                            'warning');
                                        return;
                                    }
                                } else {
                                    let productType = data.productType;
                                    let productName = data.productName || productType ||
                                        'Non-Vehicle';
                                    if (isSeatwork) {
                                        // For seatwork, productType might be from the seatwork dropdown
                                        if (!productType) {
                                            this.toast.show('Please select a seat type.',
                                                'warning');
                                            return;
                                        }
                                    } else {
                                        if (!productType) {
                                            this.toast.show('Please select a product type.',
                                                'warning');
                                            return;
                                        }
                                    }
                                    data.productType = productType;
                                    data.productName = productName;
                                }

                                if (!data.salesperson) {
                                    this.toast.show('Select which salesperson this order is for',
                                        'warning');
                                    return;
                                }

                                const requirements = {
                                    tinkering: !!data.tinkering,
                                    mechanical: !!data.mechanical,
                                    dummyClosing: !!data.dummyClosing,
                                    bodyCoach: !!data.bodyCoach,
                                    insideKitchen: !!data.insideKitchen,
                                    outsideKitchen: !!data.outsideKitchen,
                                    kitchenLayout: !!data.kitchenLayout,
                                    painting: !!data.painting,
                                    acpWork: !!data.acpWork,
                                    vehicleElectrical: !!data.vehicleElectrical,
                                    coachElectrical: !!data.coachElectrical,
                                    upsWiring: !!data.upsWiring,
                                    normalWiring: !!data.normalWiring,
                                    plumbing: !!data.plumbing,
                                    canopy: !!data.canopy,
                                    tyreChange: !!data.tyreChange,
                                    glassChecking: !!data.glassChecking,
                                    branding: !!data.branding,
                                    brandingDetails: { plainSticker: !!data.plainSticker,
                                        lighting: !!data.lighting, threeDLogo: !!data
                                            .threeDLogo, acpBoard: !!data.acpBoard },
                                    optional: { solar: !!data.solar, ups: !!data.ups,
                                        camera: !!data.camera },
                                    remarks: data.remarks || '',
                                    bodyCoachMaterial: data.bodyCoachMaterial || 'None',
                                    plumbingTankSize: data.plumbingTankSize || 'None'
                                };

                                const orderData = {
                                    orderType: orderType,
                                    salesperson: data.salesperson,
                                    vehicleNumber: isVehicle ? (vehiclePending ? '' :
                                        vehicleNumber) : '',
                                    productType: isVehicle ? '' : data.productType,
                                    productName: isVehicle ? '' : data.productName,
                                    customerName: data.customerName,
                                    customerPhone: data.customerPhone || '',
                                    customerEmail: data.customerEmail || '',
                                    deliveryDate: data.deliveryDate,
                                    advanceAmount: parseFloat(data.advanceAmount) || 0,
                                    paintColour: data.paintColour || '',
                                    requirements: JSON.stringify(requirements),
                                    status: data.status || 'confirmed'
                                };

                                this.loader.show();
                                try {
                                    if (isEdit) {
                                        await DataService.updateSales(order.id, orderData);
                                        this.toast.show('Order updated', 'success');
                                    } else {
                                        const result = await DataService.addSales(orderData);
                                        this.toast.show(result.awaitingVehicle ?
                                            `Order ${result.token} saved — awaiting vehicle purchase` :
                                            'Order created — supervisor queue updated',
                                            'success');
                                    }
                                    this.modal.close();
                                    await this.loadData();
                                    this.applyFilters();
                                } catch (e) { this.toast.show('Failed to save: ' + (e
                                        .message || e), 'error'); } finally { this.loader
                                        .hide(); }
                            } catch (err) {
                                // Already handled
                            } finally {
                                this._submitting = false;
                                if (confirmBtn) confirmBtn.disabled = false;
                            }
                        }
                    });

                    const orderTypeRadios = document.querySelectorAll('input[name="orderType"]');
                    const vehicleSection = document.getElementById('vehicleSection');
                    const nonVehicleSection = document.getElementById('nonVehicleSection');
                    const seatworkSection = document.getElementById('seatworkSection');
                    const vehicleReqs = document.getElementById('vehicleReqs');
                    const nonVehicleReqs = document.getElementById('nonVehicleReqs');

                    const toggleSections = () => {
                        const checked = document.querySelector('input[name="orderType"]:checked');
                        const val = checked ? checked.value : 'vehicle';
                        vehicleSection.style.display = (val === 'vehicle') ? '' : 'none';
                        nonVehicleSection.style.display = (val === 'non-vehicle') ? '' : 'none';
                        seatworkSection.style.display = (val === 'seatwork') ? '' : 'none';
                        // Show relevant reqs
                        vehicleReqs.style.display = (val === 'vehicle') ? '' : 'none';
                        nonVehicleReqs.style.display = (val === 'vehicle') ? 'none' : '';
                    };

                    orderTypeRadios.forEach(r => r.addEventListener('change', toggleSections));
                    toggleSections();

                    const container = document.getElementById('vehicleDropdownContainer');
                    if (container) {
                        const selectedValue = order?.vehicleNumber || '';
                        const dropdown = new Components.SearchableDropdown(container, {
                            options: vehicleOptions,
                            selected: selectedValue,
                            placeholder: 'Search for vehicle...',
                            onSelect: (value) => {
                                document.getElementById('vehicleNumberHidden').value = value;
                            }
                        });
                    }

                    const pendingToggle = document.getElementById('vehiclePendingToggle');
                    const vehicleGroup = document.getElementById('vehicleSelectGroup');
                    if (pendingToggle) {
                        const syncVehicleToggle = () => {
                            const pending = pendingToggle.checked;
                            vehicleGroup.style.display = pending ? 'none' : '';
                            if (!pending) {
                                document.getElementById('vehicleNumberHidden').required = true;
                            } else {
                                document.getElementById('vehicleNumberHidden').required = false;
                            }
                        };
                        pendingToggle.addEventListener('change', syncVehicleToggle);
                        syncVehicleToggle();
                    }
                }

                async editItem(id) { const item = this.data.find(v => v.id === id); if (item) this.showForm(
                    item); }

                async showLinkVehicle(id) {
                    const order = this.data.find(v => v.id === id);
                    if (!order || order.orderType === 'non-vehicle') { this.toast.show(
                            'Not a vehicle order', 'warning'); return; }
                    const activeVehicleSet = this.getActiveOrderVehicleSet();
                    const availableVehicles = this.vehicles.filter(v => {
                        if (v.inventoryStatus === 'Delivered') return false;
                        if (v.inventoryStatus !== 'Available') return false;
                        if (activeVehicleSet.has(v.vehicleNumber) && order?.vehicleNumber !== v
                            .vehicleNumber) return false;
                        return true;
                    });
                    const vehicleOptions = availableVehicles.map(v => ({
                        value: v.vehicleNumber,
                        label: `${v.vehicleNumber} - ${v.vehicleName} (FC: ${v.fcStatus})`
                    }));
                    const form = `
                        <p>Order <strong>${order.token}</strong> – waiting for vehicle.</p>
                        <p style="color:var(--dark-gray);">Add the matching vehicle to Inventory first, then link it here.</p>
                        <div class="form-group">
                            <label>Vehicle</label>
                            <div id="linkVehicleDropdownContainer"></div>
                            <input type="hidden" id="linkVehicleHidden" />
                        </div>
                    `;
                    this.modal.open({
                        title: 'Link Purchased Vehicle',
                        body: form,
                        confirmText: 'Link & Start Production',
                        onConfirm: async () => {
                            const vehicleNumber = document.getElementById('linkVehicleHidden')
                                .value;
                            if (!vehicleNumber) { this.toast.show('Select a vehicle',
                                    'warning'); return; }
                            this.loader.show();
                            try {
                                await DataService.linkVehicleToSales(order.id, vehicleNumber);
                                this.toast.show('Vehicle linked – production tasks generated',
                                    'success');
                                this.modal.close();
                                await this.loadData();
                                this.applyFilters();
                            } catch (e) { this.toast.show('Failed: ' + e.message,
                                    'error'); } finally { this.loader.hide(); }
                        }
                    });
                    const container = document.getElementById('linkVehicleDropdownContainer');
                    new Components.SearchableDropdown(container, {
                        options: vehicleOptions,
                        selected: '',
                        placeholder: 'Search for vehicle...',
                        onSelect: (value) => {
                            document.getElementById('linkVehicleHidden').value = value;
                        }
                    });
                }

                async deleteItem(id) {
                    this.confirm.open({
                        title: 'Delete Order',
                        body: 'Are you sure?',
                        onConfirm: async () => {
                            this.loader.show();
                            try {
                                await DataService.deleteSales(id);
                                this.toast.show('Order deleted', 'warning');
                                await this.loadData();
                                this.applyFilters();
                            } catch (e) { this.toast.show('Failed to delete: ' + (e
                                    .message || e), 'error'); } finally { this.loader
                                    .hide(); }
                        }
                    });
                }
            },

            // ==============================================================
            // SUPERVISOR – with Priority, Delivery Date, Progress %, Toggle
            // ==============================================================
            Supervisor: class {
                constructor(app) {
                    this.app = app;
                    this.toast = new Components.Toast();
                    this.loader = new Components.Loader();
                    this.modal = new Components.Modal();
                    this.confirm = new Components.ConfirmationDialog();
                    this.data = [];
                    this.workers = [];
                    this.priorityQueue = [];
                    this.departmentTypes = {};
                    this.vehiclePhotos = {};
                    this.allSales = [];
                    this.filterType = 'All';
                    this.toggleState = {};
                }

                async render(container) {
                    container.innerHTML = `
                        <div class="page-header"><h2>Supervisor</h2></div>
                        <div class="sup-layout">
                            <div class="sup-main">
                                <div class="dashboard-stats" id="supStats"></div>
                                <div class="department-status"><h3>Department Status</h3><div class="dept-cards" id="deptCards"></div></div>

                                    <h3>Average Task Duration</h3>
                                    <div id="taskAnalytics"></div>
                                </div>
                                <div class="priority-queue">
                                    <div class="flex justify-between items-center" style="margin-bottom:0.8rem;">
                                        <h3>Production Queue</h3>
                                        <div class="filter-group">
                                            <label>Worker Type:</label>
                                            <select id="typeFilter">
                                                <option value="All">All</option>
                                                <option value="Contractual">Contractual Only</option>
                                                <option value="Company">Company Only</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div id="supTable"></div>
                                </div>
                            </div>
                            <div class="sup-sidebar" id="assignSidebar">
                                <h3>👷 Assignments Overview</h3>
                                <div id="assignmentsOverview"></div>
                            </div>
                        </div>
                    `;
                    await this.loadData();
                    this.renderStats();
                    this.renderDeptStatus();
                    this.renderTaskAnalytics();
                    this.renderQueue();
                    this.renderAssignmentsOverview();
                    document.getElementById('typeFilter').addEventListener('change', (e) => {
                        this.filterType = e.target.value;
                        this.renderQueue();
                    });

                    const supTable = document.getElementById('supTable');
                    supTable.addEventListener('click', (e) => {
                        const target = e.target.closest('.assign-team');
                        if (target) {
                            e.preventDefault();
                            this.assignTeam(target.dataset.vehicle);
                        }
                    });
                }

                async loadData() {
                    this.loader.show();
                    try {
                        const [inventory, production, deptRes, workers, sales] = await Promise.all([
                            DataService.getInventory(),
                            DataService.getProduction(),
                            DataService.getDepartmentTypes(),
                            DataService.getWorkers(),
                            DataService.getSales()
                        ]);
                        this.vehiclePhotos = {};
                        inventory.forEach(v => { this.vehiclePhotos[v.vehicleNumber] = v.frontPhotoUrl ||
                                ''; });
                        this.data = production;
                        this.departmentTypes = deptRes.departmentTypes || {};
                        this.workers = workers;
                        this.allSales = sales;

                        const grouped = {};
                        this.data.forEach(t => {
                            const key = t.vehicleNumber || t.salesOrderId;
                            if (!grouped[key]) {
                                const salesOrder = this.allSales.find(s => s.id === t.salesOrderId);
                                const orderType = salesOrder?.orderType || 'vehicle';
                                const productName = salesOrder?.productName || salesOrder
                                    ?.productType || '';
                                const vehicleNumber = t.vehicleNumber || (orderType ===
                                    'non-vehicle' ? productName : '');
                                grouped[key] = {
                                    vehicleNumber: vehicleNumber,
                                    customerName: t.customerName,
                                    deliveryDate: t.deliveryDate,
                                    department: t.department || '',
                                    employeeType: 'Company',
                                    tasks: [],
                                    status: 'pending',
                                    orderType: orderType,
                                    productName: productName,
                                    token: salesOrder?.token || ''
                                };
                            }
                            grouped[key].tasks.push(t);
                            const dept = t.department || '';
                            const type = this.departmentTypes[dept] || 'Company';
                            grouped[key].employeeType = type;
                            const statuses = grouped[key].tasks.map(t => t.status);
                            if (statuses.every(s => s === 'completed')) grouped[key].status =
                            'completed';
                            else if (statuses.some(s => s === 'pending_approval')) grouped[key]
                                .status = 'pending_approval';
                            else if (statuses.some(s => s === 'in_progress')) grouped[key]
                                .status = 'in_progress';
                            else grouped[key].status = 'pending';
                        });
                        this.priorityQueue = Object.values(grouped);
                        this.priorityQueue.sort((a, b) => new Date(a.deliveryDate) - new Date(b
                            .deliveryDate));

                        this.priorityQueue.forEach(v => {
                            const key = v.vehicleNumber || v.productName;
                            if (!this.toggleState[key]) {
                                const hasUnassigned = v.tasks.some(t => !t.assignedWorkerId && t.status !== 'completed');
                                this.toggleState[key] = hasUnassigned ? 'assign' : 'assigned';
                            }
                        });
                    } catch (e) { console.error(e);
                        this.toast.show('Failed to load data: ' + (e.message || e), 'error'); } finally { this
                            .loader.hide(); }
                }

                renderStats() {
                    const stats = {
                        waiting: this.priorityQueue.filter(v => v.status === 'pending').length,
                        inProgress: this.priorityQueue.filter(v => v.status === 'in_progress').length,
                        pendingApproval: this.priorityQueue.filter(v => v.status === 'pending_approval')
                            .length,
                        delayed: this.priorityQueue.filter(v => { const days = Utils.dateUtils
                                .daysUntil(v.deliveryDate); return days < 0 && v.status !==
                                'completed'; }).length
                    };
                    document.getElementById('supStats').innerHTML = `
                        <div class="stat-card info"><div class="stat-label">Waiting Assignment</div><div class="stat-value">${stats.waiting}</div><span class="material-icons stat-icon">pending_actions</span></div>
                        <div class="stat-card warning"><div class="stat-label">In Progress</div><div class="stat-value">${stats.inProgress}</div><span class="material-icons stat-icon">build</span></div>
                        <div class="stat-card success"><div class="stat-label">Pending Approval</div><div class="stat-value">${stats.pendingApproval}</div><span class="material-icons stat-icon">approval</span></div>
                        <div class="stat-card danger"><div class="stat-label">Delayed</div><div class="stat-value">${stats.delayed}</div><span class="material-icons stat-icon">warning</span></div>
                    `;
                    document.getElementById('notifBadge').textContent = stats.pendingApproval;
                }

                renderDeptStatus() {
                    const deptCounts = {};
                    const deptTypes = {};
                    this.data.forEach(t => {
                        deptCounts[t.department] = (deptCounts[t.department] || 0) + 1;
                        deptTypes[t.department] = this.departmentTypes[t.department] || 'Company';
                    });
                    document.getElementById('deptCards').innerHTML = Object.entries(deptCounts).map(([name,
                            count]) => {
                        const type = deptTypes[name] || 'Company';
                        const bgColor = type === 'Contractual' ? '#ff6b6b' : '#4a90d9';
                        return `<div class="dept-card"><span class="dept-name">${name}</span><span class="dept-count" style="background:${bgColor};">${count}</span><span style="font-size:0.7rem;color:${type === 'Contractual' ? '#cc0000' : '#1a3a5c'};">${type}</span></div>`;
                    }).join('');
                }

                async renderTaskAnalytics() {
                    const container = document.getElementById('taskAnalytics');
                    try {
                        const analytics = await DataService.getTaskAnalytics();
                        if (analytics.length === 0) {
                            container.innerHTML =
                                `<p style="color:var(--dark-gray);">No completed tasks yet.</p>`;
                            return;
                        }
                        const table = new Components.Table(container, {
                            columns: [
                                { key: 'taskName', label: 'Task' },
                                { key: 'avgHours', label: 'Avg Hours', render: (r) =>
                                        `<strong>${r.avgHours}</strong> hrs` },
                                { key: 'minHours', label: 'Fastest' },
                                { key: 'maxHours', label: 'Slowest' },
                                { key: 'completedCount', label: 'Completed' }
                            ]
                        });
                        table.render(analytics);
                    } catch (e) { container.innerHTML = ''; }
                }

                renderQueue() {
                    const container = document.getElementById('supTable');
                    let filtered = this.priorityQueue;
                    if (this.filterType === 'Contractual') filtered = filtered.filter(v => v
                            .employeeType === 'Contractual');
                    else if (this.filterType === 'Company') filtered = filtered.filter(v => v
                            .employeeType === 'Company');

                    if (filtered.length === 0) {
                        container.innerHTML =
                            `<p style="color:var(--dark-gray);padding:0.8rem;">No items in the queue.</p>`;
                        return;
                    }

                    container.innerHTML = `<div class="worker-task-list">${filtered.map(r => {
                            const photoUrl = (this.vehiclePhotos && this.vehiclePhotos[r.vehicleNumber]) || '';
                            const photoHtml = photoUrl
                                ? `<img class="task-vehicle-photo" src="${photoUrl}" />`
                                : `<div class="task-vehicle-photo-placeholder"><span class="material-icons" style="font-size:2rem;">directions_car</span></div>`;
                            const tasks = r.tasks || [];
                            const completed = tasks.filter(t => t.status === 'completed').length;
                            const p = tasks.length > 0 ? Math.round((completed / tasks.length) * 100) : 0;
                            const days = Utils.dateUtils.daysUntil(r.deliveryDate);
                            const daysColor = days < 0 ? 'var(--danger)' : days < 3 ? 'var(--warning)' : 'var(--dark-gray)';
                            let priorityLabel = 'Low';
                            let priorityClass = 'priority-low';
                            if (days <= 0) { priorityLabel = 'High'; priorityClass = 'priority-high'; }
                            else if (days <= 7) { priorityLabel = 'Medium'; priorityClass = 'priority-medium'; }

                            const typeColor = r.employeeType === 'Contractual' ? '#dc3545' : '#28a745';
                            const displayName = r.orderType === 'non-vehicle' || r.orderType === 'seatwork' ?
                                `${r.productName || r.vehicleNumber} (${r.token})` :
                                r.vehicleNumber;

                            const key = r.vehicleNumber || r.productName;
                            const currentMode = this.toggleState[key] || 'assign';

                            let taskItems = [];
                            if (currentMode === 'assign') {
                                const unassignedTasks = tasks.filter(t => !t.assignedWorkerId && t.status !== 'completed');
                                if (unassignedTasks.length === 0) {
                                    taskItems.push(`<div class="empty-state"><span class="material-icons">check_circle</span> All tasks are assigned!</div>`);
                                } else {
                                    unassignedTasks.forEach(t => {
                                        taskItems.push(`
                                            <div class="task-item">
                                                <span class="task-name">${t.taskName}</span>
                                                <span class="task-status badge badge-${t.status}">${t.status}</span>
                                                <button class="task-action-btn btn-assign assign-task-btn" data-taskid="${t.id}" data-vehicle="${r.vehicleNumber}">
                                                    <span class="material-icons">assignment</span> Assign
                                                </button>
                                            </div>
                                        `);
                                    });
                                }
                            } else {
                                const assignedTasks = tasks.filter(t => t.assignedWorkerId && t.assignedWorkerId.length > 0);
                                if (assignedTasks.length === 0) {
                                    taskItems.push(`<div class="empty-state"><span class="material-icons">info</span> No assigned tasks.</div>`);
                                } else {
                                    assignedTasks.forEach(t => {
                                        const workerIds = t.assignedWorkerId.split(',').filter(Boolean);
                                        const workerNames = workerIds.map(id => {
                                            const w = this.workers.find(w => String(w.id) === id.trim());
                                            return w?.name || 'Unknown';
                                        }).join(', ');
                                        taskItems.push(`
                                            <div class="task-item">
                                                <span class="task-name">${t.taskName}</span>
                                                <span class="task-worker-name"><span class="material-icons">person</span> ${workerNames}</span>
                                                <button class="task-action-btn btn-unassign unassign-task-btn" data-taskid="${t.id}" data-vehicle="${r.vehicleNumber}">
                                                    <span class="material-icons">person_remove</span> Unassign
                                                </button>
                                            </div>
                                        `);
                                    });
                                }
                            }

                            const unassignedCount = tasks.filter(t => !t.assignedWorkerId && t.status !== 'completed').length;
                            const assignedCount = tasks.filter(t => t.assignedWorkerId && t.assignedWorkerId.length > 0).length;

                            let extraBtns = `<button class="btn btn-secondary btn-sm view-timeline" data-vehicle="${r.vehicleNumber || r.productName}"><span class="material-icons" style="font-size:16px;">timeline</span> Timeline</button>`;
                            if (r.status === 'pending_approval') extraBtns += `<button class="btn btn-sm qc-approve" data-vehicle="${r.vehicleNumber || r.productName}" style="background:var(--warning);color:#333;"><span class="material-icons" style="font-size:16px;">verified</span> QC Check</button>`;
                            if (r.status === 'completed') extraBtns += `<button class="btn btn-success btn-sm delivery" data-vehicle="${r.vehicleNumber || r.productName}"><span class="material-icons" style="font-size:16px;">local_shipping</span> Delivery</button>`;

                            return `
                                <div class="worker-task-card">
                                    ${photoHtml}
                                    <div class="task-info assign-team" data-vehicle="${r.vehicleNumber || r.productName}" style="cursor:pointer;">
                                        <div class="task-vehicle-number" style="display:flex;flex-wrap:wrap;align-items:center;gap:0.3rem;">
                                            <span style="font-size:1.2rem;">${displayName}</span>
                                            <span class="badge ${priorityClass}" style="font-size:0.6rem;">${priorityLabel}</span>
                                            <span style="font-size:0.7rem;color:var(--dark-gray);">${r.token}</span>
                                        </div>
                                        <div class="task-name">${r.customerName}</div>
                                        <div class="task-meta">
                                            Delivery: ${Utils.dateUtils.format(r.deliveryDate)} — <span style="color:${daysColor};font-weight:600;">${days} day(s) left</span>
                                            &nbsp;•&nbsp; <span style="color:${typeColor};font-weight:600;">${r.employeeType || 'Company'}</span>
                                            &nbsp;•&nbsp; <span class="badge badge-${r.status}">${r.status}</span>
                                        </div>
                                        <div class="progress-bar" style="margin-top:0.4rem;width:100%;"><div class="progress-fill" style="width:${p}%;"></div><span>${p}%</span></div>

                                        <div class="view-toggle">
                                            <button class="toggle-option ${currentMode === 'assign' ? 'active' : ''}" data-mode="assign" data-vehicle-key="${key}">
                                                <span class="material-icons">assignment</span> Assign Tasks
                                            </button>
                                            <button class="toggle-option ${currentMode === 'assigned' ? 'active' : ''}" data-mode="assigned" data-vehicle-key="${key}">
                                                <span class="material-icons">group</span> Assigned Workers
                                            </button>
                                        </div>

                                        <div class="task-list-container">
                                            ${taskItems.join('')}
                                        </div>
                                    </div>
                                    <div class="task-actions" style="flex-wrap:wrap;">${extraBtns}</div>
                                </div>
                            `;
                        }).join('')}</div>`;

                    container.querySelectorAll('.toggle-option').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const mode = btn.dataset.mode;
                            const key = btn.dataset.vehicleKey;
                            this.toggleState[key] = mode;
                            this.renderQueue();
                        });
                    });

                    container.querySelectorAll('.assign-task-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const taskId = btn.dataset.taskid;
                            const vehicle = btn.dataset.vehicle;
                            const task = this.data.find(t => t.id === taskId);
                            if (task) this.assignSpecificTask(vehicle, taskId);
                        });
                    });

                    container.querySelectorAll('.unassign-task-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const taskId = btn.dataset.taskid;
                            const vehicle = btn.dataset.vehicle;
                            this.confirm.open({
                                title: 'Unassign Worker',
                                body: `Remove all workers from this task on ${vehicle}? The task will become pending.`,
                                onConfirm: async () => {
                                    this.loader.show();
                                    try {
                                        await DataService.updateProduction(taskId, {
                                            assignedWorkerId: '',
                                            status: 'pending'
                                        });
                                        this.toast.show('Worker unassigned', 'success');
                                        await this.loadData();
                                        this.renderQueue();
                                        this.renderStats();
                                        this.renderAssignmentsOverview();
                                    } catch (e) { this.toast.show('Failed: ' + e.message, 'error'); } finally { this.loader.hide(); }
                                }
                            });
                        });
                    });

                    container.querySelectorAll('.view-timeline').forEach(el => el.addEventListener('click',
                        (e) => { e.stopPropagation();
                            this.viewTimeline(el.dataset.vehicle); }));
                    container.querySelectorAll('.qc-approve').forEach(el => el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.showQCApprove(el.dataset.vehicle);
                    }));
                    container.querySelectorAll('.delivery').forEach(el => el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.showDelivery(el.dataset.vehicle);
                    }));
                }

                async assignSpecificTask(vehicleNumber, taskId) {
                    try {
                        const allTasks = this.data.filter(t => t.vehicleNumber === vehicleNumber || (t
                                .vehicleNumber === '' &&
                                t.salesOrderId && this.allSales.some(s => s.id === t.salesOrderId && (s
                                    .productName === vehicleNumber))));

                        const task = allTasks.find(t => t.id === taskId);
                        if (!task) { this.toast.show('Task not found', 'warning'); return; }

                        if (task.assignedWorkerId && task.assignedWorkerId.length > 0) {
                            this.toast.show('Task already has a worker assigned', 'warning');
                            return;
                        }
                        if (task.status === 'completed') {
                            this.toast.show('Task is already completed', 'warning');
                            return;
                        }

                        const assignableTasks = [task];
                        this.showAssignPopup(vehicleNumber, allTasks, assignableTasks, taskId);
                    } catch (error) {
                        console.error(error);
                        this.toast.show('Error: ' + error.message, 'error');
                    }
                }

                showAssignPopup(vehicleNumber, allTasks, assignableTasks, preselectedTaskId = null) {
                    const dept = assignableTasks.length > 0 ? assignableTasks[0].department || '' : (allTasks[0]
                        ?.department || '');
                    const sortedWorkers = [...this.workers].sort((a, b) => {
                        const aMatch = a.department === dept ? 0 : 1;
                        const bMatch = b.department === dept ? 0 : 1;
                        const deptDiff = aMatch - bMatch;
                        if (deptDiff !== 0) return deptDiff;
                        const nameA = a.name || '';
                        const nameB = b.name || '';
                        return nameA.localeCompare(nameB);
                    });

                    const workerCheckboxes = sortedWorkers.map(w => {
                        const workerName = w.name || 'Unknown Worker';
                        const dept = w.department || 'no dept';
                        const type = w.employeeType || 'Company';
                        return `<label><input type="checkbox" name="worker_${w.id}" value="${w.id}" /> ${workerName} <span style="color:var(--dark-gray);font-size:0.8rem;">— ${dept} (${type})</span></label>`;
                    }).join('') || '<p style="color:var(--dark-gray);">No workers set up yet.</p>';

                    const taskOptions = allTasks.map(t => {
                        const isAssignable = assignableTasks.some(at => at.id === t.id);
                        const alreadyAssigned = t.assignedWorkerId && t.assignedWorkerId.length > 0;
                        let label = `${t.taskName} (${t.status})`;
                        if (alreadyAssigned) {
                            const workerIds = t.assignedWorkerId.split(',').filter(Boolean);
                            const names = workerIds.map(id => {
                                const worker = this.workers.find(w => String(w.id) === id.trim());
                                return worker?.name || 'Unknown';
                            }).join(', ');
                            label += ` 👷 ${names}`;
                        }
                        if (!isAssignable && t.status !== 'completed') {
                            label += ' ⛔ (already assigned)';
                        }
                        if (t.status === 'completed') {
                            label += ' ✅ (done)';
                        }
                        const selectedAttr = (preselectedTaskId && t.id === preselectedTaskId) ? 'selected' : '';
                        return `<option value="${t.id}" ${isAssignable ? '' : 'disabled'} ${selectedAttr}>${label}</option>`;
                    }).join('');

                    const hasAssignable = assignableTasks.length > 0;

                    const form = `
                        <form id="assignForm">
                            <div class="form-group"><label>Item</label><input type="text" value="${vehicleNumber}" disabled /></div>
                            <div class="form-group">
                                <label>Task</label>
                                <select name="taskId" ${!hasAssignable ? 'disabled' : ''}>
                                    ${taskOptions}
                                </select>
                                ${!hasAssignable ? '<div style="font-size:0.75rem;color:var(--dark-gray);margin-top:0.2rem;">No assignable tasks.</div>' : ''}
                            </div>
                            <div class="form-group">
                                <label>Workers (tick one or more)</label>
                                <div class="checkbox-group" style="max-height:220px;overflow-y:auto;display:block;">${workerCheckboxes}</div>
                            </div>
                            <div class="form-group">
                                <label>Estimated Hours</label>
                                <input type="number" name="estimatedHours" value="${assignableTasks.length > 0 ? assignableTasks[0]?.estimatedHours || 8 : 8}" step="0.5" ${!hasAssignable ? 'disabled' : ''} />
                            </div>
                            <div class="form-group">
                                <label><input type="checkbox" name="forceStart" ${!hasAssignable ? 'disabled' : ''} /> Force Start</label>
                            </div>
                        </form>
                    `;

                    this.modal.open({
                        title: `Assign Work - ${vehicleNumber}`,
                        body: form,
                        confirmText: hasAssignable ? 'Assign' : 'Close',
                        showCancel: !hasAssignable,
                        onConfirm: async () => {
                            if (!hasAssignable) { this.modal.close(); return; }
                            const fd = new FormData(document.getElementById('assignForm'));
                            const data = Object.fromEntries(fd.entries());
                            const taskId = data.taskId;
                            const task = this.data.find(t => t.id === taskId);
                            const selectedWorkerIds = sortedWorkers.filter(w => data[
                                    'worker_' + w.id])
                                .map(w => w.id);
                            if (selectedWorkerIds.length === 0) {
                                this.toast.show('Select at least one worker', 'warning');
                                return;
                            }
                            if (task) {
                                this.loader.show();
                                try {
                                    await DataService.updateProduction(taskId, {
                                        assignedWorkerId: selectedWorkerIds.join(','),
                                        estimatedHours: parseFloat(data.estimatedHours) ||
                                            8,
                                        status: 'pending',
                                        forceStart: !!data.forceStart
                                    });
                                    this.toast.show('Task assigned!', 'success');
                                    this.modal.close();
                                    await this.loadData();
                                    this.renderQueue();
                                    this.renderStats();
                                    this.renderAssignmentsOverview();
                                } catch (e) { this.toast.show('Failed: ' + (e
                                        .message || e), 'error'); } finally { this
                                        .loader.hide(); }
                            }
                        }
                    });
                }

                async assignTeam(vehicleNumber) {
                    try {
                        const allTasks = this.data.filter(t => t.vehicleNumber === vehicleNumber || (t
                                .vehicleNumber === '' &&
                                t.salesOrderId && this.allSales.some(s => s.id === t.salesOrderId && (s
                                    .productName === vehicleNumber))));

                        if (allTasks.length === 0) { this.toast.show('No tasks found.',
                                'warning'); return; }

                        const assignableTasks = allTasks.filter(t =>
                            t.status === 'pending' ||
                            (t.status === 'in_progress' && !t.assignedWorkerId)
                        );

                        if (assignableTasks.length === 0) {
                            this.toast.show('All tasks are already assigned or completed.',
                                'info');
                            return;
                        }

                        this.showAssignPopup(vehicleNumber, allTasks, assignableTasks);
                    } catch (error) {
                        console.error(error);
                        this.toast.show('Error: ' + error.message, 'error');
                    }
                }

                async viewTimeline(vehicleNumber) {
                    const tasks = this.data.filter(t => t.vehicleNumber === vehicleNumber || (t
                            .vehicleNumber === '' &&
                            t.salesOrderId && this.allSales.some(s => s.id === t.salesOrderId && (s
                                .productName === vehicleNumber))));
                    if (tasks.length === 0) { this.toast.show('No tasks found.', 'warning'); return; }
                    const firstTask = tasks[0];
                    const salesOrder = this.allSales.find(s => s.id === firstTask.salesOrderId);
                    const displayName = salesOrder?.orderType === 'non-vehicle' || salesOrder?.orderType ===
                        'seatwork' ?
                        `${salesOrder.productName || 'Non-Vehicle'} (${salesOrder.token})` :
                        vehicleNumber;

                    const stepsHtml = tasks.map(t =>
                        `<div class="step ${t.status==='completed'?'completed':t.status==='in_progress'||t.status==='pending_approval'?'active':''}">${t.taskName} (${t.status})</div>`
                        ).join('');
                    const photoUrl = (this.vehiclePhotos && this.vehiclePhotos[vehicleNumber]) || '';
                    const html = `
                        ${photoUrl ? `<img class="vehicle-photo-hero" src="${photoUrl}" />` : ''}
                        <h4>${displayName} - ${firstTask.customerName}</h4>
                        <p>Delivery: ${Utils.dateUtils.format(firstTask.deliveryDate)} (${Utils.dateUtils.daysUntil(firstTask.deliveryDate)} days left)</p>
                        <div class="timeline-steps">${stepsHtml}</div>
                        <div class="timeline-details"><p><strong>Total:</strong> ${tasks.length}</p><p><strong>Completed:</strong> ${tasks.filter(t=>t.status==='completed').length}</p></div>
                    `;
                    this.modal.open({ title: `Timeline - ${displayName}`, body: html, confirmText: 'Close',
                        showCancel: false, onConfirm: () => this.modal.close() });
                }

                async showQCApprove(vehicleNumber) {
                    const tasks = this.data.filter(t => (t.vehicleNumber === vehicleNumber || (t
                            .vehicleNumber === '' &&
                            t.salesOrderId && this.allSales.some(s => s.id === t.salesOrderId && (s
                                .productName === vehicleNumber)))) && t.status === 'pending_approval');
                    if (tasks.length === 0) { this.toast.show('No tasks pending approval',
